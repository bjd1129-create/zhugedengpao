// 页面加载完成后执行
document.addEventListener('DOMContentLoaded', () => {
  // 1. 动态渲染文章卡片 (与 articlesData 严格同步)
  const articleList = document.getElementById('articleList');
  if (articleList) {
    articlesData.forEach((article, index) => {
      const card = document.createElement('a');
      card.className = `article-card ${article.featured ? 'featured' : ''}`;
      card.setAttribute('data-tag', article.tag);
      card.href = '#';
      card.onclick = (e) => { e.preventDefault(); openArticle(index); };

      // 标签映射
      const tagMap = { story: 'tag-story', tech: 'tag-tech', trade: 'tag-trade', data: 'tag-data', team: 'tag-team' };
      const tagClass = tagMap[article.tag] || 'tag-story';
      
      // 提取摘要 (取 content 中的第一段 <p>)
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = article.content;
      const firstP = tempDiv.querySelector('p');
      const excerpt = firstP ? firstP.textContent.substring(0, 120) + '...' : '点击阅读完整内容';
      
      card.innerHTML = `
        <div class="article-meta">
          <div class="article-author">${article.meta.split(' · ')[0]}</div>
          <span class="article-tag ${tagClass}">${article.tag.toUpperCase()}</span>
          <span>${article.meta.split(' · ')[1]}</span>
        </div>
        <div class="article-title">${article.title}</div>
        <div class="article-excerpt">${excerpt}</div>
        <div class="article-footer">
          <span>${article.featured ? '🔥 推荐阅读' : 'Just Published'}</span>
          <span class="article-read">阅读全文 →</span>
        </div>
      `;
      articleList.appendChild(card);
    });
  }

  // 2. 标签筛选逻辑
  const filterBtns = document.querySelectorAll('.filter-btn');
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tag = btn.getAttribute('data-tag');
      
      document.querySelectorAll('.article-card').forEach(card => {
        if (tag === 'all' || card.getAttribute('data-tag') === tag) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    });
  });
});

// 打开文章 (Modal)
function openArticle(index) {
  const article = articlesData[index];
  if (!article) return;
  
  document.getElementById('modalTitle').textContent = article.title;
  document.getElementById('modalMeta').textContent = article.meta;
  document.getElementById('modalBody').innerHTML = article.content; // 完整 HTML 内容
  
  const modal = document.getElementById('articleModal');
  modal.classList.add('show');
  document.body.style.overflow = 'hidden'; // 锁定背景滚动
}

// 关闭文章
function closeModal() {
  const modal = document.getElementById('articleModal');
  modal.classList.remove('show');
  document.body.style.overflow = '';
}

// 点击遮罩层关闭
document.getElementById('articleModal').addEventListener('click', (e) => {
  if (e.target.id === 'articleModal') {
    closeModal();
  }
});

// ESC 键关闭
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
