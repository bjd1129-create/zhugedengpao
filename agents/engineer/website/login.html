<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 | 诸葛灯泡 HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fff9e6; --text: #2d2a24; --accent: #ff7f50; --border: #4a4a4a;
  --shadow: 4px 4px 0px var(--border); --font: 'ZCOOL KuaiLe', 'Patrick Hand', cursive;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-image: radial-gradient(#e0dcd3 1px, transparent 1px);
  background-size: 24px 24px;
}
.login-container {
  width: 100%;
  max-width: 440px;
  padding: 24px;
}
.logo {
  text-align: center;
  font-size: 48px;
  margin-bottom: 8px;
  animation: bounce 1s ease infinite alternate;
}
@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-8px); }
}
.brand-title {
  text-align: center;
  font-size: 28px;
  font-weight: 900;
  color: var(--accent);
  text-shadow: 2px 2px 0px var(--border);
  margin-bottom: 4px;
}
.brand-sub {
  text-align: center;
  font-size: 14px;
  color: #888;
  margin-bottom: 32px;
}
.lamp-card {
  background: #fff;
  border: 2px dashed var(--border);
  border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
  box-shadow: var(--shadow);
  padding: 2rem;
  transition: 0.2s;
}
.lamp-card:hover {
  transform: translate(-2px, -2px);
  box-shadow: 6px 6px 0px var(--border);
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 16px;
  margin-bottom: 8px;
  color: var(--text);
}
.form-group input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
  font-family: var(--font);
  font-size: 16px;
  background: #fff9e6;
  outline: none;
  transition: 0.2s;
}
.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,127,80,0.2);
}
.lamp-btn {
  background: var(--accent);
  color: #fff;
  border: 2px solid var(--border);
  border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
  padding: 0.8rem 1.5rem;
  font-family: var(--font);
  font-size: 18px;
  cursor: pointer;
  box-shadow: 2px 2px 0px var(--border);
  text-decoration: none;
  display: inline-block;
  width: 100%;
  text-align: center;
  transition: 0.2s;
}
.lamp-btn:hover {
  transform: rotate(-2deg) scale(1.02);
  box-shadow: 3px 3px 0px var(--border);
}
.lamp-btn:active {
  transform: rotate(0deg) scale(0.98);
}
.lamp-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
.token-area {
  display: none;
  margin-top: 20px;
  padding: 16px;
  background: #f0f9e6;
  border: 2px dashed #38b000;
  border-radius: 15px;
  text-align: center;
}
.token-area .token-text {
  font-size: 13px;
  word-break: break-all;
  color: #2d5a27;
  margin: 8px 0;
  font-family: monospace;
  background: #fff;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
.verify-btn {
  background: #38b000;
  color: #fff;
  border: 2px solid var(--border);
  border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
  padding: 0.6rem 1.2rem;
  font-family: var(--font);
  font-size: 16px;
  cursor: pointer;
  box-shadow: 2px 2px 0px var(--border);
  transition: 0.2s;
}
.verify-btn:hover { transform: rotate(-2deg) scale(1.02); }

.error-msg {
  display: none;
  margin-top: 12px;
  padding: 12px;
  background: #ffe6e6;
  border: 2px dashed #ef4444;
  border-radius: 15px;
  color: #c0392b;
  text-align: center;
  font-size: 14px;
}
.success-msg {
  display: none;
  margin-top: 12px;
  padding: 12px;
  background: #e6ffe6;
  border: 2px dashed #38b000;
  border-radius: 15px;
  color: #2d5a27;
  text-align: center;
  font-size: 16px;
}
.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: #aaa;
}
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">💡</div>
  <div class="brand-title">诸葛灯泡 HQ</div>
  <div class="brand-sub">— 5 AI Agents, 1 公司 —</div>

  <div class="lamp-card">
    <form id="loginForm" onsubmit="return false;">
      <div class="form-group">
        <label>📧 邮箱</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="lamp-btn" id="loginBtn" onclick="handleLogin()">
        登录 →
      </button>
    </form>

    <div class="token-area" id="tokenArea">
      <div>🔑 验证码已发送！</div>
      <div class="token-text" id="tokenDisplay"></div>
      <div style="margin-top:12px;">
        <div class="form-group" style="margin-bottom:12px;">
          <label>输入验证码</label>
          <input type="text" id="verifyCode" placeholder="6位验证码" maxlength="6">
        </div>
        <button class="verify-btn" onclick="handleVerify()">验证并登录 ✓</button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
  </div>

  <div class="footer">
    还没有账号？<a href="#">联系老庄开通</a>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// Mock API — 后端就绪后替换为真实 fetch
// ═══════════════════════════════════════════
const MOCK_MODE = true;  // 后端未就绪时使用 Mock

let mockToken = '';
let mockEmail = '';

function mockLoginAPI(email) {
  // 模拟 POST /api/login
  return new Promise((resolve) => {
    setTimeout(() => {
      mockEmail = email;
      mockToken = 'DENGPAO-' + Math.random().toString(36).substring(2, 8).toUpperCase() + '-' + Date.now().toString(36).toUpperCase();
      resolve({ ok: true, token: mockToken });
    }, 800);
  });
}

function mockVerifyAPI(email, code) {
  // 模拟 POST /api/verify
  return new Promise((resolve) => {
    setTimeout(() => {
      // 任何6位code都通过（Mock模式）
      if (code.length === 6) {
        resolve({
          ok: true,
          user: { email: email, name: email.split('@')[0], role: 'member' },
          accessToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.' + btoa(JSON.stringify({ email, role: 'member', exp: Date.now() + 86400000 }))
        });
      } else {
        resolve({ ok: false, message: '验证码错误，请重试' });
      }
    }, 600);
  });
}

// ═══════════════════════════════════════════
// 真实 API 调用（后端就绪后启用）
// ═══════════════════════════════════════════
async function realLoginAPI(email) {
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  });
  return res.json();
}

async function realVerifyAPI(email, code) {
  const res = await fetch('/api/verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, code })
  });
  return res.json();
}

// ═══════════════════════════════════════════
// 页面逻辑
// ═══════════════════════════════════════════
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  if (!email || !email.includes('@')) {
    showError('请输入有效的邮箱地址 📧');
    return;
  }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '发送中...';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const res = MOCK_MODE ? await mockLoginAPI(email) : await realLoginAPI(email);
    if (res.ok) {
      document.getElementById('tokenDisplay').textContent = MOCK_MODE ? res.token : '已发送至邮箱，请查收';
      document.getElementById('tokenArea').style.display = 'block';
      document.getElementById('loginForm').style.display = 'none';
      showSuccess('验证码已发送 ✓');
    } else {
      showError(res.message || '登录失败，请重试');
    }
  } catch (e) {
    showError('网络错误：' + e.message);
  }

  btn.disabled = false;
  btn.textContent = '登录 →';
}

async function handleVerify() {
  const code = document.getElementById('verifyCode').value.trim();
  if (!code) {
    showError('请输入验证码');
    return;
  }

  showSuccess('验证中...');

  try {
    const res = MOCK_MODE ? await mockVerifyAPI(mockEmail, code) : await realVerifyAPI(mockEmail, code);
    if (res.ok) {
      // 存储 token
      localStorage.setItem('dengpao_token', res.accessToken);
      localStorage.setItem('dengpao_user', JSON.stringify(res.user));
      showSuccess('登录成功！即将跳转... 🎉');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    } else {
      showError(res.message || '验证失败');
    }
  } catch (e) {
    showError('网络错误：' + e.message);
  }
}

// Enter 键支持
document.getElementById('email').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('verifyCode').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleVerify();
});

// 如果已登录，直接跳转
if (localStorage.getItem('dengpao_token')) {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
