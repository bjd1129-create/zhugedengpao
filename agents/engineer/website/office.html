// ─────────────────────────────────────────────

// Init positions
AGENTS.forEach(a => {
  const d = DESK_POS[a.desk];
  a.x = d.x + 45;
  a.y = d.y + 45;
  a.baseX = a.x;
  a.baseY = a.y;
  a.state = 'WORKING';
  a.target = null;
  a.bubbleText = '';
  a.bubbleTimer = 0;
  a.nextStateIn = rand(a.workDur[0], a.workDur[1]);
  a.phaseTimer = 0;
  a.walkFrame = 0;
  a.walkSpeed = 0;
  a.facing = 1; // 1=right, -1=left
  a.atDesk = true;
  a.interactWith = null;
  a.interactFrame = 0;
});

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function rand(a,b){ return a + Math.random()*(b-a); }
function dist(a,b){ return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }
function lerp(a,b,t){ return a + (b-a)*t; }
function ease(t){ return t<0.5? 2*t*t : -1+(4-2*t)*t; }

function getDeskCenter(deskKey) {
  const d = DESK_POS[deskKey];
  return { x: d.x + 45, y: d.y + 45 };
}

function randomOtherAgent(agent) {
  const others = AGENTS.filter(a => a.id !== agent.id);
  return others[Math.floor(Math.random()*others.length)];
}

function randomRestSpot() {
  return REST_SPOTS[Math.floor(Math.random()*REST_SPOTS.length)];
}

// ─────────────────────────────────────────────
//  STATE MACHINE
// ─────────────────────────────────────────────
function updateAgent(agent, dt) {
  agent.phaseTimer += dt;

  switch(agent.state) {
    case 'WORKING':
      // Show bubble occasionally
      if (!agent.bubbleText && Math.random() < 0.01) {
        agent.bubbleText = agent.messages[Math.floor(Math.random()*agent.messages.length)];
        agent.bubbleTimer = 3000;
      }
      if (agent.bubbleTimer > 0) {
        agent.bubbleTimer -= dt;
        if (agent.bubbleTimer <= 0) agent.bubbleText = '';
      }
      // Transition
      if (agent.phaseTimer >= agent.nextStateIn) {
        agent.phaseTimer = 0;
        const roll = Math.random();
        if (roll < 0.4) {
          // Go to rest area
          agent.state = 'WALKING';
          const spot = randomRestSpot();
          agent.target = { x: spot.x, y: spot.y };
          agent.atDesk = false;
          agent.bubbleText = '';
        } else if (roll < 0.7) {
          // Go interact with another agent
          const other = randomOtherAgent(agent);
          agent.state = 'WALKING';
          agent.target = getDeskCenter(other.desk);
          agent.interactWith = other;
          agent.atDesk = false;
          agent.bubbleText = '';
        } else {
          // Go for a walk around
          agent.state = 'WALKING';
          agent.target = {
            x: 100 + Math.random()*(W-200),
            y: 100 + Math.random()*(H-200)
          };
          agent.atDesk = false;
          agent.bubbleText = '';
        }
        agent.nextStateIn = rand(agent.workDur[0], agent.workDur[1]);
      }
      break;

    case 'WALKING':
      if (!agent.target) { agent.state='WORKING'; break; }
      const dx = agent.target.x - agent.x;
      const dy = agent.target.y - agent.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      agent.facing = dx > 0 ? 1 : -1;
      if (d < 4) {
        agent.x = agent.target.x;
        agent.y = agent.target.y;
        agent.target = null;
        if (agent.interactWith) {
          agent.state = 'INTERACTING';
          agent.phaseTimer = 0;
          agent.nextStateIn = rand(agent.interactDur[0], agent.interactDur[1]);
        } else if (!agent.atDesk) {
          // Decide next: rest or return
          if (Math.random() < 0.5) {
            agent.state = 'RESTING';
            agent.phaseTimer = 0;
            agent.nextStateIn = rand(agent.restDur[0], agent.restDur[1]);
          } else {
            // Return to desk
            agent.state = 'WALKING';
            agent.target = getDeskCenter(agent.desk);
          }
        } else {
          agent.state = 'WORKING';
        }
      } else {
        const spd = 1.2;
        agent.x += (dx/d)*spd;
        agent.y += (dy/d)*spd;
        agent.walkFrame = (agent.walkFrame + 0.15) % 2;
      }
      break;

    case 'INTERACTING':
      if (!agent.interactWith) { agent.state='WORKING'; break; }
      agent.interactFrame = (agent.interactFrame + 0.08) % 2;
      if (!agent.bubbleText && Math.random() < 0.02) {
        agent.bubbleText = agent.messages[Math.floor(Math.random()*agent.messages.length)];
        agent.bubbleTimer = 2500;
      }
      if (agent.bubbleTimer > 0) {
        agent.bubbleTimer -= dt;
        if (agent.bubbleTimer <= 0) agent.bubbleText = '';
      }
      if (agent.phaseTimer >= agent.nextStateIn) {
        agent.phaseTimer = 0;
        // End interaction and return to desk
        agent.interactWith = null;
        agent.state = 'WALKING';
        agent.target = getDeskCenter(agent.desk);
        agent.atDesk = true;
        agent.bubbleText = '';
      }
      break;

    case 'RESTING':
      if (!agent.bubbleText && Math.random() < 0.008) {
        const restMsgs = ['休息一下 😌','☕ 充充电','😴 小憩一会','放空 🧘'];
        agent.bubbleText = restMsgs[Math.floor(Math.random()*restMsgs.length)];
        agent.bubbleTimer = 3000;
      }
      if (agent.bubbleTimer > 0) {
        agent.bubbleTimer -= dt;
        if (agent.bubbleTimer <= 0) agent.bubbleText = '';
      }
      if (agent.phaseTimer >= agent.nextStateIn) {
        agent.phaseTimer = 0;
        agent.state = 'WALKING';
        agent.target = getDeskCenter(agent.desk);
        agent.atDesk = true;
        agent.bubbleText = '';
      }
      break;
  }
}

// ─────────────────────────────────────────────
//  DRAWING HELPERS
// ─────────────────────────────────────────────
function roundRect(x,y,w,h,r,color) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawArea(area) {
  // Floor
  roundRect(area.x+4, area.y+4, area.w-8, area.h-8, 8, area.floor);

  // Inner subtle grid
  ctx.save();
  ctx.strokeStyle = area.color;
  ctx.lineWidth = 0.5;
  ctx.globalAlpha = 0.3;
  for(let gx=area.x+20; gx<area.x+area.w; gx+=30){
    ctx.beginPath(); ctx.moveTo(gx,area.y+4); ctx.lineTo(gx,area.y+area.h-4); ctx.stroke();
  }
  for(let gy=area.y+20; gy<area.y+area.h; gy+=30){
    ctx.beginPath(); ctx.moveTo(area.x+4,gy); ctx.lineTo(area.x+area.w-4,gy); ctx.stroke();
  }
  ctx.restore();

  // Area label
  ctx.font = 'bold 11px Courier New';
  ctx.fillStyle = area.accent;
  ctx.globalAlpha = 0.7;
  ctx.fillText(area.label, area.x+14, area.y+22);
  ctx.globalAlpha = 1;
}

function drawDesk(cx, cy, deskW, deskH, color, computer=true) {
  // Desk surface (top-down oval/rect)
  roundRect(cx - deskW/2, cy - deskH/2, deskW, deskH, 6, color);

  // Desk border
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  roundRect(cx - deskW/2, cy - deskH/2, deskW, deskH, 6, color);
  ctx.stroke();

  if (computer) {
    // Monitor (top-down rect)
    const mw = 32, mh = 22;
    roundRect(cx - mw/2, cy - mh/2 - 4, mw, mh, 3, '#1a1a2a');
    ctx.fillStyle = '#1a2940';
    ctx.fillRect(cx - mw/2+2, cy - mh/2-2, mw-4, mh-4);
    // Screen glow
    ctx.fillStyle = 'rgba(80,160,255,0.3)';
    ctx.fillRect(cx - mw/2+2, cy - mh/2-2, mw-4, mh-4);
    // Screen content lines
    ctx.fillStyle = 'rgba(100,200,255,0.5)';
    ctx.fillRect(cx - mw/2+4, cy - mh/2, 14, 2);
    ctx.fillRect(cx - mw/2+4, cy - mh/2+4, 10, 2);
    ctx.fillRect(cx - mw/2+4, cy - mh/2+8, 18, 2);
    // Monitor stand
    ctx.fillStyle = '#444';
    ctx.fillRect(cx-3, cy+2, 6, 4);

    // Keyboard (top-down)
    const kbW = 22, kbH = 10;
    roundRect(cx - kbW/2, cy + 8, kbW, kbH, 2, '#2a2a3a');
    // Key rows
    ctx.fillStyle = '#3a3a4a';
    for(let kr=0; kr<2; kr++){
      for(let kc=0; kc<4; kc++){
        ctx.fillRect(cx - kbW/2+2+kc*5, cy+9+kr*4, 3, 3);
      }
    }

    // Cup (circle)
    ctx.beginPath();
    ctx.arc(cx + deskW/2 - 10, cy - deskH/2 + 8, 5, 0, Math.PI*2);
    ctx.fillStyle = '#c8a060';
    ctx.fill();
    ctx.strokeStyle = '#a08040';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
}

// Nameplate below desk
function drawNameplate(cx, cy, name, color) {
  ctx.font = 'bold 9px Courier New';
  const tw = ctx.measureText(name).width;
  roundRect(cx - tw/2 - 5, cy + 24, tw + 10, 14, 4, 'rgba(0,0,0,0.7)');
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(name, cx, cy + 34);
  ctx.textAlign = 'left';
}

// Draw area dividers
function drawDividers() {
  // Vertical divider
  ctx.strokeStyle = 'rgba(245,197,66,0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8,6]);
  ctx.beginPath(); ctx.moveTo(480, 10); ctx.lineTo(480, H-10); ctx.stroke();
  // Horizontal divider
  ctx.beginPath(); ctx.moveTo(10, 330); ctx.lineTo(W-10, 330); ctx.stroke();
  ctx.setLineDash([]);
}

  // Coffee table
  roundRect(860, 500, 80, 40, 6, '#3a2518');
  // Coffee cup on table
  ctx.beginPath(); ctx.arc(900, 515, 6, 0, Math.PI*2);
  ctx.fillStyle = '#d4a060'; ctx.fill();
  ctx.strokeStyle = '#b08040'; ctx.lineWidth = 0.8; ctx.stroke();
  // Gaming table
  roundRect(1000, 480, 130, 60, 8, '#1a3040');
  roundRect(1008, 490, 114, 40, 6, '#1e3850');
  // Screen on gaming table
  ctx.fillStyle = '#0a1520';
  ctx.fillRect(1020, 493, 90, 30);
  ctx.fillStyle = 'rgba(0,200,120,0.4)';
  ctx.fillRect(1022, 495, 86, 26);
  // Game label
  ctx.font = 'bold 8px Courier New';
  ctx.fillStyle = 'rgba(0,200,120,0.7)';
  ctx.fillText('GAME', 1040, 510);
  // "REST AREA" label
  ctx.font = 'bold 12px Courier New';
  ctx.fillStyle = '#d47a9a';
  ctx.globalAlpha = 0.6;
  ctx.fillText('休息室 ☕', 640, 462);
  ctx.globalAlpha = 1;
}

// ─── PERSON (top-down view) ───
function drawPerson(x, y, agent, highlight) {
  const facing = agent.facing;
  const wf = Math.floor(agent.walkFrame); // 0 or 1
  const state = agent.state;

  ctx.save();
  if (highlight) {
    ctx.shadowColor = '#f5c542';
    ctx.shadowBlur = 16;
  }

  // Shadow
  ctx.beginPath();
  ctx.ellipse(x, y+14, 10, 5, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // Legs (only visible when walking, shown as small ovals below body)
  if (state === 'WALKING') {
    const legOff = wf === 0 ? 3 : -3;
    ctx.beginPath();
    ctx.ellipse(x-5, y+12, 3, 5, 0, 0, Math.PI*2);
    ctx.fillStyle = agent.shirtColor;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x+5, y+12, 3, 5, 0, 0, Math.PI*2);
    ctx.fillStyle = agent.shirtColor;
    ctx.fill();
  }

  // Body (half-circle, bottom-facing)
  ctx.beginPath();
  ctx.arc(x, y, 12, 0, Math.PI); // bottom half
  ctx.fillStyle = agent.shirtColor;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Arms
  if (state === 'WORKING' || (state === 'INTERACTING' && agent.interactFrame < 1)) {
    // Arms down/side
    ctx.beginPath();
    ctx.ellipse(x - 14, y + 2, 4, 3, -0.3, 0, Math.PI*2);
    ctx.fillStyle = agent.shirtColor;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 14, y + 2, 4, 3, 0.3, 0, Math.PI*2);
    ctx.fill();
  } else if (state === 'WALKING' || state === 'RESTING') {
    // Slight swing
    const swing = state === 'WALKING' ? (wf===0?6:-6) : 0;
    ctx.beginPath();
    ctx.ellipse(x - 14 + swing, y, 4, 3, -0.3, 0, Math.PI*2);
    ctx.fillStyle = agent.shirtColor;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 14 - swing, y, 4, 3, 0.3, 0, Math.PI*2);
    ctx.fill();
  }

  // Head (circle on top)
  ctx.beginPath();
  ctx.arc(x, y - 8, 9, 0, Math.PI*2);
  ctx.fillStyle = agent.skinColor;
  ctx.fill();

  // Hair (top cap, doesn't block top — hair is drawn as arc at top of head)
  ctx.beginPath();
  ctx.arc(x, y - 8, 9, Math.PI*1.1, Math.PI*1.9); // top arc only
  ctx.fillStyle = agent.hairColor;
  ctx.fill();

  // Eyes (small dots, facing direction)
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x - 3 + facing*1, y - 9, 1.5, 0, Math.PI*2);
  ctx.arc(x + 3 + facing*1, y - 9, 1.5, 0, Math.PI*2);
  ctx.fill();

  // Avatar on head
  ctx.font = '9px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(agent.avatar, x, y - 18);
  ctx.textAlign = 'left';

  // Name tag below feet
  ctx.font = 'bold 8px Courier New';
  const tw = ctx.measureText(agent.name).width;
  roundRect(x - tw/2 - 3, y + 16, tw + 6, 12, 3, 'rgba(0,0,0,0.7)');
  ctx.fillStyle = '#f5c542';
  ctx.textAlign = 'center';
  ctx.fillText(agent.name, x, y + 24);
  ctx.textAlign = 'left';

  // State icon
  if (state === 'RESTING') {
    ctx.font = '10px Arial';
    ctx.fillText('💤', x + 12, y - 20);
  } else if (state === 'THINKING') {
    ctx.font = '10px Arial';
    ctx.fillText('🤔', x + 12, y - 20);
  } else if (state === 'INTERACTING') {
    ctx.font = '10px Arial';
    ctx.fillText('💬', x - 20, y - 20);
  }

  ctx.restore();
}

// ─── SPEECH BUBBLE (above head, never blocking hair) ───
function drawBubble(x, y, text) {
  ctx.save();
  ctx.font = 'bold 9px Courier New';
  const tw = ctx.measureText(text).width;
  const bw = tw + 16;
  const bh = 18;
  // Position: well above head (y - 38 from center)
  const bx = x - bw/2;
  const by = y - 38 - bh;

  // Bubble background
  roundRect(bx, by, bw, bh, 6, 'rgba(255,255,255,0.95)');
  ctx.strokeStyle = '#f5c542';
  ctx.lineWidth = 1.5;
  roundRect(bx, by, bw, bh, 6, 'rgba(255,255,255,0.95)');
  ctx.stroke();

  // Tail (triangle pointing down to person)
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.moveTo(x - 5, by + bh);
  ctx.lineTo(x + 5, by + bh);
  ctx.lineTo(x, by + bh + 7);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#f5c542';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x - 5, by + bh);
  ctx.lineTo(x, by + bh + 7);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 5, by + bh);
  ctx.lineTo(x, by + bh + 7);
  ctx.stroke();

  // Text
  ctx.fillStyle = '#1a0a00';
  ctx.textAlign = 'center';
  ctx.fillText(text, x, by + 13);
  ctx.textAlign = 'left';
  ctx.restore();
}

// ─────────────────────────────────────────────
//  CLICK DETECTION
// ─────────────────────────────────────────────
let selectedAgent = null;

canvas.addEventListener('click', function(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  let found = null;
  for (const a of AGENTS) {
    if (Math.abs(a.x - mx) < 20 && Math.abs(a.y - my) < 24) {
      found = a;
      break;
    }
  }

  if (found) {
    selectedAgent = found;
    const panel = document.getElementById('detailPanel');
    document.getElementById('d-avatar').textContent = found.avatar;
    document.getElementById('d-name').textContent = found.name;
    document.getElementById('d-role').textContent = found.team + ' · ' + found.role;
    document.getElementById('d-status').textContent = found.state;
    document.getElementById('d-task').textContent = found.task;
    document.getElementById('d-mood').textContent = '⭐'.repeat(found.mood) + '☆'.repeat(10-found.mood) + ' ' + found.mood + '/10';
    document.getElementById('d-tokens').textContent = found.tokens.toLocaleString();
    document.getElementById('d-cost').textContent = found.cost;
    document.getElementById('d-journal').textContent = found.journal;
    panel.classList.add('open');
  } else {
    closeDetail();
  }
});

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedAgent = null;
}

// ─────────────────────────────────────────────
//  STATS UPDATE
// ─────────────────────────────────────────────
function updateStats() {
  let interacting=0, walking=0, resting=0;
  AGENTS.forEach(a => {
    if (a.state==='INTERACTING') interacting++;
    else if (a.state==='WALKING') walking++;
    else if (a.state==='RESTING') resting++;
  });
  document.getElementById('interacting').textContent = interacting;
  document.getElementById('walking').textContent = walking;
  document.getElementById('resting').textContent = resting;
}

// ─────────────────────────────────────────────
//  MAIN DRAW
// ─────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0d0a06';
  ctx.fillRect(0, 0, W, H);

  // Draw 4 areas
  for (const key in AREAS) drawArea(AREAS[key]);

  // Dividers
  drawDividers();

  // Rest area furniture
  drawRestArea();

  // Draw desks
  // CoPaw desk
  drawDesk(170, 155, 90, 60, '#3a2a10', true);
  drawNameplate(170, 155, '诸葛灯泡 💡', '#f5c542');

  // CrewAI desks
  const crewDesks = [
    {x:560,y:115}, {x:740,y:115}, {x:920,y:115},
    {x:620,y:235}, {x:820,y:235}
  ];
  const crewNames = ['船长 🧑‍✈️','探长 🕵️','秀才 🧑‍🏫','巧匠 👨‍🔧','掌柜 🧑‍💼'];
  crewDesks.forEach((d,i) => {
    drawDesk(d.x, d.y, 80, 50, '#0a2038', true);
    drawNameplate(d.x, d.y, crewNames[i], '#4da6d4');
  });

  // OpenClaw desks
  drawDesk(195, 445, 80, 50, '#0a2018', true);
  drawNameplate(195, 445, '小花 🐱', '#52c47a');
  drawDesk(355, 445, 80, 50, '#0a2018', true);
  drawNameplate(355, 445, '工程师 👨‍💻', '#52c47a');

  // Draw agents (sorted by y for depth)
  const sorted = [...AGENTS].sort((a,b) => a.y - b.y);
  sorted.forEach(a => {
    const highlight = selectedAgent && selectedAgent.id === a.id;
    drawPerson(a.x, a.y, a, highlight);
    if (a.bubbleText) drawBubble(a.x, a.y, a.bubbleText);
  });
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  AGENTS.forEach(a => updateAgent(a, dt));
  updateStats();
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
