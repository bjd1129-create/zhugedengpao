<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸葛灯泡 - Agent 实时工作台</title>
    <style>
        /* 奶油手绘风格基础样式 */
        body {
            margin: 0;
            padding: 20px;
            background-color: #fff9e6;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.1) 2px, transparent 3px),
                radial-gradient(circle at 85% 40%, rgba(255, 255, 255, 0.1) 2px, transparent 3px),
                radial-gradient(circle at 35% 80%, rgba(255, 255, 255, 0.1) 2px, transparent 3px);
            background-size: 100px 100px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 头部标题区域 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border-bottom: 2px dashed #d4a017;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
        }
        
        h1 {
            color: #8b4513;
            font-size: 2.5em;
            margin: 0;
            text-shadow: 2px 2px 0px rgba(212, 160, 23, 0.2);
        }
        
        .subtitle {
            color: #d4a017;
            font-size: 1.2em;
            margin-top: 10px;
        }
        
        /* 总览统计卡片 */
        .stats-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #ffffff, #fff8dc);
            border: 2px dashed #d4a017;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 20px;
            min-width: 180px;
            text-align: center;
            box-shadow: 5px 5px 0px rgba(139, 69, 19, 0.1);
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #8b4513;
            display: block;
        }
        
        .stat-label {
            color: #d4a017;
            font-size: 1em;
        }
        
        /* Agent 工作区 */
        .agents-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .agent-card {
            background: linear-gradient(135deg, #ffffff, #fff8dc);
            border: 2px dashed #d4a017;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 5px 5px 0px rgba(139, 69, 19, 0.1);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #d4a017;
        }
        
        .agent-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #d4a017, #f4a460);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .agent-info h3 {
            margin: 0;
            color: #8b4513;
        }
        
        .agent-status {
            font-size: 0.9em;
            color: #d4a017;
        }
        
        .agent-task {
            background-color: #fffacd;
            border-left: 4px solid #d4a017;
            padding: 10px;
            margin: 10px 0;
            border-radius: 0 10px 10px 0;
        }
        
        .task-title {
            font-weight: bold;
            color: #8b4513;
            margin-bottom: 5px;
        }
        
        .task-details {
            font-size: 0.9em;
            color: #5c4033;
        }
        
        /* 实时活动日志 */
        .activity-log {
            background: linear-gradient(135deg, #ffffff, #fff8dc);
            border: 2px dashed #d4a017;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 5px 5px 0px rgba(139, 69, 19, 0.1);
        }
        
        .log-title {
            text-align: center;
            color: #8b4513;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .log-entry {
            padding: 8px;
            margin: 5px 0;
            background-color: #fffacd;
            border-radius: 10px;
            font-size: 0.9em;
            animation: highlight 1s ease;
        }
        
        @keyframes highlight {
            0% { background-color: #ffffcc; }
            100% { background-color: #fffacd; }
        }
        
        .log-time {
            color: #d4a017;
            font-weight: bold;
        }
        
        .log-message {
            color: #5c4033;
        }
        
        .log-category {
            display: inline-block;
            background-color: #d4a017;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            margin-left: 5px;
        }
        
        /* 更新时间指示器 */
        .update-indicator {
            text-align: center;
            color: #d4a017;
            font-style: italic;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <div class="header">
            <h1>诸葛灯泡 - Agent 实时工作台</h1>
            <p class="subtitle">见证AI Agent团队实时分析市场信号，为您挖掘商业机会</p>
        </div>
        
        <!-- 统计总览 -->
        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-number" id="totalSignals">0</span>
                <span class="stat-label">总信号数</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="watchingCount">0</span>
                <span class="stat-label">监控中</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="validatingCount">0</span>
                <span class="stat-label">验证中</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="buildingCount">0</span>
                <span class="stat-label">构建中</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="shippedCount">0</span>
                <span class="stat-label">已交付</span>
            </div>
        </div>
        
        <!-- Agent 工作区 -->
        <div class="agents-container" id="agentsContainer">
            <!-- Agent 卡片将通过 JavaScript 动态生成 -->
        </div>
        
        <!-- 实时活动日志 -->
        <div class="activity-log">
            <h3 class="log-title">实时活动日志</h3>
            <div id="activityLog">
                <!-- 日志条目将通过 JavaScript 动态添加 -->
            </div>
        </div>
        
        <!-- 更新时间 -->
        <div class="update-indicator" id="updateIndicator">
            最后更新: 加载中...
        </div>
    </div>

    <script>
        // Agent 配置数据
        const agents = [
            {
                id: 1,
                name: "趋势猎手",
                role: "市场趋势分析师",
                status: "忙碌中",
                task: "正在分析 GitHub 趋势数据",
                details: "处理最新的开源项目动态，识别潜在的技术趋势"
            },
            {
                id: 2,
                name: "论文侦探",
                role: "学术研究分析师",
                status: "专注中",
                task: "正在扫描 arXiv 论文",
                details: "查找前沿学术研究，评估商业化潜力"
            },
            {
                id: 3,
                name: "竞情专家",
                role: "竞争情报分析师",
                status: "深度思考",
                task: "正在监控竞争对手",
                details: "跟踪主要竞争对手的产品发布和策略变化"
            },
            {
                id: 4,
                name: "新闻雷达",
                role: "新闻监测分析师",
                status: "高速运转",
                task: "正在筛选科技新闻",
                details: "从海量新闻中提取有价值的市场信息"
            },
            {
                id: 5,
                name: "信号整合师",
                role: "综合分析专家",
                status: "协同作业",
                task: "正在整合多源数据",
                details: "将各类信号进行关联分析，形成洞察报告"
            }
        ];
        
        // 模拟不同类型的任务
        const sampleTasks = [
            {
                title: "信号 #1: 新发现的市场机会",
                category: "Competitor Analysis",
                status: "Shipped",
                confidence: 0.84
            },
            {
                title: "信号 #2: 新发现的市场机会",
                category: "Competitor Analysis",
                status: "Validating",
                confidence: 0.84
            },
            {
                title: "信号 #3: 新发现的市场机会",
                category: "arXiv Papers",
                status: "Watching",
                confidence: 0.9
            },
            {
                title: "信号 #4: 新发现的市场机会",
                category: "arXiv Papers",
                status: "Watching",
                confidence: 0.78
            },
            {
                title: "信号 #5: 新发现的市场机会",
                category: "arXiv Papers",
                status: "On Hold",
                confidence: 0.67
            }
        ];
        
        // 生成随机头像颜色
        function getRandomAvatarColor() {
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F'];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // 渲染 Agent 卡片
        function renderAgents() {
            const container = document.getElementById('agentsContainer');
            container.innerHTML = '';
            
            agents.forEach(agent => {
                const agentCard = document.createElement('div');
                agentCard.className = 'agent-card';
                
                // 随机选择一个样本任务
                const randomTask = sampleTasks[Math.floor(Math.random() * sampleTasks.length)];
                
                agentCard.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-avatar" style="background-color: ${getRandomAvatarColor()};">
                            ${agent.name.charAt(0)}
                        </div>
                        <div class="agent-info">
                            <h3>${agent.name}</h3>
                            <div class="agent-status">状态: ${agent.status} | 角色: ${agent.role}</div>
                        </div>
                    </div>
                    <div class="agent-task">
                        <div class="task-title">${randomTask.title}</div>
                        <div class="task-details">
                            分类: ${randomTask.category} | 状态: ${randomTask.status} | 置信度: ${(randomTask.confidence * 100).toFixed(0)}%
                        </div>
                    </div>
                    <div class="agent-task">
                        <div class="task-title">当前任务:</div>
                        <div class="task-details">${agent.task}</div>
                    </div>
                    <div class="agent-task">
                        <div class="task-title">详细信息:</div>
                        <div class="task-details">${agent.details}</div>
                    </div>
                `;
                
                container.appendChild(agentCard);
            });
        }
        
        // 添加日志条目
        function addLogEntry(message, category) {
            const logContainer = document.getElementById('activityLog');
            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `
                <span class="log-time">[${timeString}]</span>
                <span class="log-message">${message}</span>
                <span class="log-category">${category}</span>
            `;
            
            // 添加到顶部
            if (logContainer.firstChild) {
                logContainer.insertBefore(logEntry, logContainer.firstChild);
            } else {
                logContainer.appendChild(logEntry);
            }
            
            // 限制日志数量为15条
            if (logContainer.children.length > 15) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }
        
        // 更新统计数据
        function updateStats(data) {
            document.getElementById('totalSignals').textContent = data.total_signals;
            document.getElementById('watchingCount').textContent = data.by_status.Watching;
            document.getElementById('validatingCount').textContent = data.by_status.Validating;
            document.getElementById('buildingCount').textContent = data.by_status.Building;
            document.getElementById('shippedCount').textContent = data.by_status.Shipped;
        }
        
        // 获取最新数据
        async function fetchLatestData() {
            try {
                const response = await fetch('office_status.json');
                const data = await response.json();
                
                updateStats(data);
                
                // 更新最后更新时间
                const timestamp = new Date(data.timestamp);
                document.getElementById('updateIndicator').textContent = `最后更新: ${timestamp.toLocaleString()}`;
                
                // 添加最近的活动到日志
                data.recent_activity.slice(0, 3).forEach(activity => {
                    const activityTime = new Date(activity.timestamp * 1000);
                    addLogEntry(`${activity.title} - 状态: ${activity.status}`, activity.category);
                });
                
                return data;
            } catch (error) {
                console.error('获取数据失败:', error);
                // 如果获取失败，使用模拟数据
                const mockData = {
                    total_signals: 432,
                    by_status: {
                        Watching: 125,
                        Validating: 11,
                        Building: 5,
                        Shipped: 58,
                        "On Hold": 114
                    },
                    recent_activity: [
                        {
                            title: "新信号检测到 - GitHub Trending",
                            category: "GitHub Trends",
                            status: "Watching",
                            timestamp: Date.now()/1000
                        }
                    ]
                };
                updateStats(mockData);
                document.getElementById('updateIndicator').textContent = `最后更新: ${new Date().toLocaleString()}`;
                addLogEntry("系统启动 - 开始监控市场信号", "System");
                return mockData;
            }
        }
        
        // 初始化页面
        async function initPage() {
            // 渲染 Agent
            renderAgents();
            
            // 获取初始数据
            await fetchLatestData();
            
            // 模拟实时活动
            setInterval(() => {
                const randomAgent = agents[Math.floor(Math.random() * agents.length)];
                const actions = [
                    `正在分析 ${randomAgent.role} 相关数据`,
                    `处理新的市场信号`,
                    `验证数据准确性`,
                    `生成洞察报告`,
                    `与其它Agent协同工作`
                ];
                const categories = ["GitHub Trends", "arXiv Papers", "Market Signals", "Tech News", "Competitor Analysis"];
                
                const action = actions[Math.floor(Math.random() * actions.length)];
                const category = categories[Math.floor(Math.random() * categories.length)];
                
                addLogEntry(`${randomAgent.name} - ${action}`, category);
            }, 3000);
            
            // 定期更新数据
            setInterval(fetchLatestData, 10000);
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
