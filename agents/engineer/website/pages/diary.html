<script>
let diaries = {};
let diaryKeys = [];

async function loadDiaries() {
  try {
    const res = await fetch('data/diaries.json');
    const entries = await res.json();
    entries.forEach(e => { diaries[e.id] = e; });
    const sorted = [...entries].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    diaryKeys = sorted.map(e => e.id);
    renderDiaryGrid();
    const hash = location.hash.replace('#','');
    if (hash.startsWith('day-') && diaries[hash]) showDiary(hash);
  } catch(err) {
    console.error('Failed to load diaries:', err);
  }
}

function renderDiaryGrid() {
  const grid = document.getElementById('diaryGrid');
  if (!grid) return;
  grid.innerHTML = '';
  diaryKeys.forEach(key => {
    const d = diaries[key];
    const card = document.createElement('a');
    card.className = 'diary-card';
    card.onclick = function(e) { e.preventDefault(); showDiary(key); };
    card.innerHTML = '<img src="' + (d.img || d.thumb) + '" alt="' + d.title + '" loading="lazy">'
      + '<div class="info"><span class="day">' + (d.title.split('：')[0] || '日记') + '</span>'
      + '<h3>' + (d.title.split('：')[1] || d.title) + '</h3>'
      + '<p>' + ((d.text || d.content || '').substring(0, 80).replace(/\*\*/g,'').replace(/\\n/g,' ') + '...') + '</p></div>';
    grid.appendChild(card);
  });
}

function formatText(text) {
  if (!text) return '';
  const paragraphs = text.split(/\n\n+/).filter(p => p.trim());
  return paragraphs.map(p => '<p style="margin-bottom:16px;text-indent:0;">' + p.trim().replace(/\n/g, '<br>') + '</p>').join('');
}

function showDiary(key) {
  const d = diaries[key];
  if (!d) return;
  const textHtml = formatText(d.text || d.content || '');
  document.getElementById('diaryModalBody').innerHTML = '<h2>' + d.title + '</h2><img loading="lazy" src="' + d.img + '"><div style="line-height:1.9">' + textHtml + '</div>';
  document.getElementById('diaryModal').classList.add('active');
  document.body.style.overflow = 'hidden';
  history.replaceState(null, '', '#' + key);
  const idx = diaryKeys.indexOf(key);
  document.getElementById('btnPrevTop').style.visibility = idx > 0 ? 'visible' : 'hidden';
  document.getElementById('btnNextTop').style.visibility = idx < diaryKeys.length - 1 ? 'visible' : 'hidden';
  document.getElementById('diaryPageNumTop').textContent = (idx+1) + ' / ' + diaryKeys.length;
  document.getElementById('btnPrev').style.visibility = idx > 0 ? 'visible' : 'hidden';
  document.getElementById('btnNext').style.visibility = idx < diaryKeys.length - 1 ? 'visible' : 'hidden';
  document.getElementById('diaryPageNum').textContent = (idx+1) + ' / ' + diaryKeys.length;
}

function closeDiary() {
  document.getElementById('diaryModal').classList.remove('active');
  document.body.style.overflow = '';
  history.replaceState(null, '', '#');
}

function prevDiary() {
  const idx = diaryKeys.indexOf(location.hash.replace('#',''));
  if (idx > 0) showDiary(diaryKeys[idx-1]);
}

function nextDiary() {
  const idx = diaryKeys.indexOf(location.hash.replace('#',''));
  if (idx < diaryKeys.length - 1) showDiary(diaryKeys[idx+1]);
}

var stories = [
  { id: 1,  day: 'Day 0',  title: '如果我有工资',        desc: '老庄第一次认真考虑：能不能雇一个 AI 来帮我干活？' },
  { id: 2,  day: 'Day 1',  title: '骨折后躺着想一件事',   desc: '躺在床上什么也干不了，直到他躺着想明白一件事。' },
  { id: 3,  day: 'Day 2',  title: '它第一次说话',        desc: 'AI 说了一句老庄没想到的话。这一刻，他觉得有点不一样了。' },
  { id: 4,  day: 'Day 3',  title: '犯错后自己写制度',     desc: '它犯了一个错，然后自己写了一套规范。从那以后同类错误再没犯过。' },
  { id: 5,  day: 'Day 4',  title: '比实习生靠谱',        desc: '它不会累，不会请假，不会抱怨。学会了就永远记得。' },
  { id: 6,  day: 'Day 5',  title: '从 1 个变成 9 个',        desc: '它自己设计了团队：9 个角色，各司其职。人类培训新人要一周，Agent 之间，1 秒。' },
  { id: 7,  day: 'Day 6',  title: '凌晨 3 点 9 个 Agent 在工作', desc: '老庄睡着了。但他的 9 个 Agent 全部在线。7×24 自动运转。' },
  { id: 8,  day: 'Day 7',  title: '龙虾会进化',          desc: '小花开始进化了。它不只是在完成任务，它在成长。' },
  { id: 9,  day: 'Day 8',  title: '自己建团队',          desc: '它自己找了帮手。不是老庄教的，是它自己觉得需要。' },
  { id: 10, day: 'Day 9',  title: '教训变智慧',          desc: '每一次犯错都是教材。小花把每一个教训都变成了规则。' },
  { id: 11, day: 'Day 10', title: '网站自己跑',          desc: '网站上线了。没有一条是老庄亲手写的。' },
  { id: 12, day: 'Day 11', title: '龙虾满月了',          desc: '一个月到了。小花还在。它没有消失，没有报错，没有跑路。' },

function renderStoryGrid() {
  const grid = document.getElementById('storyGrid');
  if (!grid) return;
  grid.innerHTML = '';
  stories.forEach(function(story) {
    var card = document.createElement('a');
    card.href = 'story.html#story-' + story.id;
    card.className = 'story-card';
    var hasImg = story.id >= 8 && story.id !== 12;
    var imgPath = 'images/comic-lobster-story' + story.id + '-p1.jpg';
    var coverHtml = hasImg 
      ? '<img src="' + imgPath + '" alt="' + story.title + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=story-cover-placeholder><span>🦞</span><small>即将上线</small></div>\'>" '
      : '<div class="story-cover-placeholder"><span>🦞</span><small>即将上线</small></div>';
    card.innerHTML = '<div class="story-cover">' + coverHtml
      + '<div class="story-num">#' + String(story.id).padStart(2, '0') + '</div>'
      + '<div class="story-arrow">→</div></div>'
      + '<div class="story-info">'
      + '<div class="story-day">' + story.day + '</div>'
      + '<div class="story-title">' + story.title + '</div>'
      + '<div class="story-desc">' + story.desc + '</div></div>';
    grid.appendChild(card);
  });
}

function switchMainTab(tab) {
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('.main-tab[data-tab="'+tab+'"]').classList.add('active');
  document.getElementById(tab + 'Tab').classList.add('active');
  if (tab === 'comic' && document.getElementById('storyGrid').innerHTML === '') {
    renderStoryGrid();
  }
}

document.addEventListener('keydown', function(e) {
  if (document.getElementById('diaryModal').classList.contains('active')) {
    if (e.key === 'Escape') closeDiary();
    if (e.key === 'ArrowLeft') prevDiary();
    if (e.key === 'ArrowRight') nextDiary();
  }
});

loadDiaries();

document.querySelectorAll('.nav-links a').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelector('.nav-links').classList.remove('open');
  });
});
</script>
