<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>测试页面</title>
  <style>
    body { margin: 0; background: #667eea; display: flex; justify-content: center; align-items: center; height: 100vh; }
    h1 { color: white; font-family: Arial; }
  </style>
</head>
<body>
  <h1>如果看到这个，游戏可能没运行</h1>
  <script src="phaser.min.js"></script>
  <script>
    console.log('Phaser loaded:', typeof Phaser);
    console.log('Phaser version:', Phaser ? Phaser.VERSION : 'NOT LOADED');
    
    if (typeof Phaser === 'undefined') {
      document.body.innerHTML += '<p style="color:red">ERROR: Phaser not loaded!</p>';
    } else {
      document.body.innerHTML += '<p style="color:green">Phaser OK: ' + Phaser.VERSION + '</p>';
      
      // 创建最简游戏
      const game = new Phaser.Game({
        type: Phaser.AUTO,
        width: 400,
        height: 300,
        backgroundColor: '#ff0000',
        scene: {
          create: function() {
            console.log('Scene create called');
            this.add.text(200, 150, '游戏运行中!', {
              fontSize: '24px',
              color: '#ffffff'
            }).setOrigin(0.5);
          }
        }
      });
      
      console.log('Game created');
    }
  </script>
</body>
</html>
