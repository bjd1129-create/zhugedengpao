<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>操盘实录 | 老庄与小花</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#f5f7fa;color:#2c3e50;padding-top:64px}
nav{position:fixed;top:0;left:0;width:100%;z-index:1000;background:rgba(255,255,255,0.95);backdrop-filter:blur(16px);border-bottom:1.5px solid #e0e6ed;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.nav-logo{font-family:'ZCOOL KuaiLe',sans-serif;font-size:22px;color:#2c3e50;text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-logo span{font-size:28px}
.nav-links{display:flex;gap:20px;align-items:center}
.nav-links a{text-decoration:none;color:#7f8c8d;font-size:15px;font-weight:600;padding:6px 4px;transition:color 0.2s}
.nav-links a:hover,.nav-links a.active{color:#3498db}
main{max-width:1200px;margin:0 auto;padding:32px 24px 80px}
.page-header{text-align:center;margin-bottom:40px}
.page-header h1{font-family:'ZCOOL KuaiLe',sans-serif;font-size:clamp(28px,5vw,42px);color:#2c3e50;margin-bottom:12px}
.page-header p{font-size:15px;color:#7f8c8d}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;margin-bottom:40px}
.card{background:#fff;border:1px solid #e0e6ed;border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.25s ease;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.12);border-color:#3498db}
.card-header{display:flex;align-items:center;gap:12px;padding:20px;border-bottom:2px solid #e0e6ed;background:linear-gradient(135deg,#f8f9fa 0%,#ffffff 100%)}
.card-icon{font-size:36px}
.card-title{font-size:18px;font-weight:700;color:#2c3e50}
.card-provider{font-size:12px;color:#7f8c8d;margin-top:4px}
.card-body{padding:20px}
.stat-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed #e0e6ed}
.stat-row:last-child{border-bottom:none}
.stat-label{font-size:13px;color:#7f8c8d}
.stat-value{font-size:15px;font-weight:700;color:#2c3e50}
.stat-value.large{font-size:22px;color:#3498db}
.stat-value.positive{color:#27ae60}
.stat-value.negative{color:#e74c3c}
.status-badge{display:inline-block;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-top:12px}
.status-running{background:#d4edda;color:#155724}
.status-stopped{background:#f8d7da;color:#721c24}
.positions-summary{margin-top:16px;padding-top:16px;border-top:2px solid #e0e6ed}
.positions-title{font-size:13px;font-weight:700;color:#7f8c8d;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.position-item{display:flex;justify-content:space-between;padding:10px 0;font-size:13px;border-bottom:1px solid #f0f0f0}
.position-item:last-child{border-bottom:none}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:2000;justify-content:center;align-items:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-content{background:#fff;border-radius:16px;max-width:900px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:2px solid #e0e6ed;background:linear-gradient(135deg,#f8f9fa 0%,#ffffff 100%)}
.modal-title{font-size:20px;font-weight:700;color:#2c3e50}
.modal-close{font-size:28px;cursor:pointer;color:#7f8c8d;background:none;border:none;padding:4px;transition:color 0.2s}
.modal-close:hover{color:#e74c3c}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.trade-table{width:100%;border-collapse:collapse;font-size:14px}
.trade-table th{text-align:left;padding:12px 16px;background:#f8f9fa;color:#7f8c8d;font-weight:600;border-bottom:2px solid #e0e6ed;text-transform:uppercase;font-size:12px;letter-spacing:0.5px}
.trade-table td{padding:14px 16px;border-bottom:1px solid #e0e6ed}
.trade-table tr:hover{background:#f8f9fa}
.trade-type{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700}
.trade-type.buy{background:#d4edda;color:#155724}
.trade-type.sell{background:#f8d7da;color:#721c24}
@media(max-width:768px){.nav-links{display:none}main{padding:24px 16px 60px}.cards-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><span>🦞</span> 老庄与小花</a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="diary.html">📖 日记</a>
    <a href="articles.html">📝 文章</a>
    <a href="tongtong-letters.html">💌 桐桐</a>
    <a href="trading.html" class="active">📈 操盘</a>
  </div>
</nav>
<main>
  <header class="page-header">
    <h1>📈 操盘实录</h1>
    <p>4 个模拟盘实时追踪 · 美股 / 期货 / Polymarket / 加密货币</p>
  </header>
  <div class="cards-grid" id="cardsGrid"></div>
</main>
<div class="modal-overlay" id="tradeModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">交易记录</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<script>
const simulations={us:{name:"美股模拟盘",provider:"老虎证券",icon:"📈",initialCapital:1e6,currentValue:1023450,cash:234500,currency:"USD",status:"running",positions:[{symbol:"AAPL",shares:100,avgPrice:175.5,currentPrice:182.3,return:6.15},{symbol:"NVDA",shares:50,avgPrice:485.2,currentPrice:512.8,return:5.7},{symbol:"MSFT",shares:80,avgPrice:412,currentPrice:425.6,return:3.3}],trades:[{time:"2026-04-08 10:30",type:"buy",symbol:"AAPL",shares:100,price:175.5,total:17550},{time:"2026-04-08 11:15",type:"buy",symbol:"NVDA",shares:50,price:485.2,total:24260},{time:"2026-04-08 14:20",type:"buy",symbol:"MSFT",shares:80,price:412,total:32960},{time:"2026-04-07 09:45",type:"sell",symbol:"TSLA",shares:30,price:198.5,total:5955},{time:"2026-04-06 15:30",type:"buy",symbol:"TSLA",shares:30,price:192.3,total:5769}]},futures:{name:"期货模拟盘",provider:"老虎证券",icon:"📊",initialCapital:5e5,currentValue:512340,cash:312340,currency:"USD",status:"running",positions:[{symbol:"ES (标普 500)",shares:2,avgPrice:5120.5,currentPrice:5145.25,return:2.45},{symbol:"NQ (纳斯达克)",shares:3,avgPrice:18200,currentPrice:18350.5,return:4.12},{symbol:"GC (黄金)",shares:5,avgPrice:2180.3,currentPrice:2195.8,return:1.42}],trades:[{time:"2026-04-08 09:30",type:"buy",symbol:"ES",shares:2,price:5120.5,total:256025},{time:"2026-04-08 10:15",type:"buy",symbol:"NQ",shares:3,price:18200,total:109200},{time:"2026-04-07 14:30",type:"buy",symbol:"GC",shares:5,price:2180.3,total:54507.5},{time:"2026-04-06 11:00",type:"sell",symbol:"CL",shares:10,price:85.2,total:85200},{time:"2026-04-05 16:45",type:"buy",symbol:"CL",shares:10,price:83.5,total:83500}]},polymarket:{name:"Polymarket 模拟盘",provider:"Polymarket",icon:"🎯",initialCapital:1e5,currentValue:102710,cash:97290,currency:"USD",status:"running",positions:[{market:"BTC<$65K",direction:"NO",invested:700,potentialReturn:1e4},{market:"ETH<$2000",direction:"NO",invested:600,potentialReturn:15000},{market:"SOL>$80",direction:"NO",invested:650,potentialReturn:5000},{market:"US enters Iran Apr30",direction:"NO",invested:760,potentialReturn:2000}],trades:[{time:"2026-04-08 09:00",type:"buy",symbol:"BTC<$65K NO",shares:700,price:.7,total:700},{time:"2026-04-08 09:15",type:"buy",symbol:"ETH<$2000 NO",shares:600,price:.6,total:600},{time:"2026-04-07 14:30",type:"buy",symbol:"SOL>$80 NO",shares:650,price:.65,total:650},{time:"2026-04-07 15:00",type:"buy",symbol:"US enters Iran",shares:760,price:.76,total:760}]},crypto:{name:"加密货币网格",provider:"Binance",icon:"₿",initialCapital:1e4,currentValue:10234.56,cash:6848.44,currency:"USDT",status:"stopped",stopFile:"空仓观望",positions:[],trades:[{time:"2026-04-05 08:00",type:"buy",symbol:"BTC",shares:.05,price:67500,total:3375},{time:"2026-04-05 12:30",type:"sell",symbol:"BTC",shares:.05,price:68200,total:3410},{time:"2026-04-04 16:45",type:"buy",symbol:"ETH",shares:1.5,price:2050,total:3075},{time:"2026-04-04 20:15",type:"sell",symbol:"ETH",shares:1.5,price:2080,total:3120}]}};
function formatMoney(a,c){const s={USD:'$',USDT:'₮',CNY:'¥'};return(s[c]||'$')+a.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function formatReturn(p){const c=p>=0?'positive':'negative',s=p>=0?'+':'';return`<span class="stat-value ${c}">${s}${p.toFixed(2)}%</span>`}
function createCard(k,d){const c=document.createElement('div');c.className='card';c.onclick=()=>showTrades(k);const t=d.initialCapital?((d.currentValue-d.initialCapital)/d.initialCapital*100):0;let p='';if(d.positions&&d.positions.length>0){p=`<div class="positions-summary"><div class="positions-title">📊 持仓 (${d.positions.length}个)</div>`+d.positions.map(x=>`<div class="position-item"><span class="position-market">${x.symbol} ${x.direction||''}</span><span class="position-return">${x.return!==undefined?formatReturn(x.return):'潜在'+formatMoney(x.potentialReturn,d.currency)}</span></div>`).join('')+'</div>'}
c.innerHTML=`<div class="card-header"><span class="card-icon">${d.icon}</span><div><div class="card-title">${d.name}</div><div class="card-provider">${d.provider}</div></div></div><div class="card-body"><div class="stat-row"><span class="stat-label">初始资金</span><span class="stat-value">${formatMoney(d.initialCapital,d.currency)}</span></div><div class="stat-row"><span class="stat-label">当前价值</span><span class="stat-value large">${formatMoney(d.currentValue,d.currency)}</span></div><div class="stat-row"><span class="stat-label">可用现金</span><span class="stat-value">${formatMoney(d.cash,d.currency)}</span></div><div class="stat-row"><span class="stat-label">总收益</span>${formatReturn(t)}</div>${p}<div class="status-badge ${d.status==='running'?'status-running':'status-stopped'}">${d.status==='running'?'▶️ 运行中':'⏸️ 已停止'}</div>${d.status==='stopped'&&d.stopFile?`<p style="font-size:12px;color:#7f8c8d;margin-top:8px">原因：${d.stopFile}</p>`:''}</div>`;return c}
function showTrades(k){const d=simulations[k];document.getElementById('modalTitle').textContent=`${d.name} - 交易记录`;if(!d.trades||d.trades.length===0){document.getElementById('modalBody').innerHTML=`<div class="empty-state"><div class="emoji">📭</div><p>暂无交易记录</p></div>`}else{document.getElementById('modalBody').innerHTML=`<table class="trade-table"><thead><tr><th>交易时间</th><th>类型</th><th>标的</th><th>数量</th><th>价格</th><th>总额</th></tr></thead><tbody>`+d.trades.map(t=>`<tr><td class="trade-time">${t.time}</td><td><span class="trade-type ${t.type}">${t.type==='buy'?'买入':'卖出'}</span></td><td style="font-weight:600">${t.symbol}</td><td>${t.shares}</td><td class="trade-price">${formatMoney(t.price,d.currency)}</td><td style="font-weight:700">${formatMoney(t.total,d.currency)}</td></tr>`).join('')+'</tbody></table>'}
document.getElementById('tradeModal').classList.add('active');document.body.style.overflow='hidden'}
function closeModal(){document.getElementById('tradeModal').classList.remove('active');document.body.style.overflow=''}
function render(){const c=document.getElementById('cardsGrid');['us','futures','polymarket','crypto'].forEach(k=>c.appendChild(createCard(k,simulations[k])))}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
render();
</script>
</body>
</html>
