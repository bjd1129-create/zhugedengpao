<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>需求雷达 | 诸葛灯泡</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;--text:#e0e0e8;--muted:#6b6b80;--green:#22c55e;--yellow:#eab308;--blue:#3b82f6;--purple:#a855f7;--pink:#ec4899;--orange:#f97316;--red:#ef4444}
    body{background:var(--bg);color:var(--text);font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
    .nav{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,15,0.9);backdrop-filter:blur(12px);z-index:100}
    .nav-brand{font-size:18px;font-weight:700;color:var(--green);text-decoration:none}
    .nav-links{display:flex;gap:20px}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:14px;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--text)}
    .header{padding:40px 32px 24px;border-bottom:1px solid var(--border)}
    .header h1{font-size:36px;font-weight:800;margin-bottom:8px}
    .header h1 span{color:var(--blue)}
    .header p{color:var(--muted);font-size:16px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;padding:24px 32px;border-bottom:1px solid var(--border)}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
    .stat-val{font-size:32px;font-weight:800}
    .stat-lbl{font-size:13px;color:var(--muted);margin-top:4px}
    .stat:nth-child(1) .stat-val{color:var(--blue)}
    .stat:nth-child(2) .stat-val{color:var(--green)}
    .stat:nth-child(3) .stat-val{color:var(--yellow)}
    .stat:nth-child(4) .stat-val{color:var(--purple)}
    .section{padding:24px 32px;border-bottom:1px solid var(--border)}
    .section-title{font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .section-title::before{content:'';width:4px;height:20px;background:var(--blue);border-radius:2px}
    .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s}
    .filter-btn:hover,.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .signal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
    .signal-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .3s;position:relative;overflow:hidden}
    .signal-card:hover{border-color:var(--blue);transform:translateY(-2px)}
    .signal-card.high::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green)}
    .signal-card.medium::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--yellow)}
    .signal-card.low::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--muted)}
    .signal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .signal-src{font-size:12px;padding:4px 8px;border-radius:4px;background:rgba(59,130,246,0.15);color:var(--blue)}
    .signal-time{font-size:12px;color:var(--muted)}
    .signal-title{font-size:16px;font-weight:600;margin-bottom:8px}
    .signal-desc{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:12px}
    .signal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .signal-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--border);color:var(--text)}
    .signal-action{padding-top:12px;border-top:1px solid var(--border);font-size:13px;color:var(--green)}
    .footer{padding:24px 32px;text-align:center;color:var(--muted);font-size:13px}
    @media(max-width:768px){.nav{padding:12px 16px}.header{padding:24px 16px}.header h1{font-size:28px}.stats,.section{padding:16px}.signal-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/index.html" class="nav-brand">🦞 诸葛灯泡</a>
    <div class="nav-links">
      <a href="/office.html">办公室</a>
      <a href="/team.html">团队</a>
      <a href="/radar.html" class="active">雷达</a>
      <a href="/trading.html">交易</a>
      <a href="/articles.html">文章</a>
      <a href="/bagua.html">八卦</a>
    </div>
  </nav>

  <header class="header">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">
      <div>
        <h1>📡 需求 <span>雷达</span></h1>
        <p>探长 24 小时不间断扫描 — 市场信号、热点趋势、被忽视的 Alpha</p>
      </div>
      <div class="live-badge"><span class="live-dot"></span> LIVE · 自动扫描</div>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-val">89</div><div class="stat-lbl">总信号</div></div>
    <div class="stat"><div class="stat-val">3</div><div class="stat-lbl">高价值机会</div></div>
    <div class="stat"><div class="stat-val">12</div><div class="stat-lbl">今日新增</div></div>
    <div class="stat"><div class="stat-val">87%</div><div class="stat-lbl">预测准确率</div></div>
  </div>

  <div class="section">
    <div class="section-title">信号流</div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filter('all',this)">全部</button>
      <button class="filter-btn" onclick="filter('high',this)">🔥 高价值</button>
      <button class="filter-btn" onclick="filter('polymarket',this)">Polymarket</button>
      <button class="filter-btn" onclick="filter('github',this)">GitHub</button>
      <button class="filter-btn" onclick="filter('ai',this)">AI/LLM</button>
      <button class="filter-btn" onclick="filter('crypto',this)">Crypto</button>
    </div>
    <div class="signal-grid" id="grid"></div>
  </div>

  <footer class="footer">诸葛灯泡 © 2026 · 一个农民和他的 AI 龙虾 · 数据来源: Polymarket, GitHub, ArXiv</footer>

  <script>
    const signals = [
      {id:1,title:"AI Agent 框架竞争白热化",desc:"OpenClaw v2026.3.2 发布，新增自我进化插件。CrewAI 同步更新 v0.9。框架之战刚开始。",src:"GitHub",time:"2h",pri:"high",tags:["AI","框架","竞争"],action:"→ 建议关注 self-evolve-skill"},
      {id:2,title:"Polymarket: AI 监管法案概率升至 41%",desc:"市场对 AI 监管立法的押注从 23% 升至 41%。科技股波动可能加剧，需关注对冲机会。",src:"Polymarket",time:"3h",pri:"high",tags:["政策","AI","市场"],action:"→ 关注科技股对冲机会"},
      {id:3,title:"Claude 4 泄漏基准测试",desc:"Leaked benchmark 显示 Claude 4 在 coding 上超越 GPT-4o 15%。模型竞赛加速。",src:"Twitter/X",time:"5h",pri:"medium",tags:["LLM","基准","竞争"],action:"→ 评估迁移 Claude 4 API"},
      {id:4,title:"百炼 qwen3-coder-plus 免费额度翻倍",desc:"阿里云免费 token 从 2000 万提升至 4000 万/天。工程师 Agent 可全力开发。",src:"阿里云",time:"6h",pri:"high",tags:["百炼","免费","开发"],action:"→ 立即调整模型配置，榨干额度"},
      {id:5,title:"Web3 + AI Agent 融合趋势",desc:"多个 AI Agent 开始接入链上数据，自动执行 DeFi 策略。未来 6 个月大趋势。",src:"ArXiv",time:"8h",pri:"medium",tags:["Web3","AI","DeFi"],action:"→ 探长深入调研"},
      {id:6,title:"OpenAI o3-mini 发布",desc:"o3-mini 在数学和推理上表现优异，价格仅为 o1 的 1/10。性价比之王。",src:"OpenAI",time:"12h",pri:"low",tags:["LLM","OpenAI","推理"],action:"→ 评估替代当前推理模型"},
      {id:7,title:"Cloudflare Pages 免费额度提升",desc:"Pages 免费构建次数提升至 500 次/月。我们的部署成本继续为零。",src:"Cloudflare",time:"1d",pri:"medium",tags:["部署","免费","Cloudflare"],action:"→ 保持现有部署策略"},
      {id:8,title:"GitHub Copilot Workspace 公测",desc:"GitHub 推出 Copilot Workspace，可直接在浏览器中完成完整开发流程。",src:"GitHub",time:"1d",pri:"medium",tags:["GitHub","AI","开发"],action:"→ 关注对 OpenClaw 的影响"},
    ];

    function filter(f, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = f === 'all' ? signals : signals.filter(s => {
        if (f === 'high') return s.pri === 'high';
        return s.tags.some(t => t.toLowerCase().includes(f));
      });
      document.getElementById('grid').innerHTML = filtered.map(s => `
        <div class="signal-card ${s.pri}">
          <div class="signal-hd">
            <span class="signal-src">${s.src}</span>
            <span class="signal-time">${s.time}</span>
          </div>
          <div class="signal-title">${s.title}</div>
          <div class="signal-desc">${s.desc}</div>
          <div class="signal-tags">${s.tags.map(t=>`<span class="signal-tag">${t}</span>`).join('')}</div>
          <div class="signal-action">${s.action}</div>
        </div>
      `).join('');
    }

    filter('all', document.querySelector('.filter-btn'));
  </script>
</body>
</html>
