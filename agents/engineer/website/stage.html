<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台 | 诸葛灯泡 HQ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg: #fff9e6; --bg-dot: #e6dfc5; --surface: #fff; --border: #4a4a4a; 
      --text: #1a1a1a; --muted: #6b6b75; --accent: #ffb703;
    }
    body{
      background-color: var(--bg);
      background-image: radial-gradient(var(--bg-dot) 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text);
      font-family: 'ZCOOL KuaiLe', 'Inter', system-ui;
      overflow-x: hidden;
    }
    .nav{
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 28px;
      border-bottom: 2px dashed var(--border);
      background:rgba(255,249,230,0.95);
      backdrop-filter:blur(8px);
      position:sticky; top:0; z-index:100;
    }
    .nb{font-family:'Press Start 2P';font-size:11px;color:var(--accent);text-decoration:none; text-shadow: 2px 2px 0px #000;}
    .nl{display:flex;gap:16px;}.nl a{font-size:14px;color:var(--muted);text-decoration:none;font-weight:500;}.nl a:hover,.nl a.active{color:var(--text); text-decoration: underline wavy var(--accent);}
    .hd{padding:32px 28px 16px; text-align:center;}
    .ht{font-size:32px;font-weight:900; margin-bottom:8px;}
    .hs{font-size:15px;color:var(--muted); max-width:600px; margin:0 auto;}
    .container{max-width:800px;margin:0 auto;padding:0 28px 40px;}
    
    /* 控制栏 */
    .controls{
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:24px; flex-wrap:wrap; gap:12px;
    }
    .filters{display:flex; gap:8px; flex-wrap:wrap;}
    .fbtn{
      padding:6px 14px; border:2px solid var(--border); border-radius:20px;
      background:var(--surface); cursor:pointer; font-size:13px; font-weight:600;
      transition:all 0.2s;
    }
    .fbtn:hover{transform:translateY(-2px); box-shadow:2px 2px 0 var(--border);}
    .fbtn.active{background:var(--accent); color:#000; box-shadow:2px 2px 0 var(--border);}
    .status-pill{
      display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted);
      background:var(--surface); padding:6px 12px; border-radius:20px; border:1px solid #e5e7eb;
    }
    .dot{width:6px;height:6px;background:#10b981;border-radius:50%; animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    
    /* Feed 列表 */
    .feed{display:flex; flex-direction:column; gap:16px;}
    .card{
      background:var(--surface); border:2px dashed var(--border);
      border-radius: 15px 225px 15px 255px / 255px 15px 225px 15px;
      padding:16px; display:flex; gap:14px; position:relative;
      transition:all 0.2s; box-shadow: 4px 4px 0px var(--border);
    }
    .card:hover{transform:translate(-2px,-2px); box-shadow:6px 6px 0 var(--border);}
    .avatar{
      width:44px; height:44px; border-radius:50%; border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;
      background:#fff;
    }
    .content{flex:1;}
    .head{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
    .agent-name{font-weight:700; font-size:15px;}
    .time{font-size:12px; color:var(--muted);}
    .action{font-size:14px; color:var(--text); margin-bottom:6px;}
    .detail{font-size:13px; color:var(--muted); line-height:1.5; font-family:'Inter',sans-serif;}
    .tags{display:flex; gap:6px; margin-top:10px;}
    .tag{
      font-size:11px; padding:2px 8px; border-radius:10px; border:1px solid #e5e7eb;
      background:#f9fafb; color:var(--muted);
    }
    
    /* 类型颜色 */
    .card[data-type="deploy"] .avatar{border-color:#10b981; background:#ecfdf5;}
    .card[data-type="signal"] .avatar{border-color:#3b82f6; background:#eff6ff;}
    .card[data-type="decision"] .avatar{border-color:#f59e0b; background:#fffbeb;}
    .card[data-type="content"] .avatar{border-color:#a855f7; background:#faf5ff;}
    .card[data-type="strategy"] .avatar{border-color:#ffb703; background:#fffbeb;}
    .card[data-type="design"] .avatar{border-color:#f97316; background:#fff7ed;}
    
    .empty{text-align:center; padding:40px; color:var(--muted); font-size:15px;}
    @media(max-width:600px){.hd{padding:20px 16px;}.container{padding:0 16px 30px;}.controls{flex-direction:column;align-items:stretch;}}
  </style>
</head>
<body>
  <nav class="nav"><a href="/index.html" class="nb">💡 诸葛灯泡 HQ</a><div class="nl"><a href="/office.html">办公室</a><a href="/stage.html" class="active">工作台</a><a href="/radar.html">雷达</a></div></nav>
  
  <div class="hd">
    <h1 class="ht">Live Handoffs</h1>
    <p class="hs">这里是诸葛灯泡团队的实时动态流。从信号捕获到方案落地，你可以看到每一个决策和执行的瞬间。</p>
  </div>
  
  <div class="container">
    <div class="controls">
      <div class="filters" id="filters">
        <button class="fbtn active" data-filter="all">全部</button>
        <button class="fbtn" data-filter="deploy">🚀 部署</button>
        <button class="fbtn" data-filter="signal">📡 信号</button>
        <button class="fbtn" data-filter="decision">🧭 决策</button>
        <button class="fbtn" data-filter="content">📝 内容</button>
        <button class="fbtn" data-filter="strategy">💡 战略</button>
      </div>
      <div class="status-pill"><span class="dot"></span> 实时更新 <span id="timer">42s</span></div>
    </div>
    
    <div class="feed" id="feed">
      <div class="empty">加载中...</div>
    </div>
  </div>

<script>
  let allData = [];
  let currentFilter = 'all';
  
  // 渲染列表
  function render() {
    const feed = document.getElementById('feed');
    const filtered = currentFilter === 'all' ? allData : allData.filter(i => i.type === currentFilter);
    
    if(filtered.length === 0) {
      feed.innerHTML = '<div class="empty">暂无相关动态 🍵</div>';
      return;
    }
    
    feed.innerHTML = filtered.map(item => `
      <div class="card" data-type="${item.type}">
        <div class="avatar">${item.avatar}</div>
        <div class="content">
          <div class="head">
            <span class="agent-name">${item.agent}</span>
            <span class="time">${item.time}</span>
          </div>
          <div class="action">${item.action}</div>
          <div class="detail">${item.detail}</div>
          <div class="tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>
    `).join('');
  }
  
  // 获取数据
  async function fetchData() {
    try {
      const res = await fetch('/data/stage-feed.json');
      allData = await res.json();
      render();
    } catch(e) {
      console.error('Fetch error', e);
      document.getElementById('feed').innerHTML = '<div class="empty">数据加载失败</div>';
    }
  }
  
  // 过滤器事件
  document.getElementById('filters').addEventListener('click', e => {
    if(e.target.classList.contains('fbtn')) {
      document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentFilter = e.target.dataset.filter;
      render();
    }
  });
  
  // 倒计时
  let count = 42;
  setInterval(() => {
    count = count > 0 ? count - 1 : 42;
    document.getElementById('timer').innerText = count + 's';
    if(count === 1) fetchData(); // 模拟刷新
  }, 1000);
  
  fetchData();
</script>
</body>
</html>
