// ============ MenuScene ============
class MenuScene extends Phaser.Scene {
  constructor() { super({ key: 'MenuScene' }); }
  
  create() {
    this.add.rectangle(400, 300, 800, 600, 0x0a0a15);
    
    // 标题
    this.add.text(400, 80, '桐桐的冒险', {
      fontSize: '52px', color: '#ff6b6b', fontFamily: 'Arial', stroke: '#000', strokeThickness: 6
    }).setOrigin(0.5);
    
    this.add.text(400, 130, '穿龙虾套装的加菲猫 🦞', {
      fontSize: '20px', color: '#ffffff', fontFamily: 'Arial'
    }).setOrigin(0.5);
    
    // 世界选择
    const worldY = 200;
    WORLDS.forEach((world, wi) => {
      const unlocked = wi < gameState.unlockedWorlds;
      const color = unlocked ? world.color : '#333333';
      
      const worldBtn = this.add.rectangle(400, worldY + wi * 60, 300, 45, unlocked ? parseInt(color.replace('#', '0x')) : 0x333333)
        .setInteractive({ useHandCursor: true }).setAlpha(unlocked ? 1 : 0.5);
      
      const worldTxt = this.add.text(400, worldY + wi * 60, 
        unlocked ? `🌍 ${world.name}` : `🔒 ${world.name} (未解锁)`, {
        fontSize: '22px', color: '#ffffff', fontFamily: 'Arial'
      }).setOrigin(0.5);
      
      if (unlocked) {
        worldBtn.on('pointerover', () => worldBtn.setFillStyle(parseInt(world.color.replace('#', '0x')) - 0x202020));
        worldBtn.on('pointerout', () => worldBtn.setFillStyle(parseInt(world.color.replace('#', '0x'))));
        worldBtn.on('pointerdown', () => { gameState.world = wi; this.scene.start('WorldMenuScene'); });
      }
    });
    
    // 总统计
    this.add.text(400, 450, `🏆 总分: ${gameState.score} | ❤️ ${gameState.lives}条命`, {
      fontSize: '18px', color: '#ffd93d', fontFamily: 'Arial'
    }).setOrigin(0.5);
    
    this.add.text(400, 560, '← → 移动 | ↑/空格 确认', {
      fontSize: '14px', color: '#666666', fontFamily: 'Arial'
    }).setOrigin(0.5);
  }
}

// ============ WorldMenuScene ============
class WorldMenuScene extends Phaser.Scene {
  constructor() { super({ key: 'WorldMenuScene' }); }
  
  create() {
    const world = WORLDS[gameState.world];
    
    this.add.rectangle(400, 300, 800, 600, parseInt(world.bg.replace('#', '0x')));
    
    this.add.text(400, 60, `🌍 ${world.name}`, {
      fontSize: '40px', color: '#ffffff', fontFamily: 'Arial', stroke: '#000', strokeThickness: 5
    }).setOrigin(0.5);
    
    // 关卡按钮
    const levels = LEVELS.filter(l => l.world === gameState.world);
    const btnStartY = 140;
    
    levels.forEach((level, i) => {
      const isBoss = level.boss;
      const color = isBoss ? 0x8b0000 : parseInt(world.color.replace('#', '0x'));
      
      const btn = this.add.rectangle(400, btnStartY + i * 55, 320, 45, color)
        .setInteractive({ useHandCursor: true });
      
      const star = isBoss ? '👑 ' : '⭐ ';
      const txt = this.add.text(400, btnStartY + i * 55, `${star}第${i+1}关: ${level.name}`, {
        fontSize: '20px', color: '#ffffff', fontFamily: 'Arial'
      }).setOrigin(0.5);
      
      // 难度星星
      this.add.text(680, btnStartY + i * 55, '⭐'.repeat(level.difficulty), {
        fontSize: '14px', color: '#ffd93d', fontFamily: 'Arial'
      }).setOrigin(0.5);
      
      btn.on('pointerover', () => btn.setFillStyle(color - 0x202020));
      btn.on('pointerout', () => btn.setFillStyle(color));
      btn.on('pointerdown', () => {
        gameState.level = LEVELS.findIndex(l => l === level);
        gameState.coins = 0;
        this.scene.start('PlayScene');
      });
    });
    
    this.add.text(400, 560, '按 ESC 返回主菜单', {
      fontSize: '14px', color: '#888888', fontFamily: 'Arial'
    }).setOrigin(0.5);
    
    this.input.keyboard.on('keydown-ESC', () => this.scene.start('MenuScene'));
  }
}

// ============ PlayScene ============
class PlayScene extends Phaser.Scene {
  constructor() { super({ key: 'PlayScene' }); }
  
  create() {
    const level = LEVELS[gameState.level];
    this.levelData = level;
    this.gameOver = false;
    gameState.coins = 0;
    
    this.cameras.main.setBackgroundColor(level.bg);
    
    // 云
    for (let i = 0; i < 4; i++) {
      const cloud = this.add.image(100 + i * 200, 50 + Math.random() * 40, 'cloud').setAlpha(0.3);
      this.tweens.add({ targets: cloud, x: cloud.x + 50, duration: 5000 + i * 1000, yoyo: true, repeat: -1 });
    }
    
    // 平台
    this.platforms = this.physics.add.staticGroup();
    level.platforms.forEach(p => {
      for (let i = 0; i < Math.ceil(p[2] / 32); i++) {
        this.platforms.create(p[0] + i * 32 + 16, p[1] + 16, 'ground');
      }
    });
    
    // 玩家
    this.player = this.physics.add.sprite(level.platforms[0][0] + 50, level.platforms[0][1] - 50, 'tongtong');
    this.player.setBounce(0.15);
    this.player.setCollideWorldBounds(true);
    this.player.setGravityY(350);
    this.player.setSize(40, 50);
    
    // 金币
    this.coins = this.physics.add.group();
    level.coinsPos.forEach(c => {
      const coin = this.coins.create(c[0], c[1], 'coin');
      this.tweens.add({ targets: coin, scaleX: 0, scaleY: 0, duration: 300, yoyo: true, repeat: -1 });
    });
    
    // 敌人
    this.enemies = this.physics.add.group();
    level.enemyPos.forEach(e => {
      const tex = e[2] === 'boss' ? 'boss' : (e[2] === 'jumper' ? 'enemyJump' : 'enemy');
      const enemy = this.enemies.create(e[0], e[1], tex);
      enemy.setBounce(1);
      enemy.setCollideWorldBounds(true);
      enemy.setVelocityX(e[2] === 'boss' ? 30 : -100);
      enemy.setGravityY(400);
      enemy.setData('type', e[2]);
      
      if (e[2] === 'jumper') {
        this.tweens.add({ targets: enemy, y: enemy.y - 80, duration: 600, yoyo: true, repeat: -1 });
      }
      if (e[2] === 'boss') {
        enemy.setScale(1.5);
        this.tweens.add({ targets: enemy, angle: 5, duration: 200, yoyo: true, repeat: -1 });
      }
    });
    
    // 旗杆
    const lastPlatform = level.platforms[level.platforms.length - 1];
    this.flag = this.physics.add.sprite(lastPlatform[0] + 50, lastPlatform[1] - 60, 'flag');
    this.flag.setImmovable(true);
    this.flag.body.setAllowGravity(false);
    
    // 碰撞
    this.physics.add.collider(this.player, this.platforms);
    this.physics.add.collider(this.coins, this.platforms);
    this.physics.add.collider(this.enemies, this.platforms);
    this.physics.add.collider(this.enemies, this.player, this.hitEnemy, null, this);
    this.physics.add.overlap(this.player, this.coins, this.collectCoin, null, this);
    this.physics.add.overlap(this.player, this.flag, this.reachGoal, null, this);
    
    // 控制
    this.cursors = this.input.keyboard.createCursorKeys();
    this.input.keyboard.on('keydown-R', () => this.scene.restart());
    this.input.keyboard.on('keydown-ESC', () => this.scene.start('WorldMenuScene'));
    
    // UI
    const world = WORLDS[gameState.world];
    this.scoreText = this.add.text(16, 16, `🏆 ${gameState.score}`, {
      fontSize: '22px', color: '#ffd93d', fontFamily: 'Arial', stroke: '#000', strokeThickness: 3
    });
    this.livesText = this.add.text(16, 44, '❤️'.repeat(gameState.lives), {
      fontSize: '18px', color: '#ff6b6b', fontFamily: 'Arial'
    });
    this.add.text(784, 16, `${world.name} 第${gameState.level - WORLDS.slice(0, gameState.world).reduce((a, w) => a + LEVELS.filter(l => l.world === WORLDS.indexOf(w)).length, 0) + 1}关`, {
      fontSize: '16px', color: '#ffffff', fontFamily: 'Arial', stroke: '#000', strokeThickness: 2
    }).setOrigin(1, 0);
    this.coinsText = this.add.text(784, 40, `💰 ${gameState.coins}/${level.coins}`, {
      fontSize: '16px', color: '#ffd93d', fontFamily: 'Arial', stroke: '#000', strokeThickness: 2
    }).setOrigin(1, 0);
    
    this.add.text(400, 585, 'R:重来 | ESC:选关', {
      fontSize: '12px', color: '#666666', fontFamily: 'Arial'
    }).setOrigin(0.5);
  }
  
  update() {
    if (this.gameOver) return;
    
    if (this.cursors.left.isDown) {
      this.player.setVelocityX(-200);
      this.player.setFlipX(true);
    } else if (this.cursors.right.isDown) {
      this.player.setVelocityX(200);
      this.player.setFlipX(false);
    } else {
      this.player.setVelocityX(0);
    }
    
    if ((this.cursors.up.isDown || this.cursors.space.isDown) && this.player.body.touching.down) {
      this.player.setVelocityY(-550);
    }
    
    // 敌人AI
    this.enemies.getChildren().forEach(e => {
      if (e.getData('type') !== 'boss') {
        if (e.x < 50) e.setVelocityX(e.getData('type') === 'jumper' ? 0 : 80);
        if (e.x > 750) e.setVelocityX(e.getData('type') === 'jumper' ? 0 : -80);
      } else {
        // Boss AI
        if (e.x < 200) e.setVelocityX(50);
        if (e.x > 600) e.setVelocityX(-50);
      }
    });
  }
  
  collectCoin(player, coin) {
    coin.disableBody(true, true);
    gameState.score += 10;
    gameState.coins++;
    this.scoreText.setText(`🏆 ${gameState.score}`);
    this.coinsText.setText(`💰 ${gameState.coins}/${this.levelData.coins}`);
    this.cameras.main.shake(50, 0.003);
  }
  
  hitEnemy(player, enemy) {
    const type = enemy.getData('type');
    
    if (player.body.velocity.y > 0 && player.y < enemy.y - 10) {
      enemy.disableBody(true, true);
      player.setVelocityY(-300);
      gameState.score += type === 'boss' ? 200 : 20;
      this.scoreText.setText(`🏆 ${gameState.score}`);
      this.cameras.main.shake(100, 0.008);
    } else {
      gameState.lives--;
      this.livesText.setText('❤️'.repeat(Math.max(0, gameState.lives)));
      this.cameras.main.shake(200, 0.015);
      player.setTint(0xff0000);
      
      this.time.delayedCall(300, () => {
        player.clearTint();
        if (gameState.lives <= 0) {
          this.showGameOver();
        } else {
          const start = this.levelData.platforms[0];
          player.setPosition(start[0] + 50, start[1] - 50);
        }
      });
    }
  }
  
  reachGoal(player, flag) {
    this.gameOver = true;
    this.physics.pause();
    player.setTint(0x00ff00);
    
    const bonus = gameState.coins >= this.levelData.coins ? 100 : 0;
    gameState.score += 100 + bonus;
    
    // 解锁下一世界
    if (this.levelData.boss && gameState.unlockedWorlds < WORLDS.length) {
      gameState.unlockedWorlds++;
    }
    
    const isLastLevel = gameState.level >= LEVELS.length - 1;
    const msg = isLastLevel ? 
      `🏆🏆🏆 全部通关! 🏆🏆🏆\n\n最终得分: ${gameState.score}\n\n按 空格 返回主菜单` :
      `🎉 过关! +${100 + bonus}分${bonus ? '\n⭐ 收集完整! +100!' : ''}\n\n按 空格 进入下一关`;
    
    this.add.text(400, 250, msg, {
      fontSize: '28px', color: '#00ff00', fontFamily: 'Arial', align: 'center', stroke: '#000', strokeThickness: 4
    }).setOrigin(0.5);
    
    this.input.keyboard.once('keydown-SPACE', () => {
      if (isLastLevel) this.scene.start('MenuScene');
      else { gameState.level++; this.scene.restart(); }
    });
  }
  
  showGameOver() {
    this.gameOver = true;
    this.physics.pause();
    this.add.text(400, 250, `💔 游戏结束\n\n得分: ${gameState.score}\n\n按 空格 重来\n按 ESC 返回`, {
      fontSize: '28px', color: '#ff0000', fontFamily: 'Arial', align: 'center', stroke: '#000', strokeThickness: 4
    }).setOrigin(0.5);
    this.input.keyboard.once('keydown-SPACE', () => this.scene.restart());
    this.input.keyboard.once('keydown-ESC', () => this.scene.start('MenuScene'));
  }
}

// ============ 启动 ============
new Phaser.Game({
  type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container',
  physics: { default: 'arcade', arcade: { gravity: { y: 600 }, debug: false } },
  scene: [BootScene, MenuScene, WorldMenuScene, PlayScene]
});
  </script>
</body>
