<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>诸葛灯炮 - 操盘页面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#e8e4dc;color:#222;overflow-x:hidden;padding-top:56px}

/* Nav - 与主页面一致 */
.nav{position:fixed;top:0;left:0;width:100%;z-index:1000;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-bottom:2px solid #e8e4df;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,0.04)}
.nav-logo{font-family:'ZCOOL KuaiLe','Noto Sans SC',sans-serif;font-size:22px;color:#4A2508;display:flex;align-items:center;gap:6px;font-weight:700}
.nav-links{margin-left:auto;display:flex;gap:20px;align-items:center}
.nav-links a{text-decoration:none;color:#333;font-size:15px;font-weight:600;opacity:.7;transition:.2s;padding:6px 4px}
.nav-links a:hover,.nav-links a.active{opacity:1;color:#4A2508}
.hamburger{display:none;background:none;border:none;font-size:15px;cursor:pointer;color:#333;font-weight:600;padding:6px 12px;border-radius:8px;border:1.5px solid #ddd}
@media(max-width:768px){.nav-links{display:none}.nav-links.open{display:flex;flex-direction:column;position:absolute;top:56px;left:0;right:0;background:#fff;padding:20px;border-bottom:2px solid #e8e4df;gap:12px}.hamburger{display:block}}

/* Trading Page Styles */
.container{max-width:1400px;margin:0 auto;padding:40px 20px}
.page-header{text-align:center;margin-bottom:40px}
h1{font-family:'ZCOOL KuaiLe',sans-serif;font-size:clamp(28px,4vw,36px);color:#4A2508;margin-bottom:12px}
.subtitle{font-size:16px;color:#666;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;margin-bottom:30px}
.card{background:#fff;border-radius:16px;padding:24px;cursor:pointer;transition:all 0.3s;border:2px solid #e8e4df;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.12);border-color:#4A2508}
.card-header{display:flex;align-items:center;margin-bottom:20px}
.card-icon{font-size:2.5rem;margin-right:16px}
.card-title{font-size:1.3rem;font-weight:700;color:#4A2508}
.card-provider{color:#666;font-size:0.9rem;margin-top:4px}
.stat-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
.stat-row:last-child{border-bottom:none}
.stat-label{color:#666;font-size:14px}
.stat-value{font-weight:600;color:#222}
.stat-value.positive{color:#27ae60}
.stat-value.negative{color:#e74c3c}
.stat-value.large{font-size:1.5rem;color:#4A2508}
.status-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:0.85rem;margin-top:12px;font-weight:600}
.status-running{background:rgba(39,174,96,0.15);color:#27ae60}
.status-stopped{background:rgba(231,76,60,0.15);color:#e74c3c}
.status-restarting{background:rgba(52,152,219,0.15);color:#3498db}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:32px;max-width:1000px;width:100%;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #f0f0f0}
.modal-title{font-family:'ZCOOL KuaiLe',sans-serif;font-size:1.5rem;color:#4A2508}
.modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#666;padding:8px;line-height:1}
.modal-close:hover{color:#4A2508}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:16px;text-align:left;border-bottom:1px solid #f0f0f0;vertical-align:top}
.table th{color:#666;font-weight:600;font-size:0.9rem;background:#fafafa}
.table tr:hover{background:#fafafa}
.trade-type{padding:4px 12px;border-radius:12px;font-size:0.85rem;font-weight:600}
.trade-type.buy{background:rgba(39,174,96,0.15);color:#27ae60}
.trade-type.sell{background:rgba(231,76,60,0.15);color:#e74c3c}
.price-up{color:#27ae60;font-weight:600}
.price-down{color:#e74c3c;font-weight:600}
.empty-state{text-align:center;padding:40px}
.empty-state .emoji{font-size:4rem;margin-bottom:16px}
.holdings-section{margin-bottom:24px}
.holdings-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;color:#4A2508}
.note-cell{color:#666;font-size:0.85rem;line-height:1.5;max-width:220px}
.note-cell .note-label{font-weight:600;color:#2980b9;margin-bottom:4px;font-size:0.8rem}
.note-cell .review-label{font-weight:600;color:#e67e22;margin-top:6px;margin-bottom:4px;font-size:0.8rem}
.note-cell .review-text{color:#e67e22}
.note-cell .empty{color:#999;font-style:italic}
.restart-notice{background:linear-gradient(135deg,rgba(52,152,219,0.1),rgba(41,128,185,0.15));border:2px solid #3498db;border-radius:12px;padding:20px;margin-bottom:24px}
.restart-notice h3{color:#2980b9;font-size:1.1rem;margin-bottom:8px}
.restart-notice p{color:#555;font-size:0.9rem;line-height:1.6}

/* 实时数据状态 */
.data-status{position:fixed;bottom:20px;right:20px;background:#fff;padding:12px 20px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.1);font-size:13px;display:flex;align-items:center;gap:8px;z-index:999}
.data-status .indicator{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite}
.data-status .indicator.live{background:#27ae60}
.data-status .indicator.loading{background:#f39c12}
.data-status .indicator.error{background:#e74c3c}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.refresh-btn{background:#4A2508;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.refresh-btn:hover{background:#6A3510}
.refresh-btn:disabled{background:#ccc;cursor:not-allowed}
.loading-state{text-align:center;padding:60px 20px}
.loading-state .spinner{font-size:3rem;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav class="nav">
<div class="nav-logo">🦞 老庄与小花</div>
<div class="nav-links">
<button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰ 菜单</button>
<a href="index.html">首页</a>
<a href="diary.html">📖 日记</a>
<a href="articles.html">📝 文章</a>
<a href="tongtong-letters.html">💌 桐桐</a>
<a href="bagua.html">☯️ 八卦</a>
<a href="trading.html" class="active">📈 操盘</a>
</div>
</nav>

<div class="container">
<div class="page-header">
<h1>🦞 诸葛灯炮</h1>
<p class="subtitle">AI 龙虾养成实验 · 模拟交易操盘 <span id="lastUpdate" style="font-size:13px;color:#999;margin-left:12px"></span></p>
</div>
<div id="loadingState" class="loading-state">
<div class="spinner">🔄</div>
<p style="margin-top:16px;color:#666">正在加载实时数据...</p>
</div>
<div id="cardsGrid" class="grid" style="display:none"></div>
</div>

<div id="tradeModal" class="modal-overlay">
<div class="modal">
<div class="modal-header">
<h2 id="modalTitle" class="modal-title"></h2>
<button class="modal-close" onclick="closeModal()">×</button>
</div>
<div id="modalBody"></div>
</div>
</div>

<div id="dataStatus" class="data-status">
<span class="indicator loading"></span>
<span id="statusText">加载中...</span>
<button class="refresh-btn" onclick="loadData()" id="refreshBtn" style="margin-left:12px">🔄 刷新</button>
</div>

<script>
let simulations = {};
let autoRefreshTimer = null;
const DATA_BASE = 'pages/data/trading/';

function formatMoney(a,c){const s={USD:'$',USDT:'₮',CNY:'¥'};return(s[c]||'$')+a.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function formatReturn(p){const c=p>=0?'positive':'negative',s=p>=0?'+':'';return`<span class="stat-value ${c}">${s}${p.toFixed(2)}%</span>`}
function formatPriceDiff(avg,current){const diff=current-avg,percent=(diff/avg)*100;return{diff,percent}}
function renderNote(t){
const hasNote=t.note&&t.note.trim()!=='';
const hasReview=t.review&&t.review.trim()!=='';
let html='<div class="note-cell">';
if(hasNote){
html+=`<div class="note-label">💡 决策原因</div><div>${t.note}</div>`;
}
if(hasReview){
html+=`<div class="review-label">📝 复盘</div><div class="review-text">${t.review}</div>`;
}
if(!hasNote&&!hasReview){
html+=`<span class="empty">无备注</span>`;
}
html+='</div>';
return html;
}

function createCard(k,d){const c=document.createElement('div');c.className='card';c.onclick=()=>showDetails(k);const t=d.initialCapital?((d.currentValue-d.initialCapital)/d.initialCapital*100):0;let p='';if(d.positions&&d.positions.length>0){p=`<div class="holdings-section"><div class="holdings-title">📊 持仓 (${d.positions.length}个)</div>`+d.positions.map(x=>`<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:0.9rem"><span style="font-weight:600">${x.symbol} ${x.direction||''}</span><span class="stat-value ${x.return!==undefined?(x.return>=0?'positive':'negative'):'negative'}">${x.return!==undefined?formatReturn(x.return):'潜在'+formatMoney(x.potentialReturn,d.currency)}</span></div>`).join('')+'</div>'}

let restartNotice='';
if(d.status==='restarting'&&d.restartNotice){
restartNotice=`<div class="restart-notice"><h3>🔄 ${d.restartNotice}</h3><p>${d.restartReason}</p></div>`;
}

c.innerHTML=`<div class="card-header"><span class="card-icon">${d.icon||'📊'}</span><div><div class="card-title">${d.name}</div><div class="card-provider">${d.provider}</div></div></div>${restartNotice}<div class="card-body"><div class="stat-row"><span class="stat-label">初始资金</span><span class="stat-value">${formatMoney(d.initialCapital,d.currency)}</span></div><div class="stat-row"><span class="stat-label">当前价值</span><span class="stat-value large">${formatMoney(d.currentValue,d.currency)}</span></div><div class="stat-row"><span class="stat-label">可用现金</span><span class="stat-value">${formatMoney(d.cash,d.currency)}</span></div><div class="stat-row"><span class="stat-label">总收益</span>${formatReturn(t)}</div>${p}<div class="status-badge ${d.status==='running'?'status-running':d.status==='restarting'?'status-restarting':'status-stopped'}">${d.status==='running'?'▶️ 运行中':d.status==='restarting'?'🔄 策略修正重启中':'⏸️ 已停止'}</div>${d.status==='stopped'&&d.stopFile?`<p style="font-size:12px;color:#666;margin-top:8px">原因：${d.stopFile}</p>`:''}${d.status==='restarting'&&d.stopFile?`<p style="font-size:12px;color:#2980b9;margin-top:8px">状态：${d.stopFile}</p>`:''}</div>`;return c}

function showDetails(k){
const d=simulations[k];
document.getElementById('modalTitle').textContent=`${d.name} - 详情`;
let html='';

if(d.status==='restarting'&&d.restartReason){
html+=`<div class="restart-notice"><h3>🔄 策略修正重启</h3><p><strong>目标：</strong>${d.restartReason}</p><p style="margin-top:8px"><strong>方法：</strong>每笔交易后复盘 → 修正策略参数 → 优化网格密度 → 提升胜率</p></div>`;
}

if(d.positions&&d.positions.length>0){
html+=`<div class="holdings-section">
<div class="holdings-title">📊 当前持仓</div>
<table class="table"><thead><tr>
<th>标的</th><th>数量</th><th>成本价</th><th>现时价</th><th>价差</th><th>盈亏</th>
</tr></thead><tbody>`+
d.positions.map(p=>{
const pd=formatPriceDiff(p.avgPrice,p.currentPrice);
const priceClass=pd.diff>=0?'price-up':'price-down';
return`<tr>
<td style="font-weight:600">${p.symbol}</td>
<td>${p.shares}</td>
<td>${formatMoney(p.avgPrice,d.currency)}</td>
<td><span class="${priceClass}">${formatMoney(p.currentPrice,d.currency)}</span></td>
<td><span class="${priceClass}">${pd.diff>=0?'+':''}${pd.diff.toFixed(2)} (${formatReturn(pd.percent)})</span></td>
<td>${formatReturn(p.return)}</td>
</tr>`
}).join('')+
'</tbody></table></div>';
}

html+=`<div class="holdings-section">
<div class="holdings-title">📝 交易记录</div>`;
if(!d.trades||d.trades.length===0){
html+=`<div class="empty-state"><div class="emoji">📭</div><p>暂无交易记录</p></div>`;
}else{
html+=`<table class="table"><thead><tr>
<th>交易时间</th><th>类型</th><th>标的</th><th>数量</th><th>价格</th><th>总额</th><th style="width:220px">决策原因 / 复盘</th>
</tr></thead><tbody>`+
d.trades.map(t=>`<tr>
<td class="trade-time">${t.time}</td>
<td><span class="trade-type ${t.type}">${t.type==='buy'?'买入':'卖出'}</span></td>
<td style="font-weight:600">${t.symbol}</td>
<td>${t.shares}</td>
<td class="trade-price">${formatMoney(t.price,d.currency)}</td>
<td style="font-weight:700">${formatMoney(t.total,d.currency)}</td>
<td>${renderNote(t)}</td>
</tr>`).join('')+
'</tbody></table>';
}
html+='</div>';

document.getElementById('modalBody').innerHTML=html;
document.getElementById('tradeModal').classList.add('active');
}

function closeModal(){document.getElementById('tradeModal').classList.remove('active')}

async function loadData(){
const btn = document.getElementById('refreshBtn');
const indicator = document.querySelector('#dataStatus .indicator');
const statusText = document.getElementById('statusText');

btn.disabled = true;
indicator.className = 'indicator loading';
statusText.textContent = '刷新中...';

try{
// 并行加载所有数据
const [cryptoRes, usRes, futuresRes, polymarketRes] = await Promise.all([
fetch(DATA_BASE + 'portfolio.json?t=' + Date.now()),
fetch(DATA_BASE + 'us-simulation.json?t=' + Date.now()),
fetch(DATA_BASE + 'futures-simulation.json?t=' + Date.now()),
fetch(DATA_BASE + 'polymarket_portfolio.json?t=' + Date.now())
]);

const cryptoData = await cryptoRes.json();
const usData = usRes.ok ? await usRes.json() : null;
const futuresData = futuresRes.ok ? await futuresRes.json() : null;
const polymarketData = await polymarketRes.json();

// 构建 simulations 对象
simulations = {};

// 加密货币网格
simulations.crypto = {
name: cryptoData.name || '加密货币网格',
provider: cryptoData.provider || 'Binance',
icon: '₿',
initialCapital: 10000,
currentValue: cryptoData.cash || 0,
cash: cryptoData.cash || 0,
currency: 'USDT',
status: cryptoData.status === 'STOPPED' ? 'stopped' : 'running',
stopFile: cryptoData.stopFile || '',
positions: [],
trades: []
};

// 美股模拟盘
if(usData){
simulations.us = {
name: usData.name || '美股模拟盘',
provider: usData.provider || '老虎证券',
icon: '📈',
initialCapital: usData.initialCapital || 1000000,
currentValue: usData.currentValue || usData.initialCapital || 1000000,
cash: usData.cash || usData.initialCapital || 1000000,
currency: 'USD',
status: 'running',
positions: [],
trades: []
};
}

// 期货模拟盘
if(futuresData){
simulations.futures = {
name: futuresData.name || '期货模拟盘',
provider: futuresData.provider || '老虎证券',
icon: '📊',
initialCapital: futuresData.initialCapital || 500000,
currentValue: futuresData.currentValue || futuresData.initialCapital || 500000,
cash: futuresData.cash || futuresData.initialCapital || 500000,
currency: 'USD',
status: 'running',
positions: [],
trades: []
};
}

// Polymarket
simulations.polymarket = {
name: 'Polymarket 模拟盘',
provider: 'Polymarket',
icon: '🎯',
initialCapital: 10000,
currentValue: polymarketData.account?.totalValue || 10000,
cash: polymarketData.account?.cashBalance || 10000,
currency: 'USD',
status: 'running',
positions: polymarketData.positions || [],
trades: []
};

// 渲染页面
document.getElementById('loadingState').style.display = 'none';
document.getElementById('cardsGrid').style.display = 'grid';
document.getElementById('cardsGrid').innerHTML = '';
['us','futures','polymarket','crypto'].forEach(k=>{
if(simulations[k]) document.getElementById('cardsGrid').appendChild(createCard(k,simulations[k]));
});

// 更新最后时间
const now = new Date();
document.getElementById('lastUpdate').textContent = `最后更新：${now.toLocaleTimeString('zh-CN')}`;

indicator.className = 'indicator live';
statusText.textContent = '实时数据';

}catch(e){
console.error('Load data error:', e);
indicator.className = 'indicator error';
statusText.textContent = '加载失败';
}

btn.disabled = false;
}

function render(){
loadData();
// 每 30 秒自动刷新
if(autoRefreshTimer) clearInterval(autoRefreshTimer);
autoRefreshTimer = setInterval(loadData, 30000);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
render();
</script>
</body>
</html>
