<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>诸葛灯炮 - 操盘页面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#e8e4dc;color:#222;overflow-x:hidden;padding-top:56px}
.nav{position:fixed;top:0;left:0;width:100%;z-index:1000;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-bottom:2px solid #e8e4df;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'ZCOOL KuaiLe','Noto Sans SC',sans-serif;font-size:22px;color:#4A2508;display:flex;align-items:center;gap:6px;font-weight:700}
.nav-links{margin-left:auto;display:flex;gap:20px;align-items:center}
.nav-links a{text-decoration:none;color:#333;font-size:15px;font-weight:600;opacity:.7;transition:.2s;padding:6px 4px}
.nav-links a:hover,.nav-links a.active{opacity:1;color:#4A2508}
.container{max-width:1400px;margin:0 auto;padding:40px 20px}
.page-header{text-align:center;margin-bottom:40px;position:relative}
h1{font-family:'ZCOOL KuaiLe',sans-serif;font-size:clamp(28px,4vw,36px);color:#4A2508;margin-bottom:12px}
.subtitle{font-size:16px;color:#666}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(39,174,96,0.15);color:#27ae60;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-left:12px}
.live-dot{width:8px;height:8px;background:#27ae60;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.last-update{color:#666;font-size:13px;margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;margin-bottom:30px}
.card{background:#fff;border-radius:16px;padding:24px;cursor:pointer;transition:all 0.3s;border:2px solid #e8e4df;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.12);border-color:#4A2508}
.card-header{display:flex;align-items:center;margin-bottom:20px}
.card-icon{font-size:2.5rem;margin-right:16px}
.card-title{font-size:1.3rem;font-weight:700;color:#4A2508}
.card-provider{color:#666;font-size:0.9rem;margin-top:4px}
.stat-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
.stat-row:last-child{border-bottom:none}
.stat-label{color:#666;font-size:14px}
.stat-value{font-weight:600;color:#222}
.stat-value.positive{color:#27ae60}
.stat-value.negative{color:#e74c3c}
.stat-value.large{font-size:1.5rem;color:#4A2508}
.status-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:0.85rem;margin-top:12px;font-weight:600}
.status-running{background:rgba(39,174,96,0.15);color:#27ae60}
.status-stopped{background:rgba(231,76,60,0.15);color:#e74c3c}
.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid #3498db;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#e74c3c;font-size:13px;margin-top:8px}
</style>
</head>
<body>

<nav class="nav">
<div class="nav-logo">🦞 老庄与小花</div>
<div class="nav-links">
<a href="index.html">首页</a>
<a href="diary.html">📖 日记</a>
<a href="articles.html">📝 文章</a>
<a href="tongtong-letters.html">💌 桐桐</a>
<a href="bagua.html">☯️ 八卦</a>
<a href="trading.html" class="active">📈 操盘</a>
</div>
</nav>

<div class="container">
<div class="page-header">
<h1>🦞 诸葛灯炮 <span class="live-badge"><span class="live-dot"></span>LIVE</span></h1>
<p class="subtitle">AI 龙虾养成实验 · 实时数据</p>
<p class="last-update" id="lastUpdate">数据加载中...</p>
</div>
<div id="cardsGrid" class="grid"></div>
</div>

<script>
// ========== 实时数据配置 ==========
const CONFIG = {
  refreshInterval: 60000,  // 60秒刷新一次
  crypto: ['BTCUSDT', 'ETHUSDT', 'AVAXUSDT', 'ADAUSDT'],
  stocks: ['SPY', 'QQQ', 'VTI', 'BND']
};

// Polymarket API (通过 CORS 代理)
const POLYMARKET_API = 'https://clob.polymarket.com';

// 账户数据
const accounts = {
  us: {
    name: "美股模拟盘",
    provider: "Yahoo Finance",
    icon: "📈",
    initialCapital: 1000000,
    currency: "USD",
    status: "running",
    positions: [
      {symbol: "SPY", shares: 612, avgPrice: 653.44},
      {symbol: "QQQ", shares: 516, avgPrice: 581.52},
      {symbol: "VTI", shares: 620, avgPrice: 322.62},
      {symbol: "BND", shares: 1363, avgPrice: 73.38}
    ]
  },
  polymarket: {
    name: "Polymarket 预测市场",
    provider: "Polymarket",
    icon: "🎯",
    initialCapital: 100000,
    currency: "USD",
    status: "running",
    positions: [
      {symbol: "BTC<$65K", shares: 10000, avgPrice: 0.07, marketProb: 0.93},
      {symbol: "ETH<$2K", shares: 15000, avgPrice: 0.04, marketProb: 0.96},
      {symbol: "SOL>$80", shares: 5000, avgPrice: 0.13, marketProb: 0.87}
    ]
  }
};

// 实时价格数据
let prices = {
  crypto: {},
  stocks: {},
  polymarket: {}
};

// 格式化货币
function formatMoney(amount, currency) {
  const symbols = {USD: '$', USDT: '₮', CNY: '¥'};
  const s = symbols[currency] || '$';
  return s + amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

// 格式化收益
function formatReturn(p) {
  const c = p >= 0 ? 'positive' : 'negative';
  const s = p >= 0 ? '+' : '';
  return '<span class="stat-value ' + c + '">' + s + p.toFixed(2) + '%</span>';
}

// 获取加密货币价格 (Binance)
async function fetchCryptoPrices() {
  try {
    const symbols = CONFIG.crypto.join(',');
    const url = 'https://api.binance.com/api/v3/ticker/price?symbols=' + encodeURIComponent('["' + symbols.join('","') + '"]');
    const resp = await fetch(url);
    const data = await resp.json();
    data.forEach(item => {
      const symbol = item.symbol.replace('USDT', '');
      prices.crypto[symbol] = parseFloat(item.price);
    });
    return true;
  } catch (e) {
    console.error('Binance API error:', e);
    return false;
  }
}

// 获取股票价格 (Yahoo Finance)
async function fetchStockPrices() {
  try {
    const symbols = CONFIG.stocks.map(s => '"' + s + '"').join(',');
    const url = 'https://query1.finance.yahoo.com/v7/finance/quote?symbols=[' + symbols + ']';
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.quoteResponse && data.quoteResponse.result) {
      data.quoteResponse.result.forEach(item => {
        prices.stocks[item.symbol] = item.regularMarketPrice;
      });
    }
    return true;
  } catch (e) {
    console.error('Yahoo Finance API error:', e);
    return false;
  }
}

// 获取 Polymarket 价格
async function fetchPolymarketPrices() {
  try {
    // 使用 CORS 代理或直接 API
    const url = 'https://clob.polymarket.com/markets';
    const resp = await fetch(url);
    const data = await resp.json();
    
    // 查找我们关注的 markets
    const markets = data.markets || [];
    const btcMarket = markets.find(m => m.question && m.question.includes('BTC') && m.question.includes('65'));
    const ethMarket = markets.find(m => m.question && m.question.includes('ETH') && m.question.includes('2'));
    const solMarket = markets.find(m => m.question && m.question.includes('SOL') && m.question.includes('80'));
    
    if (btcMarket) prices.polymarket['BTC<$65K'] = parseFloat(btcMarket.price || 0);
    if (ethMarket) prices.polymarket['ETH<$2K'] = parseFloat(ethMarket.price || 0);
    if (solMarket) prices.polymarket['SOL>$80'] = parseFloat(solMarket.price || 0);
    
    return true;
  } catch (e) {
    console.error('Polymarket API error:', e);
    // 使用静态数据作为后备
    prices.polymarket = {
      'BTC<$65K': 0.07,
      'ETH<$2K': 0.04,
      'SOL>$80': 0.13
    };
    return false;
  }
}

// 计算账户价值
function calculateAccountValue(account) {
  let total = account.initialCapital;
  
  if (account.currency === 'USDT') {
    account.positions.forEach(pos => {
      const price = prices.crypto[pos.symbol] || 0;
      total += pos.shares * price;
    });
  } else if (account.currency === 'USD') {
    if (account.icon === '🎯') {
      // Polymarket - 使用预测价格
      account.positions.forEach(pos => {
        const price = prices.polymarket[pos.symbol] || pos.avgPrice;
        total = pos.shares * price;
      });
    } else {
      // 美股
      account.positions.forEach(pos => {
        const price = prices.stocks[pos.symbol] || pos.avgPrice;
        total = pos.shares * price;
      });
    }
  }
  
  return total;
}

// 渲染账户卡片
function renderAccountCard(key, account) {
  const card = document.createElement('div');
  card.className = 'card';
  
  let positionsHtml = '';
  let totalValue = 0;
  
  if (account.currency === 'USDT') {
    account.positions.forEach(pos => {
      const price = prices.crypto[pos.symbol] || 0;
      const value = pos.shares * price;
      if (value > 0) {
        totalValue += value;
        positionsHtml += '<div class="stat-row"><span class="stat-label">' + pos.symbol + '</span><span class="stat-value">' + formatMoney(value, 'USDT') + '</span></div>';
      }
    });
  } else if (account.currency === 'USD') {
    if (account.icon === '🎯') {
      // Polymarket
      account.positions.forEach(pos => {
        const price = prices.polymarket[pos.symbol] || pos.avgPrice;
        const value = pos.shares * price;
        totalValue += value;
        const prob = pos.marketProb ? (pos.marketProb * 100).toFixed(0) + '%' : '-';
        positionsHtml += '<div class="stat-row"><span class="stat-label">' + pos.symbol + '</span><span class="stat-value">$' + value.toFixed(2) + ' (市价' + prob + ')</span></div>';
      });
    } else {
      // 美股
      account.positions.forEach(pos => {
        const price = prices.stocks[pos.symbol] || pos.avgPrice;
        const value = pos.shares * price;
        totalValue += value;
        positionsHtml += '<div class="stat-row"><span class="stat-label">' + pos.symbol + ' x' + pos.shares + '</span><span class="stat-value">' + formatMoney(price, 'USD') + '</span></div>';
      });
    }
  }
  
  const returnPct = totalValue > 0 ? ((totalValue - account.initialCapital) / account.initialCapital * 100) : 0;
  
  card.innerHTML = 
    '<div class="card-header">' +
      '<span class="card-icon">' + account.icon + '</span>' +
      '<div><div class="card-title">' + account.name + '</div><div class="card-provider">' + account.provider + '</div></div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="stat-row"><span class="stat-label">初始资金</span><span class="stat-value">' + formatMoney(account.initialCapital, account.currency) + '</span></div>' +
      '<div class="stat-row"><span class="stat-label">当前价值</span><span class="stat-value large">' + formatMoney(totalValue, account.currency) + '</span></div>' +
      '<div class="stat-row"><span class="stat-label">总收益</span>' + formatReturn(returnPct) + '</div>' +
      positionsHtml +
      '<div class="status-badge status-running">▶️ 实时数据</div>' +
    '</div>';
  
  return card;
}

// 更新所有数据
async function updateAllData() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '<div class="card" style="text-align:center;padding:60px"><span class="loading-spinner"></span> 加载实时数据...</div>';
  
  // 获取价格
  await Promise.all([
    fetchCryptoPrices(),
    fetchStockPrices(),
    fetchPolymarketPrices()
  ]);
  
  // 渲染
  grid.innerHTML = '';
  Object.entries(accounts).forEach(([key, account]) => {
    grid.appendChild(renderAccountCard(key, account));
  });
  
  // 更新时间
  document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date().toLocaleTimeString('zh-CN');
}

// 初始化
updateAllData();
setInterval(updateAllData, CONFIG.refreshInterval);
</script>
</body>
</html>
