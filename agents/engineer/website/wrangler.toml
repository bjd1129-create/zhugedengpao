name = "dengpao-auth-api"
main = "backend/auth_api.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "dengpao-auth-db"
database_id = ""  # 待创建: wrangler d1 create dengpao-auth-db 后填入

# 路由：匹配 /api/* 的请求
routes = [
  { pattern = "dengpao.pages.dev/api/*", custom_domain = false }
]
