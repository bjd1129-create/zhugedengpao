*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:#faf6f1;min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 20% 50%,rgba(255,224,195,0.3) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(255,210,180,0.2) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(248,200,170,0.15) 0%,transparent 50%)}
.bg-hearts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.heart{position:absolute;font-size:16px;opacity:0.1;animation:float 20s infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-40px) rotate(8deg)}}
header{text-align:center;padding:50px 20px 24px;position:relative;z-index:1}
header h1{font-size:clamp(26px,5vw,44px);color:#5a3e2b;margin-bottom:6px;font-weight:400;letter-spacing:4px}
header p{font-size:15px;color:#8b7355;font-weight:300}
header p+p{font-size:13px;color:#a08060;margin-top:6px;font-style:italic}
.together-days{font-size:16px;color:#8b7355;margin-top:14px;font-weight:400;letter-spacing:1px}
.together-days span{color:#5a3e2b;font-weight:700;font-size:26px;margin:0 2px}
.timeline-nav{display:flex;justify-content:center;gap:10px;padding:12px 20px;flex-wrap:wrap;position:sticky;top:0;z-index:100;max-width:1200px;margin:0 auto;background:rgba(250,246,241,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:gap 0.3s,padding 0.3s;border-bottom:1px solid rgba(139,115,85,0.1)}
.nav-btn{padding:7px 16px;border:1.5px solid #d4b896;background:rgba(255,255,255,0.8);color:#8b7355;border-radius:30px;cursor:pointer;font-size:13px;transition:all 0.3s;font-weight:500;backdrop-filter:blur(5px);white-space:nowrap;flex-shrink:0}
.nav-btn:hover,.nav-btn.active{background:#f5e6d3;color:#5a3e2b;border-color:#c4a47a;box-shadow:0 2px 10px rgba(139,115,85,0.12)}
main{max-width:1400px;margin:0 auto;padding:40px 20px;position:relative;z-index:1}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:32px}
.photo-card{background:#fff;padding:12px 12px 36px;border-radius:4px;box-shadow:0 3px 12px rgba(90,62,43,0.06);transition:transform 0.4s,box-shadow 0.4s;cursor:pointer;will-change:transform;content-visibility:auto;contain-intrinsic-size:0 280px;border:1px solid rgba(212,184,150,0.25)}
.photo-card:nth-child(odd){transform:rotate(-1deg)}
.photo-card:nth-child(even){transform:rotate(1deg)}
.photo-card:hover{transform:scale(1.03) rotate(0deg);box-shadow:0 6px 24px rgba(90,62,43,0.12);z-index:10}
.photo-card img{width:100%;height:220px;object-fit:cover;border-radius:2px;background:#f5f0eb;image-orientation:from-image}
.photo-info{padding:14px 6px 6px;text-align:center}
.photo-info h3{font-size:13px;color:#8b7355;margin-bottom:3px;font-weight:500}
.photo-info p{font-size:11px;color:#b8a08a}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(30,20,10,0.92);z-index:2000;justify-content:center;align-items:center;padding:20px}
.modal.active{display:flex}
.modal-content{max-width:90vw;max-height:90vh;position:relative;display:flex;justify-content:center;align-items:center}
.modal-content img{max-width:100%;max-height:90vh;border-radius:8px;box-shadow:0 0 50px rgba(255,255,255,0.2);object-fit:contain;image-orientation:from-image}
.modal-close{position:absolute;top:-50px;right:0;font-size:36px;color:#fff;cursor:pointer;background:none;border:none;transition:transform 0.3s}
.modal-close:hover{transform:rotate(90deg)}
.modal-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:48px;color:#fff;cursor:pointer;padding:20px;background:none;border:none;transition:color 0.3s;z-index:10}
.modal-nav:hover{color:#d4b896}
.modal-prev{left:20px}
.modal-next{right:20px}
.modal-counter{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#fff;font-size:16px;white-space:nowrap}
.modal-loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#d4b896;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.back-to-top{position:fixed;bottom:30px;right:30px;width:44px;height:44px;border-radius:50%;background:#f5e6d3;color:#8b7355;border:1px solid #d4b896;font-size:18px;cursor:pointer;box-shadow:0 3px 12px rgba(90,62,43,0.1);z-index:500;opacity:0;transition:all 0.3s;pointer-events:none}
.back-to-top.visible{opacity:1;pointer-events:auto}
.back-to-top:hover{transform:scale(1.1);background:#eddcc8}
footer{text-align:center;padding:50px 20px 30px;color:#8b7355;position:relative;z-index:1}
footer p{font-size:14px;opacity:0.8}
footer p+p{font-size:13px;color:#a08060;margin-top:6px}
@media(max-width:1024px){.photo-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
@media(max-width:768px){.photo-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px}.photo-card{padding:8px 8px 30px}.modal-nav{font-size:36px;padding:12px}.modal-prev{left:10px}.modal-next{right:10px}.back-to-top{bottom:20px;right:20px;width:40px;height:40px;font-size:20px}
/* 手机端年份导航：横向滚动不换行 */
.timeline-nav{flex-wrap:nowrap;justify-content:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 12px;gap:8px;scrollbar-width:none;-ms-overflow-style:none}
.timeline-nav::-webkit-scrollbar{display:none}
.nav-btn{padding:6px 14px;font-size:12px;border-width:1.5px}}
@media(max-width:480px){.photo-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
@media(prefers-color-scheme:dark){body{background:#2a2218;background-image:radial-gradient(ellipse at 20% 50%,rgba(55,40,25,0.4) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(50,35,20,0.3) 0%,transparent 50%)}header h1{color:#e8d5c0}header p{color:#c4a47a}.timeline-nav{background:rgba(42,34,24,0.95);border-bottom-color:rgba(139,115,85,0.15)}.nav-btn{background:rgba(55,40,25,0.7);color:#c4a47a;border-color:#5a3e2b}.nav-btn:hover,.nav-btn.active{background:#3a2d1e;color:#e8d5c0}.photo-card{background:#332a20;border-color:rgba(90,62,43,0.2)}.photo-info h3{color:#c4a47a}.photo-info p{color:#8a7560}footer{color:#8a7560}.back-to-top{background:#3a2d1e;color:#c4a47a;border-color:#5a3e2b}}
</style>

// 扁平化所有照片
let allPhotos = [];
function flattenPhotos() {
  allPhotos = [];
  for (const [folder, files] of Object.entries(photosByFolder)) {
    files.forEach(file => allPhotos.push({ folder, file }));
  }
}

// 生成背景爱心
function createHearts() {
  const container = document.getElementById('bgHearts');
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 20; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = ['🏠', '🌿', '☕', '🕯️', '📷', '🍂', '🌸', '🍵'][Math.floor(Math.random() * 8)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.top = Math.random() * 100 + '%';
    heart.style.animationDelay = Math.random() * 5 + 's';
    heart.style.fontSize = (15 + Math.random() * 20) + 'px';
    frag.appendChild(heart);
  }
  container.appendChild(frag);
}

// 生成导航
function renderNav() {
  const nav = document.getElementById('timelineNav');
  const frag = document.createDocumentFragment();
  const allBtn = document.createElement('button');
  allBtn.className = 'nav-btn active';
  allBtn.textContent = '🏡 全部';
  allBtn.onclick = () => filterFolder('all', allBtn);
  frag.appendChild(allBtn);
  for (const folder of Object.keys(photosByFolder)) {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.textContent = folder;
    btn.onclick = () => filterFolder(folder, btn);
    frag.appendChild(btn);
  }
  nav.appendChild(frag);
}

// 渲染照片
function renderPhotos(folder = 'all') {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  let photos = [];
  if (folder === 'all') {
    for (const [f, files] of Object.entries(photosByFolder)) {
      files.forEach(file => photos.push({ folder: f, file }));
    }
  } else {
    const files = photosByFolder[folder] || [];
    files.forEach(file => photos.push({ folder, file }));
  }
  photos.reverse();
  const frag = document.createDocumentFragment();
  photos.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    const esc = p.file.replace(/'/g, "\\'");
    const globalIndex = allPhotos.findIndex(ph => ph.folder === p.folder && ph.file === p.file);
    card.innerHTML = `<img src="thumbnails/${esc.toLowerCase()}" alt="${p.folder}" loading="lazy" decoding="async" onclick="openModal(${globalIndex})"><div class="photo-info"><h3>${p.folder}</h3></div>`;
    frag.appendChild(card);
  });
  grid.appendChild(frag);
}

// 筛选
function filterFolder(folder, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPhotos(folder);
  // 手机端：点击后自动滚动按钮到可见区域
  if (window.innerWidth <= 768) {
    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

// 灯箱
let currentPhotoIndex = 0;
function openModal(index) {
  currentPhotoIndex = index;
  const modal = document.getElementById('photoModal');
  const modalImg = document.getElementById('modalImg');
  const loading = document.getElementById('modalLoading');
  const counter = document.getElementById('modalCounter');
  const photo = allPhotos[index];
  loading.style.display = 'block';
  modalImg.style.opacity = '0.3';
  modalImg.onload = null;
  modalImg.onerror = null;
  modalImg.onload = () => {
    loading.style.display = 'none';
    modalImg.style.opacity = '1';
  };
  modalImg.onerror = () => {
    loading.style.display = 'none';
    modalImg.style.opacity = '0.5';
  };
  const src = `https://306alp.pages.dev/${encodeURIComponent(photo.folder)}/${encodeURIComponent(photo.file).replace(/'/g, "\\'")}`;
  if (modalImg.src.endsWith(src.split('/').slice(-2).join('/'))) {
    loading.style.display = 'none';
    modalImg.style.opacity = '1';
  } else {
    modalImg.src = src;
  }
  counter.textContent = `${index + 1} / ${allPhotos.length} - ${photo.folder}`;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
  // 预加载下一张
  if (index + 1 < allPhotos.length) {
    const next = allPhotos[index + 1];
    new Image().src = `https://306alp.pages.dev/${encodeURIComponent(next.folder)}/${encodeURIComponent(next.file)}`;
  }
}

function closeModal() {
  document.getElementById('photoModal').classList.remove('active');
  document.body.style.overflow = '';
}

function prevPhoto() {
  currentPhotoIndex = (currentPhotoIndex - 1 + allPhotos.length) % allPhotos.length;
  updateModal();
}

function nextPhoto() {
  currentPhotoIndex = (currentPhotoIndex + 1) % allPhotos.length;
  updateModal();
}

function updateModal() {
  const modalImg = document.getElementById('modalImg');
  const loading = document.getElementById('modalLoading');
  const counter = document.getElementById('modalCounter');
  const photo = allPhotos[currentPhotoIndex];
  loading.style.display = 'block';
  modalImg.style.opacity = '0.3';
  modalImg.onload = null;
  modalImg.onerror = null;
  modalImg.onload = () => {
    loading.style.display = 'none';
    modalImg.style.opacity = '1';
  };
  modalImg.onerror = () => {
    loading.style.display = 'none';
    modalImg.style.opacity = '0.5';
  };
  const src = `https://306alp.pages.dev/${encodeURIComponent(photo.folder)}/${encodeURIComponent(photo.file).replace(/'/g, "\\'")}`;
  if (modalImg.src.endsWith(src.split('/').slice(-2).join('/'))) {
    loading.style.display = 'none';
    modalImg.style.opacity = '1';
  } else {
    modalImg.src = src;
  }
  counter.textContent = `${currentPhotoIndex + 1} / ${allPhotos.length} - ${photo.folder}`;
}

// 键盘导航
document.addEventListener('keydown', e => {
  if (!document.getElementById('photoModal').classList.contains('active')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') prevPhoto();
  if (e.key === 'ArrowRight') nextPhoto();
});

// 返回顶部按钮
window.addEventListener('scroll', () => {
  const btn = document.getElementById('backToTop');
  btn.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

// 触摸滑动支持
(function() {
  let sx = 0;
  const modal = document.getElementById('photoModal');
  modal.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
  modal.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 50) {
      dx > 0 ? prevPhoto() : nextPhoto();
    }
  }, { passive: true });
})();

// 计算在一起的天数
function updateTogetherDays() {
  const startDate = new Date('2011-03-06');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffTime = Math.abs(today - startDate);
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  document.getElementById('togetherDays').textContent = diffDays.toLocaleString();
}

// 初始化
updateTogetherDays();
flattenPhotos();
createHearts();
renderNav();
renderPhotos();
</script>
