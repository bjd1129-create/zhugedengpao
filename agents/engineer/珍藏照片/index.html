<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>珍藏记忆</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:linear-gradient(135deg,#ff6b6b 0%,#ffa07a 100%);min-height:100vh;overflow-x:hidden}

/* 浪漫背景 */
.bg-hearts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.heart{position:absolute;font-size:20px;opacity:0.3;animation:float 15s infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-100px) rotate(180deg)}}

header{text-align:center;padding:80px 20px 40px;position:relative;z-index:1}
header h1{font-size:clamp(32px,6vw,64px);color:#fff;text-shadow:2px 2px 8px rgba(0,0,0,0.3);margin-bottom:16px;font-weight:300;letter-spacing:12px}
header p{font-size:18px;color:#fff;opacity:0.95;font-weight:300;text-shadow:1px 1px 4px rgba(0,0,0,0.3)}

/* 时间线导航 */
.timeline-nav{display:flex;justify-content:center;gap:12px;padding:20px;flex-wrap:wrap;position:relative;z-index:1;max-width:1200px;margin:0 auto}
.nav-btn{padding:10px 20px;border:2px solid #fff;background:rgba(255,255,255,0.2);color:#fff;border-radius:30px;cursor:pointer;font-size:14px;transition:all 0.3s;font-weight:600;backdrop-filter:blur(10px);white-space:nowrap}
.nav-btn:hover,.nav-btn.active{background:#fff;color:#ff6b6b;transform:scale(1.05);box-shadow:0 4px 20px rgba(255,255,255,0.3)}

main{max-width:1400px;margin:0 auto;padding:40px 20px;position:relative;z-index:1}

/* 拍立得风格相册 */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:32px}
.photo-card{background:#fff;padding:12px 12px 40px;border-radius:4px;box-shadow:0 8px 30px rgba(0,0,0,0.15);transition:all 0.4s;cursor:pointer;transform:rotate(0deg)}
.photo-card:nth-child(odd){transform:rotate(-2deg)}
.photo-card:nth-child(even){transform:rotate(2deg)}
.photo-card:hover{transform:scale(1.05) rotate(0deg);box-shadow:0 15px 50px rgba(0,0,0,0.25);z-index:10}
.photo-card img{width:100%;height:220px;object-fit:cover;border-radius:2px}
.photo-info{padding:16px 8px 8px;text-align:center}
.photo-info h3{font-size:14px;color:#333;margin-bottom:4px}
.photo-info p{font-size:11px;color:#999}

/* 全屏查看 */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:2000;justify-content:center;align-items:center;padding:20px}
.modal.active{display:flex}
.modal-content{max-width:90vw;max-height:90vh;position:relative}
.modal-content img{max-width:100%;max-height:90vh;border-radius:8px;box-shadow:0 0 50px rgba(255,255,255,0.2)}
.modal-close{position:absolute;top:-50px;right:0;font-size:36px;color:#fff;cursor:pointer;background:none;border:none;transition:transform 0.3s}
.modal-close:hover{transform:rotate(90deg)}
.modal-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:48px;color:#fff;cursor:pointer;padding:20px;background:none;border:none;transition:color 0.3s}
.modal-nav:hover{color:#ff6b6b}
.modal-prev{left:20px}
.modal-next{right:20px}
.modal-counter{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#fff;font-size:16px}

/* 页脚 */
footer{text-align:center;padding:60px 20px;color:#fff;position:relative;z-index:1}
footer p{font-size:14px;opacity:0.9}

@media(max-width:1024px){.photo-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
@media(max-width:768px){.photo-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px}.photo-card{padding:8px 8px 30px}.timeline-nav{gap:8px}.nav-btn{padding:8px 16px;font-size:13px}}
@media(max-width:480px){.photo-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr)}}}
</style>
</head>
<body>
<div class="bg-hearts" id="bgHearts"></div>

<header>
  <h1>珍藏记忆</h1>
  <p>我们的时光相册 · 340 张珍贵回忆</p>
</header>

<div class="timeline-nav" id="timelineNav">
  <!-- 由 JS 动态生成 -->
</div>

<main>
  <div class="photo-grid" id="photoGrid"></div>
</main>

<div class="modal" id="photoModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <button class="modal-nav modal-prev" onclick="prevPhoto()">❮</button>
    <img id="modalImg" src="" alt="">
    <button class="modal-nav modal-next" onclick="nextPhoto()">❯</button>
    <div class="modal-counter" id="modalCounter"></div>
  </div>
</div>

<footer>
  <p>💕 一起走过的每一天都值得珍藏 💕</p>
  <p>2013 - 2019 · 340 个珍贵瞬间</p>
</footer>

// 扁平化所有照片用于灯箱
let allPhotos = [];
let photoIndexMap = new Map();

function flattenPhotos() {
  allPhotos = [];
  photoIndexMap.clear();
  for (const [folder, files] of Object.entries(photosByFolder)) {
    files.forEach(file => {
      photoIndexMap.set(allPhotos.length, { folder, file });
      allPhotos.push({ folder, file });
    });
  }
}

// 生成背景爱心
function createHearts() {
  const container = document.getElementById('bgHearts');
  for (let i = 0; i < 20; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = ['💕', '💖', '💗', '💓', '💞'][Math.floor(Math.random() * 5)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.top = Math.random() * 100 + '%';
    heart.style.animationDelay = Math.random() * 5 + 's';
    heart.style.fontSize = (15 + Math.random() * 20) + 'px';
    container.appendChild(heart);
  }
}

// 生成导航按钮
function renderNav() {
  const nav = document.getElementById('timelineNav');
  nav.innerHTML = '';
  
  // 全部按钮
  const allBtn = document.createElement('button');
  allBtn.className = 'nav-btn active';
  allBtn.textContent = '💕 全部';
  allBtn.onclick = () => filterFolder('all', allBtn);
  nav.appendChild(allBtn);
  
  // 年份按钮
  for (const folder of Object.keys(photosByFolder)) {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.textContent = folder;
    btn.onclick = () => filterFolder(folder, btn);
    nav.appendChild(btn);
  }
}

// 渲染照片
function renderPhotos(folder = 'all') {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  
  let photos = [];
  if (folder === 'all') {
    for (const [f, files] of Object.entries(photosByFolder)) {
      files.forEach(file => photos.push({ folder: f, file }));
    }
  } else {
    const files = photosByFolder[folder] || [];
    files.forEach(file => photos.push({ folder: folder, file }));
  }
  
  // 倒序：最新的在最上面
  photos.reverse();
  
  photos.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.animationDelay = (i * 0.03) + 's';
    const globalIndex = allPhotos.findIndex(ph => ph.folder === p.folder && ph.file === p.file);
    card.innerHTML = `<img src="thumbnails/${p.file.replace(/'/g, "\\'")}" alt="${p.folder}" loading="lazy" onclick="openModal(${globalIndex})"><div class="photo-info"><h3>${p.folder}</h3></div>`;
    grid.appendChild(card);
  });
}

// 筛选文件夹
function filterFolder(folder, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPhotos(folder);
}

// 灯箱功能
let currentPhotoIndex = 0;

function openModal(index) {
  currentPhotoIndex = index;
  const modal = document.getElementById('photoModal');
  const modalImg = document.getElementById('modalImg');
  const counter = document.getElementById('modalCounter');
  
  const photo = allPhotos[index];
  modalImg.src = `images/${photo.file.replace(/'/g, "\\'")}`;
  counter.textContent = `${index + 1} / ${allPhotos.length} - ${photo.folder}`;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const modal = document.getElementById('photoModal');
  modal.classList.remove('active');
  document.body.style.overflow = '';
}

function prevPhoto() {
  currentPhotoIndex = (currentPhotoIndex - 1 + allPhotos.length) % allPhotos.length;
  updateModal();
}

function nextPhoto() {
  currentPhotoIndex = (currentPhotoIndex + 1) % allPhotos.length;
  updateModal();
}

function updateModal() {
  const modalImg = document.getElementById('modalImg');
  const counter = document.getElementById('modalCounter');
  const photo = allPhotos[currentPhotoIndex];
  
  modalImg.src = `images/${photo.file.replace(/'/g, "\\'")}`;
  counter.textContent = `${currentPhotoIndex + 1} / ${allPhotos.length} - ${photo.folder}`;
}

// 键盘导航
document.addEventListener('keydown', e => {
  const modal = document.getElementById('photoModal');
  if (!modal.classList.contains('active')) return;
  
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') prevPhoto();
  if (e.key === 'ArrowRight') nextPhoto();
});

// 初始化
flattenPhotos();
createHearts();
renderNav();
renderPhotos();
</script>
