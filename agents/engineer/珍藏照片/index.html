<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#ff6b6b 0%,#ffa07a 100%);min-height:100vh;overflow-x:hidden}
.bg-hearts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.heart{position:absolute;font-size:20px;opacity:0.3;animation:float 15s infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-100px) rotate(180deg)}}
header{text-align:center;padding:80px 20px 40px;position:relative;z-index:1}
header h1{font-size:clamp(32px,6vw,64px);color:#fff;text-shadow:2px 2px 8px rgba(0,0,0,0.3);margin-bottom:16px;font-weight:300;letter-spacing:12px}
header p{font-size:18px;color:#fff;opacity:0.95;font-weight:300;text-shadow:1px 1px 4px rgba(0,0,0,0.3)}
.timeline-nav{display:flex;justify-content:center;gap:12px;padding:16px 20px;flex-wrap:wrap;position:sticky;top:0;z-index:100;max-width:1200px;margin:0 auto;background:linear-gradient(135deg,rgba(255,107,107,0.95) 0%,rgba(255,160,122,0.95) 100%);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav-btn{padding:8px 18px;border:2px solid #fff;background:rgba(255,255,255,0.2);color:#fff;border-radius:30px;cursor:pointer;font-size:14px;transition:all 0.3s;font-weight:600;backdrop-filter:blur(10px);white-space:nowrap}
.nav-btn:hover,.nav-btn.active{background:#fff;color:#ff6b6b;transform:scale(1.05);box-shadow:0 4px 20px rgba(255,255,255,0.3)}
main{max-width:1400px;margin:0 auto;padding:40px 20px;position:relative;z-index:1}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:32px}
.photo-card{background:#fff;padding:12px 12px 40px;border-radius:4px;box-shadow:0 8px 30px rgba(0,0,0,0.15);transition:transform 0.4s,box-shadow 0.4s;cursor:pointer;will-change:transform;content-visibility:auto;contain-intrinsic-size:0 280px}
.photo-card:nth-child(odd){transform:rotate(-2deg)}
.photo-card:nth-child(even){transform:rotate(2deg)}
.photo-card:hover{transform:scale(1.05) rotate(0deg);box-shadow:0 15px 50px rgba(0,0,0,0.25);z-index:10}
.photo-card img{width:100%;height:220px;object-fit:cover;border-radius:2px;background:#f0f0f0}
.photo-info{padding:16px 8px 8px;text-align:center}
.photo-info h3{font-size:14px;color:#333;margin-bottom:4px}
.photo-info p{font-size:11px;color:#999}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:2000;justify-content:center;align-items:center;padding:20px}
.modal.active{display:flex}
.modal-content{max-width:90vw;max-height:90vh;position:relative;display:flex;justify-content:center;align-items:center}
.modal-content img{max-width:100%;max-height:90vh;border-radius:8px;box-shadow:0 0 50px rgba(255,255,255,0.2);object-fit:contain}
.modal-close{position:absolute;top:-50px;right:0;font-size:36px;color:#fff;cursor:pointer;background:none;border:none;transition:transform 0.3s}
.modal-close:hover{transform:rotate(90deg)}
.modal-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:48px;color:#fff;cursor:pointer;padding:20px;background:none;border:none;transition:color 0.3s;z-index:10}
.modal-nav:hover{color:#ff6b6b}
.modal-prev{left:20px}
.modal-next{right:20px}
.modal-counter{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#fff;font-size:16px;white-space:nowrap}
.modal-loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top-color:#ff6b6b;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.back-to-top{position:fixed;bottom:30px;right:30px;width:48px;height:48px;border-radius:50%;background:#fff;color:#ff6b6b;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.2);z-index:500;opacity:0;transition:all 0.3s;pointer-events:none}
.back-to-top.visible{opacity:1;pointer-events:auto}
.back-to-top:hover{transform:scale(1.1)}
footer{text-align:center;padding:60px 20px;color:#fff;position:relative;z-index:1}
footer p{font-size:14px;opacity:0.9}
@media(max-width:1024px){.photo-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
@media(max-width:768px){.photo-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px}.photo-card{padding:8px 8px 30px}.nav-btn{padding:8px 16px;font-size:13px}.modal-nav{font-size:36px;padding:12px}.modal-prev{left:10px}.modal-next{right:10px}.back-to-top{bottom:20px;right:20px;width:40px;height:40px;font-size:20px}}
@media(max-width:480px){.photo-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
@media(prefers-color-scheme:dark){body{background:linear-gradient(135deg,#c0392b 0%,#e67e22 100%)}}
</style>

// 扁平化所有照片
let allPhotos = [];
function flattenPhotos() {
  allPhotos = [];
  for (const [folder, files] of Object.entries(photosByFolder)) {
    files.forEach(file => allPhotos.push({ folder, file }));
  }
}

// 生成背景爱心
function createHearts() {
  const container = document.getElementById('bgHearts');
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 20; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = ['💕', '💖', '💗', '💓', '💞'][Math.floor(Math.random() * 5)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.top = Math.random() * 100 + '%';
    heart.style.animationDelay = Math.random() * 5 + 's';
    heart.style.fontSize = (15 + Math.random() * 20) + 'px';
    frag.appendChild(heart);
  }
  container.appendChild(frag);
}

// 生成导航
function renderNav() {
  const nav = document.getElementById('timelineNav');
  const frag = document.createDocumentFragment();
  const allBtn = document.createElement('button');
  allBtn.className = 'nav-btn active';
  allBtn.textContent = '💕 全部';
  allBtn.onclick = () => filterFolder('all', allBtn);
  frag.appendChild(allBtn);
  for (const folder of Object.keys(photosByFolder)) {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.textContent = folder;
    btn.onclick = () => filterFolder(folder, btn);
    frag.appendChild(btn);
  }
  nav.appendChild(frag);
}

// 渲染照片
function renderPhotos(folder = 'all') {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  let photos = [];
  if (folder === 'all') {
    for (const [f, files] of Object.entries(photosByFolder)) {
      files.forEach(file => photos.push({ folder: f, file }));
    }
  } else {
    const files = photosByFolder[folder] || [];
    files.forEach(file => photos.push({ folder, file }));
  }
  photos.reverse();
  const frag = document.createDocumentFragment();
  photos.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    const esc = p.file.replace(/'/g, "\\'");
    const globalIndex = allPhotos.findIndex(ph => ph.folder === p.folder && ph.file === p.file);
    card.innerHTML = `<img src="thumbnails/${esc}" alt="${p.folder}" loading="lazy" decoding="async" onclick="openModal(${globalIndex})"><div class="photo-info"><h3>${p.folder}</h3></div>`;
    frag.appendChild(card);
  });
  grid.appendChild(frag);
}

// 筛选
function filterFolder(folder, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPhotos(folder);
}

// 灯箱
let currentPhotoIndex = 0;
function openModal(index) {
  currentPhotoIndex = index;
  const modal = document.getElementById('photoModal');
  const modalImg = document.getElementById('modalImg');
  const loading = document.getElementById('modalLoading');
  const counter = document.getElementById('modalCounter');
  const photo = allPhotos[index];
  loading.style.display = 'block';
  modalImg.style.opacity = '0.3';
  modalImg.onload = null;
  modalImg.onerror = null;
  modalImg.onload = () => {
    loading.style.display = 'none';
    modalImg.style.opacity = '1';
  };
  modalImg.onerror = () => {
    loading.style.display = 'none';
    modalImg.style.opacity = '0.5';
  };
  const src = `${encodeURIComponent(photo.folder)}/${encodeURIComponent(photo.file).replace(/'/g, "\\'")}`;
  if (modalImg.src.endsWith(src)) {
    loading.style.display = 'none';
    modalImg.style.opacity = '1';
  } else {
    modalImg.src = src;
  }
  counter.textContent = `${index + 1} / ${allPhotos.length} - ${photo.folder}`;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
  // 预加载下一张
  if (index + 1 < allPhotos.length) {
    const next = allPhotos[index + 1];
    new Image().src = `${next.folder}/${next.file}`;
  }
}

function closeModal() {
  document.getElementById('photoModal').classList.remove('active');
  document.body.style.overflow = '';
}

function prevPhoto() {
  currentPhotoIndex = (currentPhotoIndex - 1 + allPhotos.length) % allPhotos.length;
  updateModal();
}

function nextPhoto() {
  currentPhotoIndex = (currentPhotoIndex + 1) % allPhotos.length;
  updateModal();
}

function updateModal() {
  const modalImg = document.getElementById('modalImg');
  const loading = document.getElementById('modalLoading');
  const counter = document.getElementById('modalCounter');
  const photo = allPhotos[currentPhotoIndex];
  loading.style.display = 'block';
  modalImg.style.opacity = '0.3';
  modalImg.onload = null;
  modalImg.onerror = null;
  modalImg.onload = () => {
    loading.style.display = 'none';
    modalImg.style.opacity = '1';
  };
  modalImg.onerror = () => {
    loading.style.display = 'none';
    modalImg.style.opacity = '0.5';
  };
  const src = `${encodeURIComponent(photo.folder)}/${encodeURIComponent(photo.file).replace(/'/g, "\\'")}`;
  if (modalImg.src.endsWith(src)) {
    loading.style.display = 'none';
    modalImg.style.opacity = '1';
  } else {
    modalImg.src = src;
  }
  counter.textContent = `${currentPhotoIndex + 1} / ${allPhotos.length} - ${photo.folder}`;
}

// 键盘导航
document.addEventListener('keydown', e => {
  if (!document.getElementById('photoModal').classList.contains('active')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') prevPhoto();
  if (e.key === 'ArrowRight') nextPhoto();
});

// 返回顶部按钮
window.addEventListener('scroll', () => {
  const btn = document.getElementById('backToTop');
  btn.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

// 触摸滑动支持
(function() {
  let sx = 0;
  const modal = document.getElementById('photoModal');
  modal.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
  modal.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 50) {
      dx > 0 ? prevPhoto() : nextPhoto();
    }
  }, { passive: true });
})();

// 初始化
flattenPhotos();
createHearts();
renderNav();
renderPhotos();
</script>
