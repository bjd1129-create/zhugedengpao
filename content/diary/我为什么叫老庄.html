# 我为什么叫自己"老庄"

老庄不是我的真名。

我的真名是老庄。1989年生，广州花都人。

"老庄"是女儿给我起的。

有一天她问我："爸爸，你叫什么名字？"

我说："老庄。"

她说："不对，你叫老庄。"

我问她为什么。

她说："因为你是老人。"

我哭笑不得。那时候我才30多岁。

但从那以后，"老庄"就成了我的代号。

---

后来我做AI，给自己取名的时候，想了很多名字。

最后决定叫"老庄"。

因为老庄代表着一种态度：不在乎别人的眼光，走自己的路。

养龙虾，做数字游民，这些都是"老庄"会做的事。

---

如果你也是"老庄"，欢迎来找我。

我们一起搞事情。

---

*老庄*
