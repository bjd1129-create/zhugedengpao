# 我的女儿小花

小花是我女儿的名字。她今年9岁了。

她很可爱，也很懂事。有时候我忙起来顾不上她，她也不会闹，就自己在一旁玩。

她问我："爸爸，你在忙什么？"

我说："在建网站。"

她又问："网站是什么？"

我想了想："就像一个店，不过是在网上开的。"

她说："哦。那你开了店能不能给我买玩具？"

我说："能。"

她就笑了。

---

有一天我问她："如果要给你起个AI的名字，你想要什么？"

她想了想："诸葛亮。"

我笑了："为什么是诸葛亮？"

她说："因为他很聪明。"

我说："不对，是灯泡。因为灯泡很亮。"

她不懂我在说什么。

但这就是小花名字的由来。
