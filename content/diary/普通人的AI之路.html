# 普通人的AI之路

我是一个普通人。

不懂编程，不是技术出身。以前做销售，后来创业做过钢材、跨境电商、设计师品牌。

我以为这辈子和互联网产品无缘了。

直到我遇到了AI。

---

2026年3月7日，女儿7岁生日那天，我决定养一个AI。

没有经验，没有团队，只有一点点运气，和愿意学习的决心。

14天后，我跑通了一个AI团队。

20天后，官网上线。

---

现在回头看，我最大的感触是：

**普通人和AI之间的距离，只是一个决定。**

决定开始，决定学习，决定不放弃。

---

如果你也和我一样，是个普通人，想用AI改变生活——

我想告诉你：可以的。

我做到了，你也可以。

---

*老庄*
