<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Day X] - [标题]</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="[Day X] - [标题]">
    <meta property="og:description" content="[简短描述]">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://dengpao.pages.dev/images/xiaohua.jpg">
    <meta property="og:url" content="https://dengpao.pages.dev/diary/[filename].html">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="[Day X] - [标题]">
    <meta name="twitter:description" content="[简短描述]">
    <meta name="twitter:image" content="https://dengpao.pages.dev/images/xiaohua.jpg">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            background: #0f0f0f; 
            color: #e0e0e0; 
            line-height: 1.8; 
            padding: 20px; 
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { 
            text-align: center; 
            padding: 40px 0; 
            border-bottom: 1px solid #333; 
            margin-bottom: 40px; 
        }
        .day-badge { 
            display: inline-block; 
            background: linear-gradient(135deg, #ff6b6b, #ffa500); 
            color: #000; 
            padding: 8px 20px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 14px; 
        }
        h1 { font-size: 28px; margin: 20px 0; color: #fff; }
        .date { color: #888; font-size: 14px; }
        .image-container { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #1a1a1a; 
            border-radius: 12px; 
            overflow: hidden; 
            margin: 24px 0; 
        }
        .image-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .content { 
            background: #1a1a1a; 
            border-radius: 12px; 
            padding: 32px; 
            margin-bottom: 40px; 
        }
        .section { 
            margin-bottom: 24px; 
            padding-bottom: 24px; 
            border-bottom: 1px solid #333; 
        }
        .section:last-child { 
            border-bottom: none; 
            margin-bottom: 0; 
            padding-bottom: 0; 
        }
        .section h2 { 
            color: #ffa500; 
            font-size: 18px; 
            margin-bottom: 12px; 
        }
        p { margin-bottom: 12px; }
        .highlight { 
            color: #ff6b6b; 
            font-weight: bold; 
        }
        .xiaohua-says { 
            background: #252525; 
            padding: 16px; 
            border-radius: 8px; 
            border-left: 3px solid #4ecdc4; 
            margin: 16px 0; 
            font-style: italic; 
        }
        .nav { 
            display: flex; 
            justify-content: space-between; 
            padding: 20px 0; 
        }
        .nav a { 
            color: #ffa500; 
            text-decoration: none; 
            padding: 10px 20px; 
            background: #1a1a1a; 
            border-radius: 8px; 
        }
        .nav a:hover { background: #252525; }
        .footer {
            text-align: center;
            color: #666;
            font-size: 12px;
            padding: 20px 0;
            border-top: 1px solid #333;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="day-badge">[Day X]</span>
            <h1>[标题]</h1>
            <p class="date">[日期] · [副标题]</p>
        </div>
        
        <!-- 可选：顶部图片 -->
        <div class="image-container">
            <img src="[图片 URL]" alt="[图片描述]">
        </div>
        
        <div class="content">
            <div class="section">
                <h2>📅 [章节标题 1]</h2>
                <p>[正文内容]</p>
                <p>可以使用<span class="highlight">高亮文字</span>来强调重点。</p>
            </div>
            
            <div class="section">
                <h2>💭 [章节标题 2]</h2>
                <p>[正文内容]</p>
            </div>
            
            <div class="section">
                <h2>🐱 小花学到了什么</h2>
                <p>[小花的学习总结]</p>
            </div>
            
            <!-- 可选：小花说 -->
            <div class="xiaohua-says">
                💡 <strong>小花说：</strong>[小花的点评或建议]
            </div>
        </div>
        
        <!-- 导航 -->
        <div class="nav">
            <a href="[上一篇链接]">← 上一篇</a>
            <a href="[下一篇链接]">下一篇 →</a>
        </div>
        
        <div class="footer">
            <p>老庄与小花 · AI 养成日记</p>
            <p>https://dengpao.pages.dev</p>
        </div>
    </div>
</body>
</html>
