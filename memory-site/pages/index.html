<meta charset="UTF-8">

<title>💕 珍藏记忆 | 我们的时光相册</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);min-height:100vh;overflow-x:hidden}

/* 浪漫背景 */
.bg-hearts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.heart{position:absolute;font-size:20px;opacity:0.3;animation:float 15s infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-100px) rotate(180deg)}}

header{text-align:center;padding:80px 20px 40px;position:relative;z-index:1}
header h1{font-size:clamp(32px,6vw,64px);color:#fff;text-shadow:2px 2px 8px rgba(0,0,0,0.3);margin-bottom:16px;font-weight:300;letter-spacing:12px}
header p{font-size:18px;color:#fff;opacity:0.95;font-weight:300;text-shadow:1px 1px 4px rgba(0,0,0,0.3)}

/* 时间线导航 */
.timeline-nav{display:flex;justify-content:center;gap:12px;padding:20px;flex-wrap:wrap;position:relative;z-index:1}
.nav-btn{padding:10px 28px;border:2px solid #fff;background:rgba(255,255,255,0.2);color:#fff;border-radius:30px;cursor:pointer;font-size:14px;transition:all 0.3s;font-weight:600;backdrop-filter:blur(10px)}
.nav-btn:hover,.nav-btn.active{background:#fff;color:#fcb69f;transform:scale(1.05);box-shadow:0 4px 20px rgba(255,255,255,0.3)}

main{max-width:1400px;margin:0 auto;padding:40px 20px;position:relative;z-index:1}

/* 拍立得风格相册 */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:32px}
.photo-card{background:#fff;padding:12px 12px 40px;border-radius:4px;box-shadow:0 8px 30px rgba(0,0,0,0.15);transition:all 0.4s;cursor:pointer;transform:rotate(0deg)}
.photo-card:nth-child(odd){transform:rotate(-2deg)}
.photo-card:nth-child(even){transform:rotate(2deg)}
.photo-card:hover{transform:scale(1.05) rotate(0deg);box-shadow:0 15px 50px rgba(0,0,0,0.25);z-index:10}
.photo-card img{width:100%;height:220px;object-fit:cover;border-radius:2px}
.photo-card .year-tag{position:absolute;top:8px;right:8px;background:rgba(252,182,159,0.95);color:#fff;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600}
.photo-info{padding:16px 8px 8px;text-align:center}
.photo-info h3{font-size:14px;color:#333;margin-bottom:4px}
.photo-info p{font-size:11px;color:#999}

/* 瀑布流布局 */
.masonry{column-count:4;column-gap:20px}
.masonry-item{break-inside:avoid;margin-bottom:20px}
.masonry-item img{width:100%;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}

/* 全屏查看 */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:2000;justify-content:center;align-items:center;padding:20px}
.modal.active{display:flex}
.modal-content{max-width:90vw;max-height:90vh;position:relative}
.modal-content img{max-width:100%;max-height:90vh;border-radius:8px;box-shadow:0 0 50px rgba(255,255,255,0.2)}
.modal-close{position:absolute;top:-50px;right:0;font-size:36px;color:#fff;cursor:pointer;background:none;border:none;transition:transform 0.3s}
.modal-close:hover{transform:rotate(90deg)}

/* 页脚 */
footer{text-align:center;padding:60px 20px;color:#fff;position:relative;z-index:1}
footer p{font-size:14px;opacity:0.9}

@media(max-width:1024px){.masonry{column-count:3}}
@media(max-width:768px){.masonry{column-count:2}.photo-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px}.photo-card{padding:8px 8px 30px}}
@media(max-width:480px){.masonry{column-count:1}}
</style>

<div class="bg-hearts" id="bgHearts"></div>

<header>
  <h1>💕 珍藏记忆</h1>
  <p>我们的时光相册 · 每一张照片都是珍贵的回忆</p>
</header>

<div class="timeline-nav">
  <button class="nav-btn active" onclick="filterYear('all')">💕 全部</button>

  <button class="nav-btn" onclick="filterYear('2014')">🌺 2014</button>

<div class="modal" id="photoModal" onclick="if(event.target===this)closeModal()">

<footer>

// 生成背景爱心
function createHearts(){
  const container=document.getElementById('bgHearts');
  for(let i=0;i<20;i++){
    const heart=document.createElement('div');
    heart.className='heart';
    heart.innerHTML=['💕','💖','💗','💓','💞'][Math.floor(Math.random()*5)];
    heart.style.left=Math.random()*100+'%';
    heart.style.top=Math.random()*100+'%';
    heart.style.animationDelay=Math.random()*5+'s';
    heart.style.fontSize=(15+Math.random()*20)+'px';
    container.appendChild(heart);
  }
}

function renderPhotos(filter='all'){
  const grid=document.getElementById('photoGrid');
  grid.innerHTML='';
  const filtered=filter==='all'?photos:photos.filter(p=>p.year===filter);
  filtered.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='photo-card';
    card.style.animationDelay=(i*0.05)+'s';
    card.innerHTML=`<img src="images/${p.file}" alt="${p.desc}" loading="lazy" onclick="openModal(this.src)"><div class="photo-info"><h3>${p.desc}</h3><p>${p.year}年</p></div>`;
    grid.appendChild(card);
  });
}

function filterYear(year){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderPhotos(year);
}

function openModal(src){document.getElementById('modalImg').src=src;document.getElementById('photoModal').classList.add('active');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('photoModal').classList.remove('active');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

createHearts();
renderPhotos();
