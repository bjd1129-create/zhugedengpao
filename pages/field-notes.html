    <style>
        /* ========================================
           CSS 变量系统 - 与首页保持一致
           ======================================== */
        :root {
            /* 暖色调配色 */
            --bg-cream: #FFF9E6;
            --bg-warm: #FFF5E1;
            --card-bg: #FFFCF5;
            --accent-yellow: #FFB703;
            --accent-orange: #FF8C42;
            --accent-brown: #D4A87C;
            --text-dark: #5A4A42;
            --text-muted: #8A7A72;
            --border-soft: #E8DCC8;
            --shadow-warm: rgba(139, 90, 43, 0.12);
            
            /* 字体 */
            --font-hand: 'Caveat', cursive;
            --font-body: 'Noto Sans SC', -apple-system, sans-serif;
            
            /* 手绘边框 */
            --radius-sm: 8px 6px 10px 4px;
            --radius-md: 12px 8px 14px 6px;
            --radius-lg: 16px 10px 20px 8px;
            --radius-xl: 20px 12px 25px 10px;
        }
        
        /* ========================================
           基础重置
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background-color: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.7;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(255, 183, 3, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 85% 75%, rgba(212, 168, 124, 0.1) 1px, transparent 1px);
            background-size: 28px 28px;
            min-height: 100vh;
        }
        
        a {
            color: var(--accent-orange);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        
        a:hover {
            color: var(--accent-brown);
        }
        
        /* ========================================
           布局容器
           ======================================== */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* ========================================
           导航栏
           ======================================== */
        .nav {
            background: var(--card-bg);
            border-bottom: 3px solid var(--border-soft);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 12px var(--shadow-warm);
        }
        
        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-brand {
            font-family: var(--font-hand);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-brown);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-brand:hover {
            color: var(--accent-orange);
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }
        
        .nav-links a {
            font-family: var(--font-hand);
            font-size: 1.2rem;
            color: var(--text-dark);
            padding: 5px 15px;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }
        
        .nav-links a:hover,
        .nav-links a.active {
            background: var(--accent-yellow);
            color: var(--text-dark);
        }
        
        .nav-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        
        /* ========================================
           页面头部
           ======================================== */
        .page-header {
            padding: 60px 0 40px;
            text-align: center;
        }
        
        .page-title {
            font-family: var(--font-hand);
            font-size: 3rem;
            color: var(--accent-brown);
            margin-bottom: 15px;
            text-shadow: 3px 3px 0 var(--border-soft);
        }
        
        .page-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* ========================================
           搜索与筛选
           ======================================== */
        .filters {
            background: var(--card-bg);
            border: 3px solid var(--border-soft);
            border-radius: var(--radius-xl);
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 6px 6px 0 var(--border-soft);
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 20px;
            font-family: var(--font-body);
            font-size: 1rem;
            border: 2px solid var(--border-soft);
            border-radius: var(--radius-lg);
            background: var(--bg-cream);
            color: var(--text-dark);
            transition: all 0.2s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent-yellow);
            box-shadow: 0 0 0 3px rgba(255, 183, 3, 0.2);
        }
        
        .search-input::placeholder {
            color: var(--text-muted);
        }
        
        .tag-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-tag {
            font-family: var(--font-hand);
            font-size: 1rem;
            padding: 6px 16px;
            background: var(--bg-warm);
            border: 2px solid var(--border-soft);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-dark);
        }
        
        .filter-tag:hover,
        .filter-tag.active {
            background: var(--accent-yellow);
            border-color: var(--accent-yellow);
            transform: translateY(-2px);
        }
        
        /* ========================================
           笔记卡片网格
           ======================================== */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        
        /* 笔记卡片 */
        .note-card {
            background: var(--card-bg);
            border: 3px solid var(--border-soft);
            border-radius: var(--radius-xl);
            padding: 25px;
            box-shadow: 6px 6px 0 var(--border-soft);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        
        .note-card:hover {
            transform: translateY(-8px) rotate(1deg);
            box-shadow: 12px 12px 0 var(--accent-yellow);
            border-color: var(--accent-yellow);
        }
        
        /* 书签角标 */
        .note-card::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 20px;
            width: 45px;
            height: 25px;
            background: var(--accent-yellow);
            border: 2px solid var(--border-soft);
            border-radius: 25px 25px 0 0;
        }
        
        /* 缩略图 */
        .note-thumb {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, var(--bg-warm) 0%, var(--accent-yellow) 50%, var(--accent-orange) 100%);
            border-radius: var(--radius-lg);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border: 2px dashed var(--border-soft);
        }
        
        /* 笔记标题 */
        .note-title {
            font-family: var(--font-hand);
            font-size: 1.6rem;
            color: var(--accent-brown);
            margin-bottom: 10px;
            line-height: 1.3;
        }
        
        /* 日期 */
        .note-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* 摘要 */
        .note-summary {
            font-size: 0.95rem;
            color: var(--text-dark);
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        /* 标签 */
        .note-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .note-tag {
            font-size: 0.75rem;
            padding: 4px 12px;
            background: var(--bg-warm);
            border: 1px solid var(--border-soft);
            border-radius: 15px;
            color: var(--text-muted);
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            font-family: var(--font-hand);
            font-size: 1.3rem;
            color: var(--text-muted);
        }
        
        /* 无结果 */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border: 3px dashed var(--border-soft);
            border-radius: var(--radius-xl);
        }
        
        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .no-results-title {
            font-family: var(--font-hand);
            font-size: 1.8rem;
            color: var(--accent-brown);
            margin-bottom: 10px;
        }
        
        .no-results-text {
            color: var(--text-muted);
        }
        
        /* ========================================
           分页
           ======================================== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 50px 0;
        }
        
        .page-btn {
            font-family: var(--font-hand);
            font-size: 1.1rem;
            padding: 10px 20px;
            background: var(--card-bg);
            border: 2px solid var(--border-soft);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-dark);
        }
        
        .page-btn:hover:not(:disabled) {
            background: var(--accent-yellow);
            border-color: var(--accent-yellow);
            transform: translateY(-2px);
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-btn.active {
            background: var(--accent-yellow);
            border-color: var(--accent-yellow);
        }
        
        .page-info {
            font-family: var(--font-hand);
            font-size: 1.1rem;
            color: var(--text-muted);
            padding: 0 15px;
        }
        
        /* ========================================
           页脚
           ======================================== */
        .footer {
            background: var(--card-bg);
            border-top: 3px solid var(--border-soft);
            padding: 40px 0 30px;
            text-align: center;
        }
        
        .footer-lamp {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .footer-tagline {
            font-family: var(--font-hand);
            font-size: 1.3rem;
            color: var(--accent-brown);
            margin-bottom: 20px;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .footer-links a {
            font-size: 1.5rem;
            transition: transform 0.2s ease;
        }
        
        .footer-links a:hover {
            transform: scale(1.2);
        }
        
        .footer-copy {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .footer-copy span {
            color: var(--accent-orange);
        }
        
        /* ========================================
           响应式设计
           ======================================== */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--card-bg);
                flex-direction: column;
                padding: 20px;
                gap: 15px;
                border-bottom: 3px solid var(--border-soft);
                box-shadow: 0 4px 12px var(--shadow-warm);
            }
            
            .nav-links.active {
                display: flex;
            }
            
            .nav-toggle {
                display: block;
            }
            
            .page-header {
                padding: 40px 0 30px;
            }
            
            .page-title {
                font-size: 2.2rem;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .notes-grid {
                grid-template-columns: 1fr;
            }
            
            .pagination {
                flex-wrap: wrap;
            }
        }
        
        @media (max-width: 480px) {
            .page-title {
                font-size: 1.8rem;
            }
            
            .note-card {
                padding: 20px;
            }
            
            .note-thumb {
                height: 150px;
                font-size: 3rem;
            }
        }
    </style>
</head>

    <script>

        // ========================================
        // 分页与筛选状态
        // ========================================
        let currentPage = 1;
        const itemsPerPage = 6;
        let currentTag = 'all';
        let searchQuery = '';
        let filteredNotes = [...notesData];
        
        // ========================================
        // 初始化
        // ========================================
        document.addEventListener('DOMContentLoaded', () => {
            renderNotes();
        });
        
        // ========================================
        // 渲染笔记列表
        // ========================================
        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            const noResults = document.getElementById('noResults');
            
            // 计算分页
            const totalPages = Math.ceil(filteredNotes.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageNotes = filteredNotes.slice(startIndex, endIndex);
            
            // 更新分页信息
            updatePagination(totalPages);
            
            // 无结果
            if (filteredNotes.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            
            // 生成卡片 HTML
            grid.innerHTML = pageNotes.map(note => `
                <article class="note-card" onclick="goToNote('${note.id}')">
                    <div class="note-thumb">${note.emoji}</div>
                    <h3 class="note-title">${note.title}</h3>
                    <p class="note-date">📅 ${note.date}</p>
                    <p class="note-summary">${note.summary}</p>
                    <div class="note-tags">
                        ${note.tags.map(tag => `<span class="note-tag">#${tag}</span>`).join('')}
                    </div>
                </article>
            `).join('');
        }
        
        // ========================================
        // 搜索功能
        // ========================================
        function filterNotes() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            currentPage = 1;
            applyFilters();
        }
        
        // ========================================
        // 标签筛选
        // ========================================
        function filterByTag(tag) {
            currentTag = tag;
            
            // 更新标签按钮状态
            document.querySelectorAll('.filter-tag').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tag === tag) {
                    btn.classList.add('active');
                }
            });
            
            currentPage = 1;
            applyFilters();
        }
        
        // ========================================
        // 应用所有筛选
        // ========================================
        function applyFilters() {
            filteredNotes = notesData.filter(note => {
                // 标签筛选
                const tagMatch = currentTag === 'all' || note.tags.includes(currentTag);
                
                // 搜索筛选
                const searchMatch = searchQuery === '' || 
                    note.title.toLowerCase().includes(searchQuery) ||
                    note.summary.toLowerCase().includes(searchQuery) ||
                    note.tags.some(tag => tag.toLowerCase().includes(searchQuery));
                
                return tagMatch && searchMatch;
            });
            
            renderNotes();
        }
        
        // ========================================
        // 分页控制
        // ========================================
        function updatePagination(totalPages) {
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            pageInfo.textContent = `第 ${currentPage} / ${totalPages || 1} 页`;
            
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;
        }
        
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderNotes();
            }
        }
        
        function nextPage() {
            const totalPages = Math.ceil(filteredNotes.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderNotes();
            }
        }
        
        // ========================================
        // 跳转笔记详情
        // ========================================
        function goToNote(noteId) {
            console.log('跳转到笔记:', noteId);
            alert('笔记详情页开发中，敬请期待！\n\n笔记ID: ' + noteId);
        }
        
        // ========================================
        // 移动端菜单
        // ========================================
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('active');
        }
        
        // 点击导航链接关闭移动端菜单
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navLinks').classList.remove('active');
            });
        });
    </script>
</body>
</html>
