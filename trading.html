<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老庄与小花 · 量化交易平台</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --sub: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --blue: #58a6ff;
  --purple: #bc8cff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,system-ui,sans-serif; min-height:100vh; padding:20px; }
.container { max-width:1200px; margin:0 auto; }

/* 头部 */
header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
header h1 { font-size:1.4rem; font-weight:600; display:flex; align-items:center; gap:8px; }
.badge { background:var(--green); color:#000; font-size:0.7rem; padding:2px 8px; border-radius:12px; font-weight:600; }
.status { font-size:0.85rem; color:var(--sub); }
.status span { color:var(--text); }

/* 平台选择卡 */
.platforms { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:12px; margin-bottom:20px; }
.platform-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; }
.platform-card h3 { font-size:1rem; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.platform-card h3 .dot { width:8px; height:8px; border-radius:50%; background:var(--green); }
.platform-card .pnl { font-size:1.8rem; font-weight:700; font-family:'SF Mono',monospace; }
.platform-card .sub { font-size:0.75rem; color:var(--sub); margin-top:4px; }
.price-row { display:flex; justify-content:space-between; font-size:0.85rem; padding:4px 0; border-bottom:1px solid var(--border); }
.price-row:last-child { border-bottom:none; }
.coin { color:var(--sub); }
.val { font-family:'SF Mono',monospace; font-weight:500; }

/* 持仓 */
.holdings-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:20px; }
.holding-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; }
.holding-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.holding-symbol { font-weight:600; font-size:0.95rem; }
.holding-pnl { font-size:0.8rem; font-family:'SF Mono',monospace; padding:2px 8px; border-radius:6px; }
.positive { color:var(--green); background:rgba(63,185,80,0.15); }
.negative { color:var(--red); background:rgba(248,81,73,0.15); }
.neutral { color:var(--sub); background:rgba(139,148,158,0.15); }
.holding-row { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--sub); padding:3px 0; }
.holding-row span:last-child { color:var(--text); font-family:'SF Mono',monospace; font-size:0.78rem; }

/* 网格可视化 */
.grid-section { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:20px; }
.grid-section h2 { font-size:1rem; margin-bottom:16px; color:var(--text); }
.grid-coin { margin-bottom:20px; }
.grid-coin:last-child { margin-bottom:0; }
.grid-coin-header { display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem; }
.grid-name { font-weight:600; }
.grid-price { font-family:'SF Mono',monospace; color:var(--blue); }
.grid-bar { position:relative; height:28px; background:#21262d; border-radius:6px; overflow:hidden; display:flex; }
.grid-cell { flex:1; border-right:1px solid rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; font-size:0.6rem; color:var(--sub); transition:background 0.3s; }
.grid-cell:last-child { border-right:none; }
.grid-cell.triggered { background:rgba(63,185,80,0.3); color:var(--green); }
.grid-cell.current { background:rgba(88,166,255,0.4); border:2px solid var(--blue); z-index:1; }
.price-marker { position:absolute; top:-18px; transform:translateX(-50%); font-size:0.7rem; color:var(--yellow); font-family:'SF Mono',monospace; white-space:nowrap; }

/* 交易记录 */
.trades-section { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:20px; }
.trades-section h2 { font-size:1rem; margin-bottom:12px; }
table { width:100%; border-collapse:collapse; font-size:0.82rem; }
th { text-align:left; color:var(--sub); font-weight:500; padding:8px; border-bottom:1px solid var(--border); font-size:0.75rem; }
td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.05); }
td:first-child { color:var(--sub); font-size:0.75rem; }
.buy { color:var(--green); font-weight:500; }
.sell { color:var(--red); font-weight:500; }
.pnl-pos { color:var(--green); }
.pnl-neg { color:var(--red); }

/* 更新时间 */
footer { text-align:center; color:var(--sub); font-size:0.75rem; margin-top:24px; padding-top:16px; border-top:1px solid var(--border); }
footer span { color:var(--text); }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>🦞 量化交易平台 <span class="badge">v4.1</span></h1>
  <div class="status">数据更新: <span id="updateTime">--:--:--</span></div>
</header>

<!-- 三平台对比 -->
<div class="platforms" id="platforms">
  <div class="platform-card">
    <h3><span class="dot"></span> Binance</h3>
    <div class="pnl" id="bn-pnl">--</div>
    <div class="sub" id="bn-sub">加载中...</div>
  </div>
  <div class="platform-card">
    <h3><span class="dot"></span> OKX</h3>
    <div class="pnl" id="okx-pnl">--</div>
    <div class="sub" id="okx-sub">加载中...</div>
  </div>
  <div class="platform-card">
    <h3><span class="dot"></span> Bybit</h3>
    <div class="pnl" id="by-pnl">--</div>
    <div class="sub" id="by-sub">加载中...</div>
  </div>
</div>

<!-- 网格状态 -->
<div class="grid-section">
  <h2>📊 网格状态</h2>
  <div id="grids">
    <div class="grid-coin" id="grid-BTC">
      <div class="grid-coin-header"><span class="grid-name">₿ Bitcoin</span><span class="grid-price" id="price-BTC">--</span></div>
      <div class="grid-bar" id="bar-BTC"></div>
    </div>
    <div class="grid-coin" id="grid-AVAX">
      <div class="grid-coin-header"><span class="grid-name">🔺 Avalanche</span><span class="grid-price" id="price-AVAX">--</span></div>
      <div class="grid-bar" id="bar-AVAX"></div>
    </div>
    <div class="grid-coin" id="grid-ADA">
      <div class="grid-coin-header"><span class="grid-name">₳ Cardano</span><span class="grid-price" id="price-ADA">--</span></div>
      <div class="grid-bar" id="bar-ADA"></div>
    </div>
  </div>
</div>

<!-- 交易记录 -->
<div class="trades-section">
  <h2>📋 最近交易</h2>
  <table>
    <thead><tr><th>时间</th><th>平台</th><th>方向</th><th>价格</th><th>盈亏</th></tr></thead>
    <tbody id="tradesBody"><tr><td colspan="5" style="color:var(--sub)">暂无交易记录</td></tr></tbody>
  </table>
</div>

<footer>数据每5分钟自动更新 · 策略: 密集网格v4.1 · 模拟盘</footer>
</div>

<script>
// ── 实时价格（每5秒）─
const PRICE_URLS = {
  BTC: 'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT',
  ETH: 'https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT',
  AVAX: 'https://api.binance.com/api/v3/ticker/price?symbol=AVAXUSDT',
  ADA: 'https://api.binance.com/api/v3/ticker/price?symbol=ADAUSDT'
};
const livePrices = {};
let portfolioData = {};

async function fetchPrice(sym) {
  try {
    const r = await fetch(PRICE_URLS[sym]);
    const d = await r.json();
    livePrices[sym] = parseFloat(d.price);
  } catch(e) { livePrices[sym] = null; }
}

async function fetchLivePrices() {
  await Promise.all(Object.keys(PRICE_URLS).map(fetchPrice));
  // 更新网格价格
  Object.keys(livePrices).forEach(sym => {
    const el = document.getElementById('price-' + sym);
    if (el && livePrices[sym]) el.textContent = '$' + livePrices[sym].toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:4});
  });
}

// ── 加载数据 ─
async function loadData() {
  try {
    const r = await fetch('/data/trading/portfolio.json');
    portfolioData = await r.json();
    return portfolioData;
  } catch(e) { return {}; }
}

// ── 渲染三平台 ─
function renderPlatforms(data) {
  const platforms = [
    { key: 'binance', id: 'bn', name: 'Binance' },
    { key: 'okx', id: 'okx', name: 'OKX' },
    { key: 'bybit', id: 'by', name: 'Bybit' }
  ];
  platforms.forEach(({key, id}) => {
    let pnlEl = document.getElementById(id + '-pnl');
    let subEl = document.getElementById(id + '-sub');
    if (key === 'binance') {
      pnlEl.textContent = '$' + (data.account?.totalValue || 0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
      const pct = data.account?.totalPnLPercent || 0;
      pnlEl.style.color = pct >= 0 ? 'var(--green)' : 'var(--red)';
      subEl.textContent = (data.account?.totalPnLPercent >= 0 ? '+' : '') + data.account?.totalPnLPercent?.toFixed(2) + '% | ' + data.account?.totalTrades + '笔交易';
    } else {
      pnlEl.textContent = '📊 详见各平台';
      pnlEl.style.color = 'var(--sub)';
      subEl.textContent = 'OKX/Bybit数据请访问各平台App';
    }
  });
}

// ── 渲染网格可视化 ─
function renderGrids(data) {
  const gridState = data.gridState || {};
  const holdings = data.holdings || [];
  
  ['BTC', 'AVAX', 'ADA'].forEach(sym => {
    const gs = gridState[sym];
    const bar = document.getElementById('bar-' + sym);
    if (!gs || !gs.levels || !bar) return;
    
    const levels = gs.levels;
    const currentPrice = livePrices[sym];
    const minL = levels[0], maxL = levels[levels.length-1];
    
    bar.innerHTML = '';
    
    if (currentPrice && currentPrice >= minL && currentPrice <= maxL) {
      const pct = (currentPrice - minL) / (maxL - minL) * 100;
      const marker = document.createElement('div');
      marker.className = 'price-marker';
      marker.style.left = pct + '%';
      marker.textContent = '$' + currentPrice.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4});
      bar.style.position = 'relative';
      bar.appendChild(marker);
    }
    
    levels.forEach((lvl, i) => {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      const isCurrent = currentPrice && currentPrice >= lvl && (i === levels.length-1 || currentPrice < levels[i+1]);
      if (isCurrent) cell.classList.add('current');
      cell.textContent = '$' + lvl.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:lvl < 1 ? 4 : 2});
      bar.appendChild(cell);
    });
  });
}

// ── 渲染交易记录 ─
function renderTrades(data) {
  const trades = data.recentTrades || [];
  const tbody = document.getElementById('tradesBody');
  if (!trades.length) return;
  tbody.innerHTML = trades.slice(0,15).map(t => {
    const pnl = t.pnl || t.note?.match(/PnL:([^\)]+)/)?.[1] || '';
    const pnlClass = pnl.startsWith('+') ? 'pnl-pos' : pnl.startsWith('-') ? 'pnl-neg' : '';
    const sideClass = t.side === 'BUY' ? 'buy' : 'sell';
    return `<tr>
      <td>${(t.time||'').substring(11,16)}</td>
      <td>Binance</td>
      <td class="${sideClass}">${t.side}</td>
      <td>${t.symbol} $${parseFloat(t.price||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4})}</td>
      <td class="${pnlClass}">${pnl}</td>
    </tr>`;
  }).join('');
}

// ── 主更新 ─
async function update() {
  const data = await loadData();
  renderPlatforms(data);
  renderGrids(data);
  renderTrades(data);
  document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── 启动 ─
fetchLivePrices();
update();
setInterval(fetchLivePrices, 5000);
setInterval(update, 30000);
</script>
</body>
</html>
