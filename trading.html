<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老庄与小花 · 量化交易</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,system-ui,sans-serif; background:#0d1117; color:#e6edf3; padding:20px; }
.container { max-width:1100px; margin:0 auto; }
h1 { font-size:1.5rem; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
h1 span { background:#3fb950; color:#000; font-size:0.7rem; padding:2px 8px; border-radius:12px; font-weight:700; }
更新时间 { font-size:0.8rem; color:#8b949e; margin-left:auto; font-family:monospace; }

/* 账户卡片 */
.account-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.account-card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:20px; text-align:center; }
.account-card .label { font-size:0.75rem; color:#8b949e; margin-bottom:8px; }
.account-card .value { font-size:1.5rem; font-weight:700; font-family:'SF Mono',monospace; }
.account-card .value.green { color:#3fb950; }
.account-card .value.red { color:#f85149; }
.account-card .sub { font-size:0.7rem; color:#8b949e; margin-top:4px; }

/* 持仓 */
.holdings-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-bottom:20px; }
.holding-card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:16px; }
.holding-card h3 { font-size:1rem; font-weight:600; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.holding-card h3 .badge { font-size:0.7rem; padding:2px 8px; border-radius:6px; font-weight:600; }
.holding-card h3 .badge.hold { background:rgba(234,179,8,0.15); color:#eab308; }
.holding-card h3 .badge.grid { background:rgba(88,166,255,0.15); color:#58a6ff; }
.holding-card .amount { font-family:'SF Mono',monospace; font-size:0.85rem; color:#8b949e; margin-bottom:4px; }
.holding-card .price-row { display:flex; justify-content:space-between; font-size:0.85rem; padding:3px 0; }
.holding-card .price-row span:first-child { color:#8b949e; }
.holding-card .price-row span:last-child { font-family:'SF Mono',monospace; }
.holding-card .pnl { margin-top:10px; font-size:0.85rem; font-weight:600; font-family:'SF Mono',monospace; }
.holding-card .pnl.up { color:#3fb950; }
.holding-card .pnl.down { color:#f85149; }

/* 网格 */
.grid-section { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:20px; margin-bottom:20px; }
.grid-section h2 { font-size:1rem; margin-bottom:16px; }
.grid-coin { margin-bottom:16px; }
.grid-coin:last-child { margin-bottom:0; }
.grid-header { display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:6px; }
.grid-name { font-weight:600; }
.grid-range { color:#8b949e; font-family:'SF Mono',monospace; font-size:0.8rem; }
.grid-bar { height:24px; background:#21262d; border-radius:6px; position:relative; overflow:hidden; display:flex; }
.grid-cell { flex:1; border-right:1px solid rgba(255,255,255,0.05); }
.grid-cell.filled { background:rgba(63,185,80,0.2); }
.grid-cell.now { background:rgba(88,166,255,0.4); border:2px solid #58a6ff; position:absolute; width:4px; height:100%; left:50%; transform:translateX(-50%); border-radius:4px; }

/* 三平台价格 */
.platforms { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.platform-card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:16px; }
.platform-card h3 { font-size:1rem; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.platform-card h3 .dot { width:8px; height:8px; border-radius:50%; background:#3fb950; animation:pulse 2s infinite; }
.platform-card h3 .dot.offline { background:#f85149; animation:none; }
.platform-card .price-row { display:flex; justify-content:space-between; font-size:0.82rem; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
.platform-card .price-row:last-child { border-bottom:none; }
.platform-card .coin { color:#8b949e; }
.platform-card .price { font-family:'SF Mono',monospace; }

/* 交易记录 */
.trades-section { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:20px; margin-bottom:20px; }
.trades-section h2 { font-size:1rem; margin-bottom:12px; }
table { width:100%; border-collapse:collapse; font-size:0.85rem; }
th { text-align:left; color:#8b949e; font-weight:500; padding:8px; border-bottom:1px solid #30363d; }
td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.05); }
.buy { color:#3fb950; font-weight:600; }
.sell { color:#f85149; font-weight:600; }
.pnl-up { color:#3fb950; }
.pnl-down { color:#f85149; }
.empty { color:#8b949e; text-align:center; padding:20px; }

footer { text-align:center; color:#8b949e; font-size:0.75rem; padding-top:20px; border-top:1px solid #30363d; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@media(max-width:768px) { .account-grid{grid-template-columns:repeat(2,1fr)} .platforms{grid-template-columns:1fr} }
</style>
</head>
<body style="padding-top:56px">
<nav style="position:fixed;top:0;left:0;width:100%;z-index:1000;background:rgba(13,17,23,0.97);backdrop-filter:blur(12px);border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;">
  <span style="font-size:20px">🦞</span>
  <div style="display:flex;gap:4px">
    <a href="index.html" style="font-size:14px;color:#8b949e;text-decoration:none;padding:6px 8px;font-weight:500">首页</a>
    <a href="diary.html" style="font-size:14px;color:#8b949e;text-decoration:none;padding:6px 8px;font-weight:500">📖 日记</a>
    <a href="comic.html" style="font-size:14px;color:#8b949e;text-decoration:none;padding:6px 8px;font-weight:500">🎭 漫画</a>
    <a href="articles.html" style="font-size:14px;color:#8b949e;text-decoration:none;padding:6px 8px;font-weight:500">📝 文章</a>
    <a href="science.html" style="font-size:14px;color:#8b949e;text-decoration:none;padding:6px 8px;font-weight:500">🔰 科普</a>
    <a href="bagua.html" style="font-size:14px;color:#8b949e;text-decoration:none;padding:6px 8px;font-weight:500">🎯 八卦</a>

  </div>
</nav>
<div class="container">
  <h1>🦞 量化交易 <span>v4.2</span> <span id="updateTime" style="font-size:0.8rem;color:#8b949e;font-weight:400;margin-left:auto;font-family:monospace">--:--:--</span></h1>

  <!-- 账户总览 -->
  <div class="account-grid">
    <div class="account-card">
      <div class="label">总资产 (USDT)</div>
      <div class="value" id="totalValue">--</div>
    </div>
    <div class="account-card">
      <div class="label">累计盈亏</div>
      <div class="value" id="totalPnL">--</div>
    </div>
    <div class="account-card">
      <div class="label">可用现金</div>
      <div class="value" id="cashBalance">--</div>
    </div>
    <div class="account-card">
      <div class="label">网格交易</div>
      <div class="value" id="tradeCount">--</div>
    </div>
  </div>

  <!-- 三平台实时价格 -->
  <div class="platforms">
    <div class="platform-card">
      <h3><span class="dot" id="bn-dot"></span> Binance</h3>
      <div class="price-row"><span class="coin">₿ BTC</span><span class="price" id="bn-btc">--</span></div>
      <div class="price-row"><span class="coin">Ξ ETH</span><span class="price" id="bn-eth">--</span></div>
      <div class="price-row"><span class="coin">🔺 AVAX</span><span class="price" id="bn-avax">--</span></div>
      <div class="price-row"><span class="coin">₳ ADA</span><span class="price" id="bn-ada">--</span></div>
    </div>
    <div class="platform-card">
      <h3><span class="dot" id="okx-dot"></span> OKX</h3>
      <div class="price-row"><span class="coin">₿ BTC</span><span class="price" id="okx-btc">--</span></div>
      <div class="price-row"><span class="coin">Ξ ETH</span><span class="price" id="okx-eth">--</span></div>
      <div class="price-row"><span class="coin">🔺 AVAX</span><span class="price" id="okx-avax">--</span></div>
      <div class="price-row"><span class="coin">₳ ADA</span><span class="price" id="okx-ada">--</span></div>
    </div>
    <div class="platform-card">
      <h3><span class="dot" id="by-dot"></span> Bybit</h3>
      <div class="price-row"><span class="coin">₿ BTC</span><span class="price" id="by-btc">--</span></div>
      <div class="price-row"><span class="coin">Ξ ETH</span><span class="price" id="by-eth">--</span></div>
      <div class="price-row"><span class="coin">🔺 AVAX</span><span class="price" id="by-avax">--</span></div>
      <div class="price-row"><span class="coin">₳ ADA</span><span class="price" id="by-ada">--</span></div>
    </div>
  </div>

  <!-- 持仓 -->
  <div class="holdings-grid" id="holdingsGrid"></div>

  <!-- 网格状态 -->
  <div class="grid-section">
    <h2>📊 网格状态</h2>
    <div id="gridsContainer"></div>
  </div>

  <!-- 交易记录 -->
  <div class="trades-section">
    <h2>📋 交易记录</h2>
    <div id="tradesContainer"><div class="empty">暂无交易记录</div></div>
  </div>

  <footer>策略: 密集网格v4.2 · BTC/ETH持有 + AVAX/ADA网格<br>数据每30秒自动刷新</footer>
</div>

<script>
// ─── 工具函数 ───
function fmt(n, decimals) {
  if (n === null || n === undefined || isNaN(n)) return '--';
  return Number(n).toFixed(decimals || 2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ─── 账户渲染 ───
function renderAccount(data) {
  var acc = data.account || {};
  var total = acc.totalValue || 0;
  var pnl = acc.totalPnL || 0;
  var pnlPct = acc.totalPnLPercent || 0;
  var cash = acc.cashBalance || 0;
  var trades = acc.totalTrades || 0;

  document.getElementById('totalValue').textContent = '$' + fmt(total);
  document.getElementById('cashBalance').textContent = '$' + fmt(cash);
  document.getElementById('tradeCount').textContent = trades + '笔';

  var pnlEl = document.getElementById('totalPnL');
  var sign = pnl >= 0 ? '+' : '';
  pnlEl.textContent = sign + '$' + fmt(Math.abs(pnl)) + ' (' + sign + fmt(pnlPct) + '%)';
  pnlEl.className = 'value ' + (pnl >= 0 ? 'green' : 'red');
}

// ─── 持仓渲染 ───
function renderHoldings(data) {
  var container = document.getElementById('holdingsGrid');
  var holdings = data.holdings || [];
  var gridState = data.gridState || {};
  var html = '';
  var modeLabel = { 'BTC': '持有', 'ETH': '持有', 'AVAX': '网格', 'ADA': '网格' };

  holdings.forEach(function(h) {
    var sym = h.symbol;
    var gs = gridState[sym] || {};
    var mode = (gs.levels && gs.levels.length > 0) ? '网格' : '持有';
    var badgeClass = mode === '持有' ? 'hold' : 'grid';
    var amount = h.amount || 0;
    var avgPrice = h.avgPrice || 0;
    var currPrice = h.currentPrice || 0;
    var value = h.value || 0;
    var pnl = h.pnl || 0;
    var pnlClass = pnl > 0 ? 'up' : (pnl < 0 ? 'down' : '');
    var pnlSign = pnl > 0 ? '+' : '';

    html += '<div class="holding-card">' +
      '<h3>' + sym + ' <span class="badge ' + badgeClass + '">' + mode + '</span></h3>' +
      '<div class="amount">' + fmt(amount, 6) + ' ' + sym + '</div>' +
      '<div class="price-row"><span>当前价</span><span>$' + fmt(currPrice, 4) + '</span></div>' +
      '<div class="price-row"><span>持仓价值</span><span>$' + fmt(value, 2) + '</span></div>' +
      '<div class="price-row"><span>浮动盈亏</span><span class="' + pnlClass + '">' + pnlSign + '$' + fmt(Math.abs(pnl), 2) + '</span></div>' +
    '</div>';
  });

  container.innerHTML = html;
}

// ─── 网格渲染 ───
function renderGrids(data, livePrices) {
  var container = document.getElementById('gridsContainer');
  var gridState = data.gridState || {};
  var html = '';
  var symbols = ['BTC', 'ETH', 'AVAX', 'ADA'];
  var gridSymbols = ['AVAX', 'ADA']; // 只有这两个有网格

  symbols.forEach(function(sym) {
    var gs = gridState[sym] || {};
    var levels = gs.levels || [];
    var mode = (levels.length > 0) ? '网格' : '持有';
    var price = livePrices[sym] || 0;
    var pos = gs.position || 0;

    if (mode === '持有') {
      html += '<div class="grid-coin">' +
        '<div class="grid-header"><span class="grid-name">₿ ' + sym + '</span><span class="grid-range">持有模式 · 不参与网格</span></div>' +
        '<div class="grid-bar" style="align-items:center;justify-content:center;color:#eab308;font-size:0.8rem">长期持有，静待趋势</div>' +
      '</div>';
    } else {
      var rangeStr = levels.length > 0 ? levels[0].toFixed(4) + ' ~ ' + levels[levels.length-1].toFixed(4) : '--';
      var inRange = price >= levels[0] && price <= levels[levels.length-1];
      var pct = 50;
      if (inRange && levels.length > 1) {
        pct = Math.min(98, Math.max(2, ((price - levels[0]) / (levels[levels.length-1] - levels[0])) * 100));
      }

      html += '<div class="grid-coin">' +
        '<div class="grid-header"><span class="grid-name">🔺 ' + sym + '</span><span class="grid-range">' + rangeStr + ' | ' + (pos > 0 ? '持仓中' : '空仓等待') + '</span></div>' +
        '<div class="grid-bar" style="position:relative">';
      levels.forEach(function(lvl, i) {
        var isNow = price >= lvl && (i === levels.length-1 || price < levels[i+1]);
        var filled = gs.fills && gs.fills.some(function(f) { return f.note && f.note.indexOf('grid-' + i) !== -1; });
        var cls = isNow ? 'grid-cell now' : (filled ? 'grid-cell filled' : 'grid-cell');
        html += '<div class="' + cls + '"></div>';
      });
      if (inRange) {
        html += '<div class="grid-cell now" style="left:' + pct + '%;transform:translateX(-50%);width:4px;border-radius:4px"></div>';
      }
      html += '</div></div>';
    }
  });

  container.innerHTML = html;
}

// ─── 三平台价格渲染 ───
function renderPrices(platforms) {
  var syms = ['BTC', 'ETH', 'AVAX', 'ADA'];
  var dots = { 'Binance': 'bn-dot', 'OKX': 'okx-dot', 'Bybit': 'by-dot' };

  Object.keys(dots).forEach(function(p) {
    var dot = document.getElementById(dots[p]);
    if (dot) {
      var hasData = platforms[p] && platforms[p].BTC;
      dot.className = 'dot' + (hasData ? '' : ' offline');
    }
  });

  syms.forEach(function(s) {
    var lower = s.toLowerCase();
    ['bn', 'okx', 'by'].forEach(function(p) {
      var el = document.getElementById(p + '-' + lower);
      if (el && platforms[p === 'bn' ? 'Binance' : p === 'okx' ? 'OKX' : 'Bybit']) {
        var price = platforms[p === 'bn' ? 'Binance' : p === 'okx' ? 'OKX' : 'Bybit'][s];
        if (price) {
          el.textContent = '$' + (price < 1 ? fmt(price, 4) : fmt(price, 2));
        }
      }
    });
  });
}

// ─── 交易记录渲染 ───
function renderTrades(data) {
  var container = document.getElementById('tradesContainer');
  var fills = [];
  var gridState = data.gridState || {};

  Object.keys(gridState).forEach(function(sym) {
    var gsFills = gridState[sym].fills || [];
    gsFills.forEach(function(f) {
      fills.push({ time: f.time, side: f.side, symbol: sym, price: f.price, amount: f.amount, pnl: f.pnl, note: f.note });
    });
  });

  fills.sort(function(a, b) { return (b.time || '').localeCompare(a.time || ''); });

  if (fills.length === 0) {
    container.innerHTML = '<div class="empty">暂无交易记录（网格将在价格波动时自动触发）</div>';
    return;
  }

  var html = '<table><thead><tr><th>时间</th><th>方向</th><th>币种</th><th>价格</th><th>数量</th><th>盈亏</th></tr></thead><tbody>';
  fills.slice(0, 20).forEach(function(f) {
    var time = f.time ? f.time.substring(11, 16) : '--:--';
    var sideClass = f.side === 'BUY' ? 'buy' : 'sell';
    var pnlStr = f.pnl !== undefined ? (f.pnl >= 0 ? '+$' + fmt(f.pnl, 2) : '-$' + fmt(Math.abs(f.pnl), 2)) : (f.note && f.note.indexOf('PnL') !== -1 ? f.note.match(/PnL:([^\)]+)/)[1] : '');
    var pnlClass = f.pnl > 0 ? 'pnl-up' : (f.pnl < 0 ? 'pnl-down' : '');
    html += '<tr><td>' + time + '</td><td class="' + sideClass + '">' + f.side + '</td><td>' + f.symbol + '</td>' +
      '<td>$' + fmt(f.price, 4) + '</td><td>' + fmt(f.amount, 4) + '</td><td class="' + pnlClass + '">' + pnlStr + '</td></tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

// ─── 主初始化 ───
var livePrices = {};

async function init() {
  try {
    // 1. 加载组合价格数据
    var priceData = null;
    try {
      var priceRes = await fetch('/data/trading/price_aggregate.json?t=' + Date.now(), { cache: 'no-store' });
      priceData = await priceRes.json();
      if (priceData && priceData.platforms) {
        renderPrices(priceData.platforms);
        Object.keys(priceData.platforms.Binance || {}).forEach(function(s) {
          livePrices[s] = priceData.platforms.Binance[s];
        });
      }
      var ts = priceData && priceData.timestamp;
      if (ts) document.getElementById('updateTime').textContent = ts;
    } catch(e) {
      console.warn('price_aggregate.json 加载失败，尝试直接拉Binance', e);
    }

    // 2. 加载组合账户数据
    var portfolioRes = await fetch('/data/trading/portfolio.json?t=' + Date.now(), { cache: 'no-store' });
    var data = await portfolioRes.json();

    renderAccount(data);
    renderHoldings(data);
    renderGrids(data, livePrices);
    renderTrades(data);

    console.log('✅ 页面加载成功', new Date().toLocaleTimeString());
  } catch(err) {
    console.error('页面加载失败:', err);
  }
}

// ─── 定时刷新 ───
init();
setInterval(init, 30000);
</script>
