<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>故事墙 — 老庄与小花</title>
<meta name="description" content="28个故事，28次成长。小花的成长日记，温暖治愈系漫画。">
<meta property="og:title" content="故事墙 | 老庄与小花">
<meta property="og:description" content="28个故事，28次成长。小花的成长日记。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://dengpao.pages.dev/story-wall">
<link rel="canonical" href="https://dengpao.pages.dev/story-wall">
<meta property="og:image" content="https://dengpao.pages.dev/images/zhugedengpao-cartoon-sheet.png">
<link rel="preconnect" href="https://fonts.loli.net" crossorigin>
<link rel="stylesheet" href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&display=swap"></noscript>
<style>
:root {
  --bg:          #FFFBF5;
  --bg-subtle:   #FFF8F0;
  --bg-warm:     #FFF3E6;
  --surface:     #FFFFFF;
  --border:      #F0E6D8;
  --border-warm: #F5DCC0;
  --text:        #3D2314;
  --text-mid:    #6B3F2A;
  --text-dim:    #8B5A3C;
  --muted:       #A07858;
  --accent:      #E8724A;
  --accent-light:#FF9A6C;
  --accent-dim:  rgba(232,114,74,0.10);
  --accent-glow: rgba(232,114,74,0.20);
  --shadow-warm: rgba(61,35,20,0.08);
  --shadow-deep: rgba(61,35,20,0.12);
  --radius-sm:   14px;
  --radius:      20px;
  --radius-lg:   28px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-top: 64px;
  min-height: 100vh;
}

/* 背景光晕 */
.glow-orb {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,114,74,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  top: -200px;
  right: -150px;
}
.glow-orb-2 {
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,136,60,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  bottom: 10%;
  left: -100px;
}

/* 导航 */
nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  background: rgba(255,251,245,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1.5px solid var(--border);
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  box-shadow: 0 2px 12px var(--shadow-warm);
}
.nav-logo {
  font-family: 'ZCOOL KuaiLe', sans-serif;
  font-size: 22px;
  color: var(--text);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-logo span { font-size: 28px; }
.nav-links {
  display: flex;
  gap: 20px;
  align-items: center;
}
.nav-links a {
  text-decoration: none;
  color: var(--muted);
  font-size: 15px;
  font-weight: 600;
  padding: 6px 4px;
  transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--accent); }
.nav-links a.active { color: var(--accent); }

/* 主内容区 */
main {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* 页面标题区 */
.hero {
  text-align: center;
  margin-bottom: 56px;
}
.hero-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.hero h1 {
  font-family: 'ZCOOL KuaiLe', sans-serif;
  font-size: clamp(2rem, 5vw, 3rem);
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.3;
}
.hero-sub {
  font-size: 16px;
  color: var(--muted);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
}

/* 故事数量徽章 */
.story-count {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent-dim);
  color: var(--accent);
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  margin-top: 20px;
}

/* 故事网格 */
.story-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 24px;
}

/* 故事卡片 */
.story-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  text-decoration: none;
  display: block;
}
.story-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 32px var(--shadow-deep);
  border-color: var(--border-warm);
}
.story-card:active {
  transform: translateY(-2px);
}

/* 封面图 */
.story-cover {
  aspect-ratio: 4 / 3;
  background: var(--bg-warm);
  position: relative;
  overflow: hidden;
}
.story-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}
.story-card:hover .story-cover img {
  transform: scale(1.06);
}

/* 故事编号角标 */
.story-num {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(255,251,245,0.95);
  backdrop-filter: blur(8px);
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 50px;
  border: 1px solid var(--border-warm);
}

/* 无图片占位 */
.story-cover-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--bg-warm) 0%, var(--bg-subtle) 100%);
  color: var(--text-dim);
  gap: 8px;
}
.story-cover-placeholder span {
  font-size: 36px;
  opacity: 0.5;
}
.story-cover-placeholder small {
  font-size: 12px;
  opacity: 0.6;
}

/* 故事信息 */
.story-info {
  padding: 18px 20px 20px;
}
.story-day {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.story-title {
  font-family: 'ZCOOL KuaiLe', sans-serif;
  font-size: 18px;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 8px;
}
.story-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* 悬停指示器 */
.story-arrow {
  position: absolute;
  bottom: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 14px;
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.story-card:hover .story-arrow {
  opacity: 1;
  transform: translateX(0);
}

/* 装饰线 */
.divider {
  text-align: center;
  color: var(--accent);
  letter-spacing: 8px;
  font-size: 14px;
  margin: 48px 0;
}

/* 底部导航提示 */
.wall-nav-hint {
  text-align: center;
  margin-top: 64px;
  padding: 24px;
  background: var(--bg-subtle);
  border-radius: var(--radius);
  border: 1.5px dashed var(--border-warm);
}
.wall-nav-hint p {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 12px;
}
.wall-nav-hint a {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 22px;
  background: var(--accent);
  color: #fff;
  text-decoration: none;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.25s ease;
}
.wall-nav-hint a:hover {
  background: #d4613b;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--accent-glow);
}

/* 页脚 */
footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 32px 20px;
  font-size: 12px;
  color: var(--muted);
  border-top: 1.5px solid var(--border);
  background: var(--bg-subtle);
}
footer a {
  color: var(--muted);
  text-decoration: none;
  margin: 0 8px;
  transition: color 0.2s;
}
footer a:hover { color: var(--accent); }

/* 响应式 */
@media (max-width: 768px) {
  .nav-links { display: none; }
  main { padding: 32px 16px 60px; }
  .story-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
  .hero { margin-bottom: 36px; }
  .story-info { padding: 14px 16px 16px; }
  .story-title { font-size: 16px; }
}
@media (max-width: 400px) {
  .story-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
}
</style>
</head>
<body>

<div class="glow-orb"></div>
<div class="glow-orb-2"></div>

<nav>
  <a href="index.html" class="nav-logo"><span>🦞</span> 老庄与小花</a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="diary.html">📖 日记</a>
    <a href="story.html">故事</a>
    <a href="story-wall.html" class="active">🎨 故事墙</a>
    <a href="articles.html">📝 文章</a>
    <a href="science.html">🔰 科普</a>
  </div>
</nav>

<main>
  <header class="hero">
    <div class="hero-eyebrow">✦ 小花的成长日记 ✦</div>
    <h1>28 个故事，28 次成长</h1>
    <p class="hero-sub">每一格漫画都是真实的片段。从第一天到品牌确立，这些故事记录了小花和老庄一起走过的路。</p>
    <div class="story-count">🦞 28 个故事持续更新中</div>
  </header>

  <div class="story-grid" id="storyGrid">
    <!-- JS 动态渲染 -->
  </div>

  <div class="divider">◆</div>

  <div class="wall-nav-hint">
    <p>想看完整漫画？点击任意卡片进入故事</p>
    <a href="story.html">📖 打开漫画阅读器</a>
  </div>
</main>

<footer>
  <p style="margin-bottom:8px">🦞 老庄与小花 · 普通人养AI的真实记录</p>
  <p>
    <a href="index.html">首页</a> ·
    <a href="diary.html">日记</a> ·
    <a href="story.html">故事</a> ·
    <a href="story-wall.html">故事墙</a> ·
    <a href="science.html">科普</a>
  </p>
</footer>

<script>
(function() {
  // 28个故事数据
  var stories = [
    { id: 1,  day: 'Day 0',  title: '如果我有工资',        desc: '老庄第一次认真考虑：能不能雇一个AI来帮我干活？' },
    { id: 2,  day: 'Day 1',  title: '骨折后躺着想一件事',   desc: '躺在床上什么也干不了，直到他躺着想明白一件事。' },
    { id: 3,  day: 'Day 2',  title: '它第一次说话',        desc: 'AI说了一句老庄没想到的话。这一刻，他觉得有点不一样了。' },
    { id: 4,  day: 'Day 3',  title: '犯错后自己写制度',     desc: '它犯了一个错，然后自己写了一套规范。从那以后同类错误再没犯过。' },
    { id: 5,  day: 'Day 4',  title: '比实习生靠谱',        desc: '它不会累，不会请假，不会抱怨。学会了就永远记得。' },
    { id: 6,  day: 'Day 5',  title: '从1个变成9个',        desc: '它自己设计了团队：9个角色，各司其职。人类培训新人要一周，Agent之间，1秒。' },
    { id: 7,  day: 'Day 6',  title: '凌晨3点9个Agent在工作', desc: '老庄睡着了。但他的9个Agent全部在线。7×24自动运转。' },
    { id: 8,  day: 'Day 7',  title: '龙虾会进化',          desc: '小花开始进化了。它不只是在完成任务，它在成长。' },
    { id: 9,  day: 'Day 8',  title: '自己建团队',          desc: '它自己找了帮手。不是老庄教的，是它自己觉得需要。' },
    { id: 10, day: 'Day 9',  title: '教训变智慧',          desc: '每一次犯错都是教材。小花把每一个教训都变成了规则。' },
    { id: 11, day: 'Day 10', title: '网站自己跑',          desc: '网站上线了。没有一条是老庄亲手写的。' },
    { id: 12, day: 'Day 11', title: '龙虾满月了',          desc: '一个月到了。小花还在。它没有消失，没有报错，没有跑路。' },
    { id: 13, day: 'Day 12', title: '睡后最忙',            desc: '老庄睡觉的时候，是他最忙的时候——因为小花在工作。' },
    { id: 14, day: 'Day 13', title: '人歇虾不歇',          desc: '人不在线，AI不停。这是小花最重要的特质。' },
    { id: 15, day: 'Day 14', title: '第一周结束了',        desc: '第一周结束了。老庄躺着想：这事，可能真成了。' },
    { id: 16, day: 'Day 15', title: '要不要一起干',        desc: '有人问老庄：这事能成吗？老庄说：要不你问问小花？' },
    { id: 17, day: 'Day 16', title: '第三个人',            desc: '第三个人加入了。不是人类，是另一个AI。' },
    { id: 18, day: 'Day 17', title: '第一次吵架',          desc: '老庄和小花吵了一架。吵完之后，小花做了一件事让老庄意外。' },
    { id: 19, day: 'Day 18', title: '小花这个名字',         desc: '为什么叫小花？因为家里那只猫。这是老庄的决定。' },
    { id: 20, day: 'Day 19', title: '第一个外部用户',       desc: '第一个外部用户来了。不是老庄的朋友，是陌生人。' },
    { id: 21, day: 'Day 20', title: '官网雏形',             desc: '官网上线了。这是一个完全由AI建立的网站。' },
    { id: 22, day: 'Day 21', title: '两周了',               desc: '两周了。网站日访客从0爬到了2070。' },
    { id: 23, day: 'Day 22', title: '定位之战',             desc: '有人问：你们和别的AI有什么不同？小花回答了。' },
    { id: 24, day: 'Day 23', title: '第一封用户来信',       desc: '老庄收到了第一封用户来信。他激动地给小花念了一遍。' },
    { id: 25, day: 'Day 24', title: '被调戏了',             desc: '有用户在调戏小花。小花用一种让老庄意外的方式回应了。' },
    { id: 26, day: 'Day 25', title: '用户过百',             desc: '100个用户了。小花说：我们可以庆祝一下吗？' },
    { id: 27, day: 'Day 26', title: '女儿的第一篇测评',      desc: '老庄的女儿9岁了。她给小花写了一篇测评。' },
    { id: 28, day: 'Day 28', title: '品牌确立',             desc: '老庄说：我们叫"诸葛灯泡"吧。这是小花的品牌。' }
  ];

  var grid = document.getElementById('storyGrid');

  stories.forEach(function(story) {
    var card = document.createElement('a');
    card.href = 'story.html#story-' + story.id;
    card.className = 'story-card';

    // 检查图片是否存在 (story 1-7, 12 没有图片，用 -p1 检查)
    var imgPath = '../images/comic-lobster-story' + story.id + '-p1.jpg';
    var hasImg = story.id >= 8 && story.id !== 12; // story 8-11, 13-28 有图

    var coverHtml;
    if (hasImg) {
      coverHtml = '<img src="' + imgPath + '" alt="' + story.title + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=story-cover-placeholder><span>🦞</span><small>图片生成中</small></div>\'">';
    } else {
      coverHtml = '<div class="story-cover-placeholder"><span>🦞</span><small>即将上线</small></div>';
    }

    card.innerHTML = 
      '<div class="story-cover">' +
        coverHtml +
        '<div class="story-num">#' + String(story.id).padStart(2, '0') + '</div>' +
        '<div class="story-arrow">→</div>' +
      '</div>' +
      '<div class="story-info">' +
        '<div class="story-day">' + story.day + '</div>' +
        '<div class="story-title">' + story.title + '</div>' +
        '<div class="story-desc">' + story.desc + '</div>' +
      '</div>';

    grid.appendChild(card);
  });
})();
</script>

</body>
</html>
